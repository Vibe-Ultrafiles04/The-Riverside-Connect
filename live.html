<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riverside Live – Broadcasts</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg: #080c14;
      --surface: #0d1424;
      --surface2: #121b2e;
      --border: rgba(255,255,255,0.06);
      --accent: #e63946;
      --accent2: #3a86ff;
      --gold: #f4a261;
      --text: #e8edf5;
      --muted: #8899aa;
      --live: #ff2d55;
      --waiting: #f4a261;
      --ended: #556677;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events:none; z-index:0;
    }

    header {
      position: sticky; top:0; z-index:100;
      background: rgba(8,12,20,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }

    .header-inner {
      max-width: 1100px; margin:0 auto;
      display: flex; align-items:center; justify-content:space-between;
      height: 60px;
    }

    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-badge { background: var(--accent); color:white; font-family:'Bebas Neue', sans-serif; font-size:1.1rem; letter-spacing:1px; padding: 4px 10px; border-radius:4px; }
    .logo-text { font-family:'Bebas Neue', sans-serif; font-size:1.4rem; letter-spacing:2px; color: var(--text); }

    .header-actions { display:flex; align-items:center; gap:12px; }

    .btn-back { display:flex; align-items:center; gap:6px; color: var(--muted); text-decoration:none; font-size:0.9rem; font-weight:500; padding:8px 14px; border-radius:8px; border:1px solid var(--border); transition:all 0.2s; }
    .btn-back:hover { color:var(--text); border-color:var(--accent2); }

    .btn-studio { display:flex; align-items:center; gap:8px; background: var(--accent); color:white; text-decoration:none; font-size:0.9rem; font-weight:600; padding:8px 16px; border-radius:8px; transition:all 0.2s; }
    .btn-studio:hover { background:#c1121f; transform:translateY(-1px); }

    .hero { padding: 48px 20px 32px; text-align:center; position:relative; z-index:1; }
    .hero-eyebrow { font-family:'JetBrains Mono', monospace; font-size:0.72rem; letter-spacing:3px; color: var(--accent); text-transform:uppercase; margin-bottom:12px; }
    .hero h1 { font-family:'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5.5rem); letter-spacing: 3px; line-height:1; background: linear-gradient(135deg, #fff 0%, #8899aa 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero-sub { margin-top:12px; color: var(--muted); font-size:1rem; }

    .filters { max-width:1100px; margin:0 auto; padding: 0 20px 28px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; position:relative; z-index:1; }

    .filter-btn { padding: 7px 16px; border-radius:100px; border: 1px solid var(--border); background:transparent; color: var(--muted); font-size:0.85rem; font-weight:500; cursor:pointer; transition:all 0.18s; font-family:'DM Sans', sans-serif; }
    .filter-btn.active, .filter-btn:hover { border-color: var(--accent2); color: var(--text); background: rgba(58,134,255,0.1); }
    .filter-btn.live-filter.active { border-color: var(--live); background: rgba(255,45,85,0.12); color: var(--live); }

    .live-ticker { display:flex; align-items:center; gap:8px; margin-left:auto; font-family:'JetBrains Mono', monospace; font-size:0.75rem; color: var(--muted); }
    .live-dot { width:8px; height:8px; border-radius:50%; background: var(--live); animation: pulse-dot 1.4s ease-in-out infinite; }

    @keyframes pulse-dot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

    .section { max-width:1100px; margin:0 auto; padding: 0 20px 48px; position:relative; z-index:1; }
    .section-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .section-label { font-family:'Bebas Neue', sans-serif; font-size:1.4rem; letter-spacing:2px; color: var(--text); }
    .section-count { font-family:'JetBrains Mono', monospace; font-size:0.72rem; color: var(--muted); background: var(--surface2); padding:3px 8px; border-radius:4px; }

    .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; }

    .channel-card { background: var(--surface); border: 1px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; transition:all 0.25s; position:relative; }
    .channel-card:hover { transform:translateY(-4px); border-color: rgba(58,134,255,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

    .channel-banner { height:100px; background: linear-gradient(135deg, #1a2740, #0d1424); position:relative; overflow:hidden; }
    .channel-banner-img { width:100%; height:100%; object-fit:cover; opacity:0.7; }
    .channel-banner-overlay { position:absolute; inset:0; background: linear-gradient(to bottom, transparent 40%, var(--surface)); }
    .channel-logo-wrap { position:absolute; bottom:-20px; left:16px; }
    .channel-logo { width:52px; height:52px; border-radius:12px; border: 3px solid var(--surface); background: var(--surface2); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue', sans-serif; font-size:1.4rem; color:white; overflow:hidden; }
    .channel-logo img { width:100%; height:100%; object-fit:cover; }

    .channel-body { padding: 28px 16px 16px; }
    .channel-name { font-weight:700; font-size:1rem; margin-bottom:4px; }
    .channel-desc { font-size:0.82rem; color:var(--muted); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    .channel-live-badge { margin-top:12px; background: rgba(255,45,85,0.1); border:1px solid rgba(255,45,85,0.3); border-radius:8px; padding:10px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:background 0.2s; }
    .channel-live-badge:hover { background: rgba(255,45,85,0.18); }

    .live-indicator { display:flex; align-items:center; gap:5px; font-family:'JetBrains Mono', monospace; font-size:0.65rem; font-weight:600; color: var(--live); letter-spacing:1px; flex-shrink:0; }
    .live-indicator .dot { width:6px; height:6px; border-radius:50%; background: var(--live); animation: pulse-dot 1.2s infinite; }

    .live-title { font-size:0.82rem; font-weight:600; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .waiting-badge { margin-top:12px; background: rgba(244,162,97,0.08); border:1px solid rgba(244,162,97,0.2); border-radius:8px; padding:10px 12px; display:flex; align-items:center; gap:10px; }
    .waiting-indicator { font-family:'JetBrains Mono', monospace; font-size:0.65rem; color:var(--waiting); letter-spacing:1px; flex-shrink:0; }

    .past-streams-count { margin-top:10px; font-size:0.78rem; color:var(--muted); }

    /* ── PLAYER MODAL ── */
    .player-modal { display:none; position:fixed; inset:0; z-index:1000; background: rgba(4,6,12,0.97); flex-direction:column; }
    .player-modal.open { display:flex; }

    .player-header { display:flex; align-items:center; gap:14px; padding:14px 20px; border-bottom:1px solid var(--border); background: var(--surface); flex-shrink:0; }

    .player-close { background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; padding:6px; border-radius:6px; transition:color 0.2s; }
    .player-close:hover { color:var(--text); }

    .player-channel-info { flex:1; }
    .player-channel-name { font-size:0.82rem; color:var(--muted); margin-bottom:2px; }
    .player-stream-title { font-weight:700; font-size:1rem; }

    .player-status-pill { padding:5px 12px; border-radius:100px; font-family:'JetBrains Mono', monospace; font-size:0.7rem; font-weight:600; letter-spacing:1px; }
    .player-status-pill.live { background: rgba(255,45,85,0.15); border:1px solid var(--live); color:var(--live); }
    .player-status-pill.waiting { background: rgba(244,162,97,0.12); border:1px solid var(--waiting); color:var(--waiting); }
    .player-status-pill.ended { background: rgba(85,102,119,0.15); border:1px solid var(--ended); color:var(--ended); }

    .player-body { flex:1; display:flex; overflow:hidden; }

    .player-video-area { flex:1; display:flex; align-items:center; justify-content:center; background:#000; position:relative; }
    .player-video-area video { width:100%; height:100%; object-fit:contain; max-height:calc(100vh - 130px); }

    /* Connection status overlay */
    .connection-status {
      position:absolute; top:12px; left:12px;
      background: rgba(0,0,0,0.75);
      border-radius:8px; padding:6px 12px;
      font-family:'JetBrains Mono', monospace;
      font-size:0.7rem; display:flex; align-items:center; gap:6px;
      transition: opacity 0.5s;
    }
    .conn-dot { width:7px; height:7px; border-radius:50%; background: var(--gold); }
    .conn-dot.connected { background: #2ec4b6; }
    .conn-dot.failed { background: var(--accent); }

    .player-placeholder { text-align:center; color:var(--muted); }
    .player-placeholder i { font-size:4rem; opacity:0.2; margin-bottom:16px; display:block; }
    .player-placeholder h3 { font-size:1.1rem; color:var(--text); margin-bottom:8px; }
    .player-placeholder p { font-size:0.9rem; }

    /* Retry button */
    .retry-btn {
      margin-top:16px;
      padding:10px 20px; border-radius:8px;
      background: var(--accent2); border:none;
      color:white; font-size:0.9rem; font-weight:600;
      cursor:pointer; font-family:'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #2563eb; }

    /* ── CHAT SIDEBAR ── */
    .player-chat { width:300px; flex-shrink:0; background: var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; }

    .chat-header { padding:14px 16px; border-bottom:1px solid var(--border); font-weight:600; font-size:0.9rem; display:flex; align-items:center; gap:8px; }
    .viewer-count { font-family:'JetBrains Mono', monospace; font-size:0.72rem; color:var(--muted); margin-left:auto; }

    .chat-messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .chat-messages::-webkit-scrollbar { width:4px; }
    .chat-messages::-webkit-scrollbar-track { background:transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

    .chat-msg { display:flex; gap:8px; align-items:flex-start; }
    .chat-avatar { width:26px; height:26px; border-radius:50%; background:var(--surface2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:700; color:var(--accent2); overflow:hidden; }
    .chat-avatar img { width:100%; height:100%; object-fit:cover; }
    .chat-author { font-size:0.72rem; font-weight:600; color:var(--accent2); margin-bottom:2px; }
    .chat-text { font-size:0.82rem; line-height:1.4; color:var(--text); }

    .chat-input-area { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
    .chat-input { flex:1; background: var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:0.85rem; font-family:'DM Sans', sans-serif; outline:none; }
    .chat-input:focus { border-color: var(--accent2); }

    .chat-send { background:var(--accent2); border:none; color:white; border-radius:8px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.9rem; transition:background 0.2s; }
    .chat-send:hover { background:#2563eb; }

    .reactions-bar { display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border); }
    .reaction-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:1rem; cursor:pointer; transition:all 0.18s; }
    .reaction-btn:hover { background:var(--surface); transform:scale(1.1); }

    .empty-state { text-align:center; padding:80px 20px; color:var(--muted); }
    .empty-state i { font-size:3.5rem; opacity:0.2; margin-bottom:20px; display:block; }
    .empty-state h3 { font-size:1.2rem; color:var(--text); margin-bottom:8px; }

    .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size:200% 100%; animation: shimmer 1.5s infinite; border-radius:8px; }
    @keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
    .skeleton-card { background: var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
    .skeleton-banner { height:100px; }
    .skeleton-body { padding:28px 16px 16px; }
    .skeleton-line { height:14px; margin-bottom:8px; }
    .skeleton-line.short { width:60%; }

    @media (max-width: 640px) {
      .player-chat { display:none; }
      .channels-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">
      <span class="logo-badge">LIVE</span>
      <span class="logo-text">RIVERSIDE</span>
    </a>
    <div class="header-actions">
      <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Home</a>
      <a href="studio.html" class="btn-studio"><i class="fas fa-broadcast-tower"></i> Studio</a>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-eyebrow">● Broadcasting Network</div>
  <h1>LIVE CHANNELS</h1>
  <p class="hero-sub">Follow your favorite channels and join active broadcasts</p>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterChannels('all', this)">All Channels</button>
  <button class="filter-btn live-filter" onclick="filterChannels('live', this)">🔴 Live Now</button>
  <button class="filter-btn" onclick="filterChannels('waiting', this)">⏳ Upcoming</button>
  <div class="live-ticker">
    <div class="live-dot"></div>
    <span id="ticker-text">Loading...</span>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <span class="section-label">CHANNELS</span>
    <span class="section-count" id="channel-count">0</span>
  </div>
  <div class="channels-grid" id="channels-grid">
    <div class="skeleton-card"><div class="skeleton skeleton-banner"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:70%"></div><div class="skeleton skeleton-line short"></div></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-banner"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:80%"></div><div class="skeleton skeleton-line short"></div></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-banner"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:60%"></div><div class="skeleton skeleton-line short"></div></div></div>
  </div>
</div>

<!-- ── PLAYER MODAL ── -->
<div class="player-modal" id="player-modal">
  <div class="player-header">
    <button class="player-close" onclick="closePlayer()"><i class="fas fa-times"></i></button>
    <div class="player-channel-info">
      <div class="player-channel-name" id="player-channel-name">Channel</div>
      <div class="player-stream-title" id="player-stream-title">Stream Title</div>
    </div>
    <div class="player-status-pill live" id="player-status-pill">● LIVE</div>
  </div>
  <div class="player-body">
    <div class="player-video-area">
      <video id="player-video" autoplay playsinline controls></video>

      <!-- Connection status indicator -->
      <div class="connection-status" id="conn-status" style="display:none">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-text">Connecting...</span>
      </div>

      <div class="player-placeholder" id="player-placeholder" style="display:none">
        <i class="fas fa-satellite-dish"></i>
        <h3 id="placeholder-title">Broadcast not started yet</h3>
        <p id="placeholder-sub">Check back when the host goes live</p>
        <button class="retry-btn" id="retry-btn" style="display:none" onclick="retryConnection()">
          <i class="fas fa-redo"></i> Retry Connection
        </button>
      </div>
    </div>

    <div class="player-chat">
      <div class="chat-header">
        <i class="fas fa-comments" style="color:var(--accent2)"></i>
        Live Chat
        <span class="viewer-count" id="viewer-count">0 watching</span>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="reactions-bar">
        <button class="reaction-btn" onclick="sendReaction('🙏')">🙏</button>
        <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
        <button class="reaction-btn" onclick="sendReaction('❤️')">❤️</button>
        <button class="reaction-btn" onclick="sendReaction('👏')">👏</button>
        <button class="reaction-btn" onclick="sendReaction('🎉')">🎉</button>
      </div>
      <div class="chat-input-area">
        <input class="chat-input" id="chat-input" type="text" placeholder="Say something..." maxlength="200" onkeydown="if(event.key==='Enter') sendChatMessage()"/>
        <button class="chat-send" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
const scriptUrl = 'https://script.google.com/macros/s/AKfycbyxsrcsAGAdvX0OUYYsJvTnXEBVe_tif6-8pn6UFszqt_9UOzWY_5Vtcpg-dopT-x3P/exec';
const userName = localStorage.getItem('userName') || 'Guest';
let allChannels = [];
let allBroadcasts = {};
let activeBroadcastId = null;
let activeBroadcastData = null; // store full broadcast object
let chatPollInterval = null;
let peerConnection = null;
let iceCollectTimeout = null;
let studioAnswerPoll = null;     // ← NEW
let currentFilter = 'all';
let connectionRetryCount = 0;
const MAX_RETRIES = 3;

// ─── HELPERS ────────────────────────────────────────────────────────────────

function getLh3Link(url) {
  if (!url) return '';
  const id = url.match(/[-\w]{25,}/)?.[0];
  return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
}

function colorFromName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return `hsl(${Math.abs(hash) % 360}, 60%, 35%)`;
}

function setConnStatus(state, text) {
  const el = document.getElementById('conn-status');
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-text');
  el.style.display = 'flex';
  dot.className = 'conn-dot' + (state === 'connected' ? ' connected' : state === 'failed' ? ' failed' : '');
  txt.textContent = text;
  if (state === 'connected') {
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.style.display='none', 500); }, 3000);
  } else {
    el.style.opacity = '1';
  }
}

// ─── LOAD CHANNELS ───────────────────────────────────────────────────────────

async function loadChannels() {
  try {
    const res = await fetch(`${scriptUrl}?operation=getLiveChannels`);
    const data = await res.json();
    if (data.status !== 'success') throw new Error();
    allChannels = data.channels || [];

    for (const ch of allChannels) {
      try {
        const bRes = await fetch(`${scriptUrl}?operation=getLiveBroadcasts&channelId=${encodeURIComponent(ch.id)}`);
        const bData = await bRes.json();
        allBroadcasts[ch.id] = bData.broadcasts || [];
      } catch(e) { allBroadcasts[ch.id] = []; }
    }

    renderChannels();
    updateTicker();
  } catch(e) {
    document.getElementById('channels-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-satellite-dish"></i>
        <h3>No channels available</h3>
        <p>Channels will appear here once created in the Studio</p>
      </div>`;
    document.getElementById('ticker-text').textContent = 'No active broadcasts';
  }
}

function renderChannels(filter) {
  filter = filter || currentFilter;
  const grid = document.getElementById('channels-grid');
  let channels = [...allChannels];

  if (filter === 'live') {
    channels = channels.filter(ch => (allBroadcasts[ch.id] || []).some(b => b.status === 'live'));
  } else if (filter === 'waiting') {
    channels = channels.filter(ch => {
      const broadcasts = allBroadcasts[ch.id] || [];
      return broadcasts.some(b => b.status === 'waiting') && !broadcasts.some(b => b.status === 'live');
    });
  }

  document.getElementById('channel-count').textContent = channels.length;

  if (channels.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <i class="fas fa-tv"></i>
      <h3>No channels found</h3>
      <p>${filter === 'live' ? 'No channels are currently live' : filter === 'waiting' ? 'No upcoming broadcasts' : 'No channels have been created yet'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = channels.map(ch => {
    const broadcasts = allBroadcasts[ch.id] || [];
    const liveBroadcast = broadcasts.find(b => b.status === 'live');
    const waitingBroadcast = broadcasts.find(b => b.status === 'waiting');
    const picSrc = getLh3Link(ch.picLink);
    const bannerSrc = getLh3Link(ch.bannerLink);
    const initial = (ch.name || 'C').charAt(0).toUpperCase();
    const bgColor = colorFromName(ch.name || 'channel');
    const pastCount = broadcasts.filter(b => b.status === 'ended').length;

    return `
    <div class="channel-card" onclick="openChannelPage('${ch.id}')">
      <div class="channel-banner" style="${bannerSrc ? '' : `background:linear-gradient(135deg, ${bgColor}, #0d1424)`}">
        ${bannerSrc ? `<img src="${bannerSrc}" class="channel-banner-img" onerror="this.style.display='none'">` : ''}
        <div class="channel-banner-overlay"></div>
        <div class="channel-logo-wrap">
          <div class="channel-logo" style="${picSrc ? '' : `background:${bgColor}`}">
            ${picSrc ? `<img src="${picSrc}" onerror="this.style.display='none';this.parentElement.textContent='${initial}'">` : initial}
          </div>
        </div>
      </div>
      <div class="channel-body">
        <div class="channel-name">${ch.name}</div>
        <div class="channel-desc">${ch.description || 'No description'}</div>
        ${liveBroadcast ? `
        <div class="channel-live-badge" onclick="event.stopPropagation(); openPlayer('${liveBroadcast.id}', '${ch.id}')">
          <div class="live-indicator"><div class="dot"></div> LIVE</div>
          <div class="live-title">${liveBroadcast.title}</div>
          <i class="fas fa-play" style="font-size:0.7rem;color:var(--live)"></i>
        </div>
        ` : waitingBroadcast ? `
        <div class="waiting-badge">
          <div class="waiting-indicator">⏳ SOON</div>
          <div class="live-title" style="color:var(--waiting)">${waitingBroadcast.title}</div>
        </div>
        ` : ''}
        ${pastCount > 0 ? `<div class="past-streams-count">${pastCount} past broadcast${pastCount > 1 ? 's' : ''}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterChannels(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChannels(filter);
}

function updateTicker() {
  const liveCount = allChannels.filter(ch => (allBroadcasts[ch.id] || []).some(b => b.status === 'live')).length;
  document.getElementById('ticker-text').textContent = liveCount > 0 ? `${liveCount} channel${liveCount > 1 ? 's' : ''} live now` : 'No active broadcasts';
}

function openChannelPage(channelId) {
  const broadcasts = allBroadcasts[channelId] || [];
  const ch = allChannels.find(c => c.id === channelId);

  if (broadcasts.length === 0) {
    alert(`No broadcasts yet for ${ch ? ch.name : 'this channel'}`);
    return;
  }

  // If there's only one broadcast → open it directly
  if (broadcasts.length === 1) {
    openPlayer(broadcasts[0].id, channelId);
    return;
  }

  // Multiple broadcasts → Show a nice selection modal / list
  showBroadcastSelectionModal(channelId, ch, broadcasts);
}

function showBroadcastSelectionModal(channelId, channel, broadcasts) {
  let html = `
    <div style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; display:flex; align-items:center; justify-content:center;">
      <div style="background:var(--surface); border-radius:16px; width:90%; max-width:520px; max-height:85vh; overflow:auto; padding:20px;">
        <h2 style="margin-bottom:16px; text-align:center;">${channel ? channel.name : 'Channel'} Broadcasts</h2>
        
        <div style="display:flex; flex-direction:column; gap:12px;">
  `;

  broadcasts.sort((a,b) => new Date(b.created) - new Date(a.created)).forEach(b => {
    const isLive = b.status === 'live';
    const statusColor = isLive ? 'var(--live)' : b.status === 'waiting' ? 'var(--waiting)' : 'var(--ended)';
    
    html += `
      <div onclick="selectBroadcastFromList('${b.id}', '${channelId}');" 
           style="background:var(--surface2); padding:14px; border-radius:12px; cursor:pointer; border:2px solid ${isLive ? 'var(--live)' : 'transparent'};">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="font-weight:600;">${b.title}</div>
          <span style="color:${statusColor}; font-size:0.8rem; font-weight:700; font-family:JetBrains Mono;">
            ${isLive ? '● LIVE' : b.status.toUpperCase()}
          </span>
        </div>
        <div style="font-size:0.8rem; color:var(--muted); margin-top:4px;">
          ${new Date(b.created).toLocaleDateString()}
        </div>
      </div>
    `;
  });

  html += `
        </div>
        <button onclick="this.parentElement.parentElement.remove()" 
                style="margin-top:20px; width:100%; padding:12px; background:var(--surface2); border:none; border-radius:8px; color:var(--text); font-weight:600;">
          Close
        </button>
      </div>
    </div>
  `;

  const modal = document.createElement('div');
  modal.innerHTML = html;
  document.body.appendChild(modal);
}

function selectBroadcastFromList(broadcastId, channelId) {
  // Remove all modals
  document.querySelectorAll('div[style*="z-index:2000"]').forEach(el => el.remove());
  openPlayer(broadcastId, channelId);
}

// ─── VIEWER PLAYER ───────────────────────────────────────────────────────────

async function openPlayer(broadcastId, channelId) {
  activeBroadcastId = broadcastId;
  connectionRetryCount = 0;

  try {
    const res = await fetch(`${scriptUrl}?operation=getLiveBroadcast&broadcastId=${encodeURIComponent(broadcastId)}`);
    const data = await res.json();
    const b = data.broadcast;
    if (!b) return;

    activeBroadcastData = b;

    const ch = allChannels.find(c => c.id === channelId);
    document.getElementById('player-channel-name').textContent = ch ? ch.name : 'Channel';
    document.getElementById('player-stream-title').textContent = b.title;

    const pill = document.getElementById('player-status-pill');
    pill.className = `player-status-pill ${b.status}`;
    pill.textContent = b.status === 'live' ? '● LIVE' : b.status === 'waiting' ? '⏳ WAITING' : '■ ENDED';

    const video = document.getElementById('player-video');
    const placeholder = document.getElementById('player-placeholder');

    if (b.status === 'live') {
      video.style.display = 'block';
      placeholder.style.display = 'none';
      document.getElementById('retry-btn').style.display = 'none';
      setConnStatus('connecting', 'Connecting to stream...');
      await startViewerConnection(broadcastId);
    } else {
      video.style.display = 'none';
      placeholder.style.display = 'flex';
      document.getElementById('conn-status').style.display = 'none';
      document.getElementById('placeholder-title').textContent =
        b.status === 'waiting' ? 'Broadcast not started yet' : 'Broadcast has ended';
      document.getElementById('placeholder-sub').textContent =
        b.status === 'waiting' ? 'The host will go live soon — stay tuned!' : 'This stream has finished.';
    }

    document.getElementById('player-modal').classList.add('open');
    startChatPoll(broadcastId);

    fetch(scriptUrl, {
      method:'POST',
      body: JSON.stringify({ operation:'recordBroadcastView', broadcastId, username: userName })
    });
  } catch(e) {
    console.error('Failed to open player', e);
  }
}

// ─── KEY FIX: Viewer creates the OFFER, studio answers ──────────────────────
// This is the correct WebRTC flow for 1-studio-to-many-viewers:
// Each viewer independently offers → studio answers each one separately.

async function startViewerConnection(broadcastId) {
  cleanupPeerConnection();
  connectionRetryCount = 0;

  try {
    peerConnection = new RTCPeerConnection({
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ]
    });

    const video = document.getElementById('player-video');

    peerConnection.ontrack = (e) => {
      if (e.streams?.[0]) {
        video.srcObject = e.streams[0];
        video.play().catch(() => {});
        setConnStatus('connected', 'Connected');
      }
    };

    peerConnection.onconnectionstatechange = () => {
      const state = peerConnection?.connectionState;
      console.log('PC State:', state);
      if (state === 'connected') {
        setConnStatus('connected', 'Connected');
      } else if (state === 'failed' || state === 'closed') {
        setConnStatus('failed', 'Connection lost');
        if (connectionRetryCount < MAX_RETRIES) {
          connectionRetryCount++;
          setTimeout(() => startViewerConnection(broadcastId), 4000);
        } else {
          document.getElementById('retry-btn').style.display = 'inline-block';
        }
      }
    };

    // Step 1: Clean old signals first
    await fetch(scriptUrl, {
      method: 'POST',
      body: JSON.stringify({
        operation: 'cleanupViewerSignals',
        broadcastId,
        viewerId: userName
      })
    });

    // Step 2: Create offer
    const offer = await peerConnection.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: true
    });
    await peerConnection.setLocalDescription(offer);

    // Step 3: Wait for ICE gathering (longer timeout)
    await waitForIceGathering(peerConnection, 5000);

    console.log('Sending offer SDP to backend...');

    // Step 4: Send offer to studio via backend
    const submitRes = await fetch(scriptUrl, {
      method: 'POST',
      body: JSON.stringify({
        operation: 'submitViewerAnswer',
        broadcastId,
        viewerId: userName,
        sdpAnswer: peerConnection.localDescription.sdp
      })
    });
    const submitData = await submitRes.json();
    console.log('Offer submitted:', submitData.status);

    // Step 5: Poll for studio's answer
    pollForStudioAnswer(broadcastId);

  } catch (e) {
    console.error('startViewerConnection error:', e);
    setConnStatus('failed', 'Failed to connect');
    document.getElementById('retry-btn').style.display = 'inline-block';
  }
}

function waitForIceGathering(pc, timeoutMs) {
  return new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') { resolve(); return; }
    const check = () => { if (pc.iceGatheringState === 'complete') { pc.removeEventListener('icegatheringstatechange', check); resolve(); } };
    pc.addEventListener('icegatheringstatechange', check);
    setTimeout(() => { pc.removeEventListener('icegatheringstatechange', check); resolve(); }, timeoutMs);
  });
}

// Poll for the studio's SDP answer to our offer
async function pollForStudioAnswer(broadcastId) {
  if (iceCollectTimeout) clearTimeout(iceCollectTimeout);

  let attempts = 0;
  const maxAttempts = 30;  // 30 × 3s = 90 seconds — studio needs time to see offer and respond
  const pollInterval = 3000;

  const poll = async () => {
    if (!peerConnection || !activeBroadcastId) return;
    
    // Already have remote description — stop polling
    if (peerConnection.currentRemoteDescription) {
      console.log('Already have remote description, stopping poll');
      return;
    }

    // Connection succeeded — stop polling  
    if (peerConnection.connectionState === 'connected') return;
    
    // Too many failed connection states — stop
    if (peerConnection.connectionState === 'failed' || 
        peerConnection.connectionState === 'closed') return;

    if (attempts >= maxAttempts) {
      console.warn('Timed out waiting for studio answer');
      setConnStatus('failed', 'Studio not responding');
      document.getElementById('retry-btn').style.display = 'inline-block';
      return;
    }
    attempts++;

    try {
      const res = await fetch(
        `${scriptUrl}?operation=getStudioAnswerForViewer` +
        `&broadcastId=${encodeURIComponent(broadcastId)}` +
        `&viewerId=${encodeURIComponent(userName)}`
      );
      const data = await res.json();

      if (data.sdpAnswer && peerConnection && !peerConnection.currentRemoteDescription) {
        console.log('Got studio answer! Setting remote description...');
        
        try {
          await peerConnection.setRemoteDescription({ 
            type: 'answer', 
            sdp: data.sdpAnswer 
          });
          console.log('Remote description set successfully');

          // Apply any ICE candidates from studio
          for (const cand of (data.iceCandidates || [])) {
            try {
              await peerConnection.addIceCandidate(JSON.parse(cand));
            } catch (err) {
              console.warn('ICE candidate error (non-fatal):', err.message);
            }
          }
          return; // Done — stop polling
        } catch (sdpErr) {
          console.error('Failed to set remote description:', sdpErr);
          // Don't return — retry might help if timing issue
        }
      } else {
        console.log(`Poll attempt ${attempts}/${maxAttempts} — no answer yet`);
      }
    } catch (e) {
      console.warn('Poll fetch error:', e.message);
    }

    iceCollectTimeout = setTimeout(poll, pollInterval);
  };

  // Give studio 2 seconds to notice the offer before first poll
  iceCollectTimeout = setTimeout(poll, 2000);
}

function retryConnection() {
  if (!activeBroadcastId) return;
  document.getElementById('retry-btn').style.display = 'none';
  setConnStatus('connecting', 'Reconnecting...');
  startViewerConnection(activeBroadcastId);
}

function cleanupPeerConnection() {
  if (iceCollectTimeout) clearTimeout(iceCollectTimeout);
  if (studioAnswerPoll) clearTimeout(studioAnswerPoll);
  
  if (peerConnection) {
    peerConnection.ontrack = null;
    peerConnection.onicecandidate = null;
    peerConnection.onconnectionstatechange = null;
    try { peerConnection.close(); } catch(e){}
    peerConnection = null;
  }
  
  const video = document.getElementById('player-video');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
}

function closePlayer() {
  document.getElementById('player-modal').classList.remove('open');
  cleanupPeerConnection();
  if (chatPollInterval) { clearInterval(chatPollInterval); chatPollInterval = null; }
  activeBroadcastId = null;
  activeBroadcastData = null;
  document.getElementById('conn-status').style.display = 'none';
}

// ─── CHAT ────────────────────────────────────────────────────────────────────

function startChatPoll(broadcastId) {
  loadChat(broadcastId);
  chatPollInterval = setInterval(() => loadChat(broadcastId), 5000);
}

async function loadChat(broadcastId) {
  try {
    const res = await fetch(`${scriptUrl}?operation=getBroadcastChat&broadcastId=${encodeURIComponent(broadcastId)}&since=0`);
    const data = await res.json();
    const msgs = data.messages || [];
    const container = document.getElementById('chat-messages');
    const wasAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 5;

    if (msgs.length !== parseInt(container.dataset.count || '0')) {
      container.dataset.count = msgs.length;
      container.innerHTML = msgs.map(m => {
        const pic = getLh3Link(m.picLink);
        const initial = (m.name || '?').charAt(0).toUpperCase();
        return `<div class="chat-msg">
          <div class="chat-avatar" style="background:${colorFromName(m.name)}">
            ${pic ? `<img src="${pic}" onerror="this.style.display='none'">` : initial}
          </div>
          <div class="chat-content">
            <div class="chat-author">${m.name}</div>
            <div class="chat-text">${escapeHtml(m.message)}</div>
          </div>
        </div>`;
      }).join('');

      if (wasAtBottom) container.scrollTop = container.scrollHeight;
    }

    document.getElementById('viewer-count').textContent = `${data.viewerCount || 0} watching`;
  } catch(e) {}
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !activeBroadcastId) return;
  input.value = '';

  const picLink = localStorage.getItem('userPicLink') || '';
  await fetch(scriptUrl, {
    method:'POST',
    body: JSON.stringify({ operation: 'sendBroadcastChat', broadcastId: activeBroadcastId, name: userName, message: msg, picLink })
  });
  loadChat(activeBroadcastId);
}

async function sendReaction(emoji) {
  if (!activeBroadcastId) return;
  await fetch(scriptUrl, {
    method:'POST',
    body: JSON.stringify({ operation: 'sendBroadcastChat', broadcastId: activeBroadcastId, name: userName, message: emoji, picLink: localStorage.getItem('userPicLink') || '' })
  });
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// INIT
loadChannels();
setInterval(loadChannels, 30000);
</script>
