async function submitChannel() {
  const name = document.getElementById("channelNameInput").value.trim();
  const desc = document.getElementById("channelDescInput").value.trim();
  if (!name) { showToast("Channel name required", "error"); return; }

  const payload = { operation: "createChannel", creator: currentUserName, name, description: desc };
  if (selectedChannelAvatar) { payload.imageData = selectedChannelAvatar.base64; payload.imageName = selectedChannelAvatar.name; }

  try {
    const res  = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.status === "success") { showToast("Channel created!", "success"); closeChannelModal(); loadAllChannels(); }
    else showToast(data.message || "Failed to create channel", "error");
  } catch (err) {
    showToast("Network error – try again", "error");
  }
}

document.getElementById('editChannelAvatarInput')?.addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (!file || !file.type.startsWith('image/')) { showToast("Please select an image", "error"); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    selectedEditAvatar = { base64: ev.target.result.split(',')[1], name: file.name, type: file.type };
    document.getElementById('editChannelAvatarPreview').src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function openEditChannelModal(channelId, name, description, picLink) {
  editingChannelId = channelId;
  document.getElementById('editChannelNameInput').value = name;
  document.getElementById('editChannelDescInput').value = description || '';
  document.getElementById('editChannelAvatarPreview').src = picLink
    ? getLh3Link(picLink)
    : `https://via.placeholder.com/110?text=${name.charAt(0).toUpperCase()}`;
  selectedEditAvatar = null;
  document.getElementById("editChannelModal").classList.add("active");
}

function closeEditChannelModal() {
  document.getElementById("editChannelModal").classList.remove("active");
  document.getElementById('editChannelNameInput').value = "";
  document.getElementById('editChannelDescInput').value = "";
  selectedEditAvatar = null;
  document.getElementById('editChannelAvatarPreview').src = "https://via.placeholder.com/110?text=Icon";
  editingChannelId = null;
}

async function submitChannelEdit() {
  if (!editingChannelId) return showToast("No channel selected", "error");
  const name = document.getElementById("editChannelNameInput").value.trim();
  const desc = document.getElementById("editChannelDescInput").value.trim();
  if (!name) return showToast("Channel name required", "error");

  const payload = { operation: "editChannel", channelId: editingChannelId, user: currentUserName, newName: name, newDescription: desc };
  if (selectedEditAvatar) { payload.imageData = selectedEditAvatar.base64; payload.imageName = selectedEditAvatar.name; }

  try {
    const res  = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.status === "success") {
      showToast("Channel updated!", "success");
      closeEditChannelModal();
      loadAllChannels();
      const ch = allChannels.find(c => c.id === editingChannelId);
      if (ch) openChannelTab(ch.id, name, desc, ch.creator, ch.created, data.picLink || ch.picLink);
    } else {
      showToast(data.message || "Update failed", "error");
    }
  } catch (err) {
    showToast("Network error", "error");
  }
}

/* ════════════════════════════════════════════════════════════════════════
   SCROLL TO POST (deep link from notification)
   ════════════════════════════════════════════════════════════════════════ */
function scrollToPost(postId) {
  if (!postId) return;
  const postElement = document.querySelector(`.post[data-post-id="${postId}"]`);
  if (postElement) {
    postElement.scrollIntoView({ behavior: "smooth", block: "center" });
    postElement.style.transition = "background 2s";
    postElement.style.background = "rgba(59,130,246,0.3)";
    setTimeout(() => { postElement.style.background = ""; }, 2800);
  } else {
    setTimeout(() => {
      const retry = document.querySelector(`.post[data-post-id="${postId}"]`);
      if (retry) retry.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 1200);
  }
}

/* ════════════════════════════════════════════════════════════════════════
   CONFIRM TOAST
   ════════════════════════════════════════════════════════════════════════ */
function showConfirmToast(title, message, confirmText = "Delete", cancelText = "Cancel") {
  return new Promise(resolve => {
    const toast = document.createElement('div');
    toast.className = 'toast confirm-toast';
    Object.assign(toast.style, {
      position: 'fixed', top: '80px', left: '50%', transform: 'translateX(-50%)',
      zIndex: '10001', maxWidth: '420px', width: '90%',
      background: '#1e293b', padding: '16px 20px',
      borderRadius: '14px', boxShadow: '0 12px 32px rgba(0,0,0,0.6)',
      borderLeft: '5px solid #ef4444', color: '#e2e8f0',
      animation: 'slideDown 0.35s ease'
    });

    toast.innerHTML = `
      <div style="font-weight:600; margin-bottom:8px;">${title}</div>
      <div style="color:#cbd5e1; margin-bottom:16px;">${message}</div>
      <div style="display:flex; gap:12px; justify-content:flex-end;">
        <button style="padding:8px 16px; background:transparent; border:1px solid #64748b; color:#94a3b8; border-radius:999px; cursor:pointer; font-weight:600;">${cancelText}</button>
        <button style="padding:8px 20px; background:linear-gradient(135deg,#ef4444,#f87171); color:white; border:none; border-radius:999px; cursor:pointer; font-weight:600;">${confirmText}</button>
      </div>
    `;

    document.getElementById('toast-container').appendChild(toast);
    toast.querySelectorAll('button')[1].onclick = () => { toast.remove(); resolve(true); };
    toast.querySelectorAll('button')[0].onclick = () => { toast.remove(); resolve(false); };
  });
}

/* ════════════════════════════════════════════════════════════════════════
   POLLING
   ════════════════════════════════════════════════════════════════════════ */
let pollingInterval = null;

function startChannelPolling() {
  if (pollingInterval) clearInterval(pollingInterval);

  pollingInterval = setInterval(async () => {
    if (!currentChannelId || document.hidden) return;

    try {
      const resp = await fetch(`${SCRIPT_URL}?operation=getChannelPostsLight&channelId=${encodeURIComponent(currentChannelId)}`);
      if (!resp.ok) return;

      const { posts: serverPosts = [] } = await resp.json();

      const currentIds = new Set(
        Array.from(document.querySelectorAll('.post[data-post-id]'))
          .map(el => el.dataset.postId).filter(Boolean)
      );

      const wrapper = document.querySelector('.feed-wrapper');
      let localDeletedIds = [];
      if (wrapper?.dataset.deletedPostIds) {
        try { localDeletedIds = JSON.parse(wrapper.dataset.deletedPostIds); } catch (e) {}
      }
      const deletedSet = new Set(localDeletedIds);

      const hasRealNewPosts = serverPosts.some(sp =>
        !currentIds.has(sp.postId) && !deletedSet.has(sp.postId)
      );

      if (hasRealNewPosts) {
        // Reset view tracking so new posts get their views recorded
        viewedPostIds.clear();
        postViewCounts.clear();

        await loadPosts(currentChannelId);
        showToast("New posts loaded ↑", "success");

        // Record views for newly loaded posts
        await recordViewsForVisiblePosts();

        if (wrapper && wrapper.scrollTop < 500) wrapper.scrollTop = 0;
      } else {
        document.querySelectorAll('.post[data-post-id]').forEach(el => {
          if (deletedSet.has(el.dataset.postId)) el.remove();
        });

        const currentServerIds = new Set(serverPosts.map(p => p.postId));
        const stillRelevant = localDeletedIds.filter(id => !currentServerIds.has(id));
        if (wrapper) wrapper.dataset.deletedPostIds = JSON.stringify(stillRelevant);
      }

      // Refresh comments for open comment sections
      document.querySelectorAll('.comment-section.open').forEach(section => {
        const postId = section.dataset.postid;
        const container = document.getElementById(`comments-${postId}`);
        if (postId && container) loadComments(postId, container);
      });

    } catch (err) {
      console.warn("[polling] failed:", err);
    }
  }, 12000);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (pollingInterval) clearInterval(pollingInterval);
  } else if (currentChannelId) {
    startChannelPolling();
  }
});

// Calendar date click delegation
document.addEventListener('click', function (e) {
  const day = e.target.closest('.highlighted');
  if (!day) return;
  const container = day.closest('.calendar-container');
  if (!container) return;
  const postId  = container.dataset.postId;
  const dateStr = day.dataset.date;
  if (!postId || !dateStr) return;
  const allEvents = postEventsMap.get(postId);
  if (!allEvents) return;
  showEventsForDate(dateStr, allEvents.filter(ev => ev.date === dateStr));
});

document.getElementById('scheduleToggle').addEventListener('change', function () {
  const input = document.getElementById('scheduledTime');
  input.style.display = this.checked ? 'block' : 'none';
  if (this.checked && !input.value) {
    const d = new Date(Date.now() + 60 * 60 * 1000);
    input.value = d.toISOString().slice(0, 16);
  }
});

// Notification click from service worker
navigator.serviceWorker?.addEventListener('message', (event) => {
  if (event.data?.type === "NOTIFICATION_CLICK") {
    const url = new URL(event.data.url || event.data);
    const newChannelId = url.searchParams.get('channelId');
    const newPostId    = url.searchParams.get('postId');
    if (newChannelId && newChannelId !== currentChannelId) {
      const ch = allChannels.find(c => c.id === newChannelId);
      if (ch) openChannelTab(ch.id, ch.name, ch.description, ch.creator, ch.created, ch.picLink);
    }
    if (newPostId) setTimeout(() => scrollToPost(newPostId), 600);
  }
});
