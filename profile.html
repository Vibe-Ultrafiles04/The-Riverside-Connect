<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Riverside Connect · Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Riverside Connect">
<link rel="apple-touch-icon" sizes="180x180" href="maskable_icon_x192.png">

<style>
  :root {
    --ink:#e2e8f0; --paper:#0a0f1e; --surface:#0f172a; --lift:#1a2540;
    --wire:rgba(96,165,250,0.18); --steel:#64748b; --lead:#94a3b8;
    --accent:#3b82f6; --accent2:#60a5fa; --gold:#facc15; --danger:#ef4444; --green:#10b981;
    --font-head:'Bebas Neue',sans-serif; --font-body:'DM Sans',sans-serif; --font-mono:'DM Mono',monospace;
    --bar-h:50px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100dvh; overflow:hidden; background:var(--paper); color:var(--ink); font-family:var(--font-body); -webkit-font-smoothing:antialiased; }

  /* ══ SHELL — slides in on load ══ */
  #pf-shell {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.36s cubic-bezier(.22,.68,0,1.2);
  }
  #pf-shell.in { transform: translateX(0); }

  .pf-topbar {
    height: var(--bar-h); flex-shrink: 0;
    display: flex; align-items: center; gap: 4px;
    padding: 0 8px;
    background: rgba(10,15,30,0.92);
    border-bottom: 1px solid var(--wire);
    backdrop-filter: blur(16px);
  }
  .pf-icon-btn {
    width: 36px; height: 36px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; color: var(--lead);
    cursor: pointer; font-size: 0.95rem; transition: all 0.15s; flex-shrink: 0;
  }
  .pf-icon-btn:hover { color: var(--accent2); background: var(--lift); }
  .pf-icon-btn.spinning i { animation: pfspin 0.8s linear infinite; }
  @keyframes pfspin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .pf-title {
    flex: 1; text-align: center;
    font-family: var(--font-head); font-size: 1.05rem; letter-spacing: 0.08em;
    color: var(--accent2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ══ TRACK — horizontal drill-down nav ══ */
  #pf-track-wrap { flex: 1; overflow: hidden; position: relative; }
  #pf-track {
    display: flex; width: 300%; height: 100%;
    transition: transform 0.32s cubic-bezier(.22,.68,0,1.2);
  }
  .pf-screen { width: 33.3333%; flex-shrink: 0; height: 100%; overflow-y: auto; padding: 22px 18px 40px; }
  .pf-screen::-webkit-scrollbar { width: 4px; }
  .pf-screen::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.25); border-radius:4px; }

  /* ══ Avatar ══ */
  .pf-avatar-wrap { position: relative; width: 104px; margin: 0 auto 14px; }
  .pf-avatar-wrap img {
    width: 104px; height: 104px; border-radius: 50%; object-fit: cover;
    border: 2.5px solid var(--accent2); display: block; cursor: pointer; background: var(--lift);
  }
  .pf-zoom-btn {
    position: absolute; bottom: -2px; right: -2px;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--paper); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; cursor: pointer; transition: transform 0.15s;
  }
  .pf-zoom-btn:hover { transform: scale(1.08); }
  .pf-cam-btn {
    position: absolute; top: -2px; right: -2px;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--gold); border: 2px solid var(--paper); color: #1a1a1a;
    display: none; align-items: center; justify-content: center;
    font-size: 0.75rem; cursor: pointer;
  }
  .pf-editing .pf-cam-btn { display: flex; }

  .pf-name-row { text-align: center; margin-bottom: 4px; }
  .pf-name-display {
    font-family: var(--font-head); font-size: 1.5rem; letter-spacing: 0.04em; color: var(--ink);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .pf-editing .pf-name-display { display: none; }
  .pf-name-input {
    display: none; width: 100%; text-align: center;
    background: var(--lift); border: 1px solid var(--wire); color: var(--ink);
    font-family: var(--font-body); font-size: 1rem; font-weight: 600;
    padding: 10px 12px; border-radius: 10px; outline: none; margin-bottom: 12px;
  }
  .pf-editing .pf-name-input { display: block; }
  .pf-edit-toggle {
    background: none; border: none; color: var(--steel); cursor: pointer; font-size: 0.85rem;
  }
  .pf-edit-toggle:hover { color: var(--accent2); }

  .pf-joined { text-align:center; font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.06em; color:var(--steel); margin-bottom:18px; }

  /* ══ Badges ══ */
  .pf-badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .pf-badge {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: var(--surface); border: 1px solid var(--wire); border-radius: 12px;
    padding: 10px 16px; min-width: 92px;
  }
  .pf-badge-label { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em; color: var(--steel); }
  .pf-badge-value { font-size: 0.82rem; font-weight: 700; display: flex; align-items: center; gap: 5px; }
  .pf-badge-value.approved, .pf-badge-value.admin, .pf-badge-value.hasrole { color: #34d399; }
  .pf-badge-value.pending { color: var(--gold); }
  .pf-badge-value.blocked { color: var(--danger); }
  .pf-badge-value.member, .pf-badge-value.norole { color: var(--lead); }

  .pf-section-label {
    font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; color: var(--steel);
    margin: 18px 0 10px;
  }

  .pf-recovery { background: var(--surface); border: 1px solid var(--wire); border-radius: 12px; padding: 14px; margin-bottom: 18px; }
  .pf-recovery-code-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .pf-recovery code {
    font-family: 'Courier New', monospace; font-size: 0.85rem; color: var(--gold);
    background: var(--paper); padding: 7px 10px; border-radius: 7px; word-break: break-all;
  }
  .pf-copy-btn {
    padding: 6px 12px; background: rgba(96,165,250,0.12); border: 1px solid var(--wire);
    color: var(--accent2); border-radius: 7px; font-size: 0.78rem; font-weight: 600; cursor: pointer;
  }
  .pf-recovery p { margin-top: 9px; font-size: 0.75rem; color: var(--steel); line-height: 1.4; }

  .pf-btn-row { display: flex; gap: 10px; margin-top: 6px; }
  .pf-btn {
    flex: 1; padding: 12px; border-radius: 10px; font-family: var(--font-body);
    font-size: 0.88rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s;
  }
  .pf-btn-save { background: linear-gradient(135deg,#2563eb,#3b82f6); color: #fff; display:none; }
  .pf-editing .pf-btn-save { display: block; }
  .pf-btn-save:hover { box-shadow: 0 4px 16px rgba(37,99,235,0.4); }
  .pf-btn-cancel { background: var(--lift); color: var(--lead); border: 1px solid var(--wire); display:none; }
  .pf-editing .pf-btn-cancel { display: block; }

  .pf-members-btn {
    width: 100%; padding: 14px; margin-top: 18px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--wire); border-radius: 12px;
    color: var(--accent2); font-weight: 700; font-size: 0.9rem; cursor: pointer;
  }
  .pf-editing ~ .pf-members-btn, .pf-members-btn { }
  .pf-members-btn:hover { background: var(--lift); border-color: rgba(96,165,250,0.4); }
  .pf-members-btn i.fa-chevron-right { margin-left: auto; opacity: 0.5; }

  /* ══ Members screen ══ */
  .pf-search-wrap { position: relative; margin-bottom: 16px; }
  .pf-search-wrap input {
    width: 100%; padding: 11px 14px 11px 38px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--wire); color: var(--ink);
    font-family: var(--font-body); font-size: 0.88rem; outline: none;
  }
  .pf-search-wrap input:focus { border-color: rgba(96,165,250,0.5); }
  .pf-search-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--steel); font-size: 0.85rem; }

  .pf-member-row {
    display: flex; align-items: center; gap: 12px; padding: 11px 10px;
    border-radius: 12px; background: var(--surface); border: 1px solid var(--wire);
    margin-bottom: 8px; cursor: pointer; transition: all 0.15s;
  }
  .pf-member-row:hover { background: var(--lift); border-color: rgba(96,165,250,0.35); }
  .pf-member-row img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--wire); flex-shrink:0; background: var(--lift); }
  .pf-member-info { flex: 1; min-width: 0; }
  .pf-member-name { font-size: 0.92rem; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pf-member-name .fa-star { color: var(--gold); font-size: 0.7rem; }
  .pf-member-tags { display: flex; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .pf-tag { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 100px; }
  .pf-tag.approved { background: rgba(52,211,153,0.12); color: #34d399; }
  .pf-tag.pending { background: rgba(250,204,21,0.1); color: var(--gold); }
  .pf-tag.blocked { background: rgba(239,68,68,0.12); color: var(--danger); }
  .pf-tag.role { background: rgba(96,165,250,0.12); color: var(--accent2); }
  .pf-member-row > i.fa-chevron-right { color: var(--steel); font-size: 0.75rem; flex-shrink:0; }
  .pf-loading-row, .pf-empty-row { text-align: center; padding: 30px 0; color: var(--steel); font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.08em; }

  /* ══ AVATAR LIGHTBOX ══ */
  #pf-lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3000;
    align-items: center; justify-content: center; padding: 24px;
  }
  #pf-lightbox.show { display: flex; }
  #pf-lightbox img { max-width: 90vw; max-height: 80vh; border-radius: 12px; }
  .pf-lb-close {
    position: absolute; top: 18px; right: 18px; width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
    font-size: 1rem; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }

  /* ══ TOAST ══ */
  #pf-toast-area {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 9999;
    display: flex; flex-direction: column; gap: 6px; pointer-events: none; align-items: center;
  }
  .pf-toast {
    padding: 9px 16px; border-radius: 100px; font-family: var(--font-mono); font-size: 0.75rem;
    font-weight: 700; letter-spacing: 0.06em; color: #fff; white-space: nowrap;
    animation: pftoastIn 0.25s ease; max-width: 90vw;
  }
  .pf-toast.ok { background: rgba(16,185,129,0.92); }
  .pf-toast.err { background: rgba(239,68,68,0.92); }
  .pf-toast.inf { background: rgba(59,130,246,0.92); }
  @keyframes pftoastIn { from{opacity:0;transform:translateY(-8px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
</style>
</head>
<body>

<div id="pf-shell">
  <header class="pf-topbar">
    <button class="pf-icon-btn" id="pf-back-btn" title="Back"><i class="fas fa-arrow-left"></i></button>
    <div class="pf-title" id="pf-title">My Profile</div>
    <button class="pf-icon-btn" id="pf-refresh-btn" title="Refresh"><i class="fas fa-rotate"></i></button>
  </header>

  <div id="pf-track-wrap">
    <div id="pf-track">

      <!-- SCREEN 0 — MY PROFILE -->
      <section class="pf-screen" id="screen-self">
        <div class="pf-avatar-wrap" id="pf-self-avatar-wrap">
          <img id="pf-self-avatar" src="" alt="Profile" onerror="this.src='https://ui-avatars.com/api/?background=3b82f6&color=fff&name=RC'">
          <button class="pf-zoom-btn" id="pf-self-zoom-btn" title="View full photo"><i class="fas fa-expand"></i></button>
          <label class="pf-cam-btn" for="pf-avatar-input" title="Change photo"><i class="fas fa-camera"></i></label>
          <input type="file" id="pf-avatar-input" accept="image/*" style="display:none;">
        </div>

        <div class="pf-name-row">
          <div class="pf-name-display">
            <span id="pf-self-name"></span>
            <button class="pf-edit-toggle" id="pf-edit-toggle" title="Edit profile"><i class="fas fa-pen"></i></button>
          </div>
          <input type="text" class="pf-name-input" id="pf-name-input" placeholder="Your name">
        </div>
        <div class="pf-joined" id="pf-self-joined"></div>

        <div class="pf-badges">
          <div class="pf-badge">
            <span class="pf-badge-label">STATUS</span>
            <span class="pf-badge-value" id="pf-badge-status"><i class="fas fa-circle-notch fa-spin"></i></span>
          </div>
          <div class="pf-badge">
            <span class="pf-badge-label">ACCESS</span>
            <span class="pf-badge-value" id="pf-badge-access"><i class="fas fa-circle-notch fa-spin"></i></span>
          </div>
          <div class="pf-badge">
            <span class="pf-badge-label">ROLE</span>
            <span class="pf-badge-value" id="pf-badge-role"><i class="fas fa-circle-notch fa-spin"></i></span>
          </div>
        </div>

        <div class="pf-recovery">
          <span class="pf-badge-label" style="margin-bottom:0;">RECOVERY CODE</span>
          <div class="pf-recovery-code-row">
            <code id="pf-recovery-code">Loading…</code>
            <button class="pf-copy-btn" id="pf-copy-btn">Copy</button>
          </div>
          <p>Save this code to recover your account if you lose access.</p>
        </div>

        <div class="pf-btn-row">
          <button class="pf-btn pf-btn-cancel" id="pf-cancel-btn">Cancel</button>
          <button class="pf-btn pf-btn-save" id="pf-save-btn">Save Changes</button>
        </div>

        <button class="pf-members-btn" id="pf-open-members-btn">
          <i class="fas fa-users"></i> View Members <i class="fas fa-chevron-right"></i>
        </button>
      </section>

      <!-- SCREEN 1 — MEMBERS LIST -->
      <section class="pf-screen" id="screen-members">
        <div class="pf-search-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="pf-search-input" placeholder="Search by name or recovery code…" autocomplete="off">
        </div>
        <div id="pf-members-list">
          <div class="pf-loading-row">Loading members…</div>
        </div>
      </section>

      <!-- SCREEN 2 — MEMBER PORTFOLIO -->
      <section class="pf-screen" id="screen-portfolio">
        <div class="pf-avatar-wrap">
          <img id="pf-port-avatar" src="" alt="Member" onerror="this.src='https://ui-avatars.com/api/?background=3b82f6&color=fff&name=RC'">
          <button class="pf-zoom-btn" id="pf-port-zoom-btn" title="View full photo"><i class="fas fa-expand"></i></button>
        </div>
        <div class="pf-name-row">
          <div class="pf-name-display"><span id="pf-port-name"></span></div>
        </div>
        <div class="pf-joined" id="pf-port-joined"></div>

        <div class="pf-badges">
          <div class="pf-badge">
            <span class="pf-badge-label">STATUS</span>
            <span class="pf-badge-value" id="pf-port-status"></span>
          </div>
          <div class="pf-badge">
            <span class="pf-badge-label">ACCESS</span>
            <span class="pf-badge-value" id="pf-port-access"></span>
          </div>
          <div class="pf-badge">
            <span class="pf-badge-label">ROLE</span>
            <span class="pf-badge-value" id="pf-port-role"></span>
          </div>
        </div>
      </section>

    </div>
  </div>
</div>

<div id="pf-lightbox">
  <button class="pf-lb-close" id="pf-lb-close-btn"><i class="fas fa-times"></i></button>
  <img id="pf-lb-img" src="" alt="Photo">
</div>

<div id="pf-toast-area"></div>
<canvas id="pf-crop-canvas" style="display:none;"></canvas>

<script>
'use strict';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztGcPfIe_AWXSKMcYNvhtAuL5O315bo5hgcicw5Xe4sBEyDb8dreEBi42ALnZY64l2/exec';
let userName = localStorage.getItem('userName') || '';
if (!userName) window.location.href = 'login.html';

let currentScreen = 0;          // 0 self, 1 members, 2 portfolio
let allMembersCache = [];
let isEditing = false;
let processedAvatarBase64 = '';

/* ── HELPERS ── */
function extractFileId(url) { const m = (url||'').match(/[-\w]{25,}/); return m ? m[0] : ''; }
function lh3(url, size) { const id = extractFileId(url); return id ? `https://lh3.googleusercontent.com/d/${id}${size?'=s'+size:''}` : ''; }
function fallback(name) { return `https://ui-avatars.com/api/?name=${encodeURIComponent(name||'?')}&background=1e293b&color=60a5fa&size=128`; }
function ownStoredAvatar(size) {
  const pic = localStorage.getItem('userPicLink');
  return pic ? (lh3(pic, size) || pic) : fallback(userName);
}
function formatDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  catch { return '—'; }
}
function toast(msg, type='inf', dur=3000) {
  const area = document.getElementById('pf-toast-area');
  const el = document.createElement('div');
  el.className = `pf-toast ${type}`;
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

/* ── BADGE RENDERING ── */
function statusBadgeHtml(status) {
  const s = (status||'pending').toLowerCase();
  const map = { approved:{icon:'check-circle',label:'Approved'}, pending:{icon:'clock',label:'Pending'}, blocked:{icon:'ban',label:'Blocked'} };
  const info = map[s] || { icon:'question-circle', label: status||'Unknown' };
  return { cls: s, html: `<i class="fas fa-${info.icon}"></i> ${info.label}` };
}
function accessBadgeHtml(isAdmin) {
  return isAdmin
    ? { cls:'admin', html:'<i class="fas fa-star"></i> Admin' }
    : { cls:'member', html:'<i class="fas fa-user"></i> Member' };
}
function roleBadgeHtml(role) {
  const r = (role||'').trim();
  return r
    ? { cls:'hasrole', html:`<i class="fas fa-id-badge"></i> ${r.charAt(0).toUpperCase()+r.slice(1)}` }
    : { cls:'norole', html:'<i class="fas fa-minus"></i> No Role' };
}
function applyBadge(elId, info) {
  const el = document.getElementById(elId);
  el.className = `pf-badge-value ${info.cls}`;
  el.innerHTML = info.html;
}

/* ── SELF AVATAR (topbar-independent, set immediately) ── */
document.getElementById('pf-self-avatar').src = ownStoredAvatar();
document.getElementById('pf-self-name').textContent = userName;

/* ── LOAD OWN STATUS ── */
async function loadSelf() {
  try {
    const [statusRes, membersRes] = await Promise.all([
      fetch(`${SCRIPT_URL}?operation=getUserStatus&name=${encodeURIComponent(userName)}`),
      fetch(`${SCRIPT_URL}?operation=getMembers`)
    ]);
    const statusData = await statusRes.json();
    const membersData = await membersRes.json();

    const status = (statusData.userStatus || 'pending').toLowerCase();
    const isAdmin = !!statusData.isAdmin;
    const role = statusData.role || '';

    applyBadge('pf-badge-status', statusBadgeHtml(status));
    applyBadge('pf-badge-access', accessBadgeHtml(isAdmin));
    applyBadge('pf-badge-role', roleBadgeHtml(role));

    const ownRecord = (membersData.users || []).find(u => u.name === userName);
    document.getElementById('pf-self-joined').textContent = ownRecord?.date ? `Joined ${formatDate(ownRecord.date)}` : '';

    const code = localStorage.getItem('userIdCode') || '';
    const codeEl = document.getElementById('pf-recovery-code');
    codeEl.textContent = code || 'No code found';
    codeEl.style.color = code ? 'var(--gold)' : 'var(--danger)';

  } catch (err) {
    console.error(err);
    toast('Could not load profile status', 'err');
  }
}

/* ── EDIT MODE ── */
const shellEl = document.getElementById('pf-shell');
const nameInput = document.getElementById('pf-name-input');
const avatarInput = document.getElementById('pf-avatar-input');
const canvas = document.getElementById('pf-crop-canvas');
const ctx = canvas.getContext('2d');

function setEditing(on) {
  isEditing = on;
  shellEl.classList.toggle('pf-editing', on);
  document.getElementById('screen-self').classList.toggle('pf-editing', on);
  if (on) {
    nameInput.value = userName;
    processedAvatarBase64 = '';
    avatarInput.value = '';
  }
}
document.getElementById('pf-edit-toggle').addEventListener('click', () => setEditing(true));
document.getElementById('pf-cancel-btn').addEventListener('click', () => setEditing(false));

avatarInput.addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const size = 300;
      canvas.width = canvas.height = size;
      ctx.clearRect(0,0,size,size);
      ctx.beginPath(); ctx.arc(size/2,size/2,size/2,0,Math.PI*2); ctx.closePath(); ctx.clip();
      let dw,dh,dx,dy;
      if (img.width > img.height) { dh=size; dw=img.width*(size/img.height); dx=-(dw-size)/2; dy=0; }
      else { dw=size; dh=img.height*(size/img.width); dx=0; dy=-(dh-size)/2; }
      ctx.drawImage(img,dx,dy,dw,dh);
      const dataUrl = canvas.toDataURL('image/png');
      processedAvatarBase64 = dataUrl.split(',')[1];
      document.getElementById('pf-self-avatar').src = dataUrl;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('pf-save-btn').addEventListener('click', async () => {
  const newName = nameInput.value.trim();
  const nameChanged = newName && newName !== userName;
  const avatarChanged = !!processedAvatarBase64;
  if (!nameChanged && !avatarChanged) { setEditing(false); return; }

  const btn = document.getElementById('pf-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const payload = { operation:'updateProfile', oldName:userName, identityCode: localStorage.getItem('userIdCode') };
    if (nameChanged) payload.newName = newName;
    if (avatarChanged) { payload.imageData = processedAvatarBase64; payload.imageName = `${newName||userName}_avatar.png`; }

    const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
    const result = await res.json();

    if (result.status === 'success') {
      if (nameChanged) { localStorage.setItem('userName', result.newName || newName); userName = result.newName || newName; }
      if (avatarChanged && result.picLink) { localStorage.setItem('userPicLink', result.picLink); }
      document.getElementById('pf-self-name').textContent = userName;
      document.getElementById('pf-self-avatar').src = ownStoredAvatar();
      toast('Profile updated', 'ok');
      setEditing(false);
      loadSelf();
    } else {
      toast(result.message || 'Update failed', 'err');
    }
  } catch { toast('Connection error', 'err'); }
  finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
});

document.getElementById('pf-copy-btn').addEventListener('click', () => {
  const code = document.getElementById('pf-recovery-code').textContent.trim();
  if (!code || code === 'No code found') { toast('No recovery code available', 'err'); return; }
  navigator.clipboard.writeText(code).then(() => toast('Recovery code copied', 'ok')).catch(() => toast('Copy failed', 'err'));
});

/* ── LIGHTBOX ── */
function openLightbox(src) {
  document.getElementById('pf-lb-img').src = src;
  document.getElementById('pf-lightbox').classList.add('show');
}
document.getElementById('pf-self-zoom-btn').addEventListener('click', () => openLightbox(ownStoredAvatar(1024)));
document.getElementById('pf-lb-close-btn').addEventListener('click', () => document.getElementById('pf-lightbox').classList.remove('show'));
document.getElementById('pf-lightbox').addEventListener('click', e => { if (e.target.id === 'pf-lightbox') document.getElementById('pf-lightbox').classList.remove('show'); });

/* ── NAVIGATION (drill-down track) ── */
const track = document.getElementById('pf-track');
const titleEl = document.getElementById('pf-title');
const titles = ['My Profile', 'Members', ''];

function goToScreen(index, label) {
  currentScreen = index;
  track.style.transform = `translateX(-${index * 33.3333}%)`;
  titleEl.textContent = label || titles[index];
  document.querySelectorAll('.pf-screen')[index]?.scrollTo(0,0);
}

document.getElementById('pf-back-btn').addEventListener('click', () => {
  if (currentScreen === 0) { window.location.href = 'index.html'; }
  else if (currentScreen === 2) { goToScreen(1); }
  else { goToScreen(0); setEditing(false); }
});

document.getElementById('pf-refresh-btn').addEventListener('click', () => {
  const btn = document.getElementById('pf-refresh-btn');
  btn.classList.add('spinning');
  const tasks = [loadSelf()];
  if (currentScreen >= 1) tasks.push(loadMembers());
  Promise.all(tasks).finally(() => { btn.classList.remove('spinning'); toast('Refreshed', 'ok', 1200); });
});

document.getElementById('pf-open-members-btn').addEventListener('click', () => {
  goToScreen(1);
  loadMembers();
});

/* ── MEMBERS LIST ── */
async function loadMembers() {
  const container = document.getElementById('pf-members-list');
  container.innerHTML = `<div class="pf-loading-row">Loading members…</div>`;
  try {
    const res = await fetch(`${SCRIPT_URL}?operation=getMembers`);
    const data = await res.json();
    allMembersCache = (data.users || []).filter(u => u.name !== userName);
    renderMembers(allMembersCache);
  } catch {
    container.innerHTML = `<div class="pf-loading-row">Failed to load members</div>`;
  }
}

function renderMembers(users) {
  const container = document.getElementById('pf-members-list');
  if (!users.length) { container.innerHTML = `<div class="pf-empty-row">No members found</div>`; return; }
  container.innerHTML = '';
  users.forEach(u => {
    const row = document.createElement('div');
    row.className = 'pf-member-row';
    const src = u.picLink ? lh3(u.picLink) : '';
    const st = (u.status || 'pending').toLowerCase();
    const roleVal = (u.role || '').trim();
    row.innerHTML = `
      <img src="${src || fallback(u.name)}" onerror="this.src='${fallback(u.name)}'">
      <div class="pf-member-info">
        <div class="pf-member-name">${u.name} ${u.isAdmin ? '<i class="fas fa-star" title="Admin"></i>' : ''}</div>
        <div class="pf-member-tags">
          <span class="pf-tag ${st}">${st}</span>
          ${roleVal ? `<span class="pf-tag role">${roleVal}</span>` : ''}
        </div>
      </div>
      <i class="fas fa-chevron-right"></i>`;
    row.addEventListener('click', () => showPortfolio(u));
    container.appendChild(row);
  });
}

document.getElementById('pf-search-input').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { renderMembers(allMembersCache); return; }
  renderMembers(allMembersCache.filter(u =>
    u.name.toLowerCase().includes(q) || (u.identityCode||'').toLowerCase().includes(q)
  ));
});

/* ── MEMBER PORTFOLIO ── */
function showPortfolio(u) {
  const src = u.picLink ? lh3(u.picLink, 512) : '';
  document.getElementById('pf-port-avatar').src = src || fallback(u.name);
  document.getElementById('pf-port-name').textContent = u.name;
  document.getElementById('pf-port-joined').textContent = u.date ? `Joined ${formatDate(u.date)}` : '';
  applyBadge('pf-port-status', statusBadgeHtml(u.status));
  applyBadge('pf-port-access', accessBadgeHtml(!!u.isAdmin));
  applyBadge('pf-port-role', roleBadgeHtml(u.role));

  document.getElementById('pf-port-zoom-btn').onclick = () => {
    const bigSrc = u.picLink ? (lh3(u.picLink, 1024) || src) : fallback(u.name);
    openLightbox(bigSrc);
  };

  goToScreen(2, u.name);
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', () => {
  loadSelf();
  requestAnimationFrame(() => requestAnimationFrame(() => shellEl.classList.add('in')));
});
</script>
