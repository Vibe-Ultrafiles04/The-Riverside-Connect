<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riverside Connect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="manifest" href="./manifest.json">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Riverside Connect">
  <link rel="apple-touch-icon" sizes="180x180" href="maskable_icon_x192.png">

  <meta property="og:title" content="Riverside Connect">
  <meta property="og:description" content="Join the conversation in Riverside Connect.">
  <meta property="og:image" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/maskable_icon_x192.png">
  <meta property="og:url" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    :root {
      --bg-deep:        #080d17;
      --bg-mid:         #0d1525;
      --bg-surface:     #111d30;
      --bg-panel:       rgba(16, 26, 45, 0.72);
      --bg-glass:       rgba(20, 32, 55, 0.65);
      --border-subtle:  rgba(255,255,255,0.07);
      --border-med:     rgba(255,255,255,0.12);
      --border-blue:    rgba(80, 140, 240, 0.22);
      --accent:         #e8a84c;
      --accent-dim:     rgba(232, 168, 76, 0.18);
      --accent-glow:    rgba(232, 168, 76, 0.08);
      --blue-main:      #4a90e2;
      --blue-bright:    #6babf5;
      --blue-dim:       rgba(74, 144, 226, 0.18);
      --text-primary:   #eef2f8;
      --text-secondary: #8a9cbf;
      --text-muted:     #4a5878;
      --own-bg:         linear-gradient(135deg, #1c3a6e 0%, #1a4080 100%);
      --own-border:     rgba(107, 171, 245, 0.25);
      --radius-msg:     18px;
      --font-ui:        'Plus Jakarta Sans', system-ui, sans-serif;
      --font-serif:     'Instrument Serif', Georgia, serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; overflow-x: hidden;
      position: relative;
    }

    body {
      height: 100dvh;
      min-height: -webkit-fill-available;
      font-family: var(--font-ui);
      background: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Subtle star/noise background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(30, 60, 120, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(15, 40, 90, 0.25) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════════════════
       HEADER
    ══════════════════════════════ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 13, 23, 0.82);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.25rem;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      flex: 1;
    }

    .header-logo span {
      color: var(--accent);
    }

    .hbtn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border-med);
      background: var(--bg-glass);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      flex-shrink: 0;
      position: relative;
    }

    .hbtn:hover {
      border-color: var(--border-blue);
      color: var(--text-primary);
      background: var(--blue-dim);
    }

    #user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--accent);
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #user-avatar:hover {
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* ── Badge ── */
    .badge {
      position: absolute;
      top: -3px;
      right: -3px;
      background: #e05252;
      color: white;
      font-size: 0.6rem;
      font-weight: 600;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 1.5px solid var(--bg-deep);
      display: none;
    }

    /* ══════════════════════════════
       CHAT CONTAINER
    ══════════════════════════════ */
    .chat-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .chat-container {
      flex: 1;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      padding: 24px 20px 100px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 5px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

    /* ── Date Divider ── */
    .date-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 8px;
    }

    .date-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 0 8px;
    }

    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
    }

    .date-divider-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-mid);
      padding: 4px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      white-space: nowrap;
    }

    /* ── Messages ── */
    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 78%;
      animation: msgIn 0.3s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message.own {
      margin-left: auto;
      flex-direction: row-reverse;
    }

    .message + .message { margin-top: 6px; }
    .message.new-sender { margin-top: 16px; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border-med);
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 2px;
    }

    .avatar-placeholder {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .message-content {
      background: var(--bg-glass);
      border: 1px solid var(--border-subtle);
      backdrop-filter: blur(10px);
      padding: 10px 14px;
      border-radius: var(--radius-msg);
      border-bottom-left-radius: 5px;
      max-width: calc(100% - 44px);
      position: relative;
    }

    .message.own .message-content {
      background: var(--own-bg);
      border: 1px solid var(--own-border);
      border-bottom-left-radius: var(--radius-msg);
      border-bottom-right-radius: 5px;
    }

    /* Hide avatar on consecutive messages from same sender */
    .message.same-sender .avatar { visibility: hidden; }

    .msg-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--blue-bright);
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .message.own .msg-name { color: rgba(255,255,255,0.65); }
    .message.same-sender .msg-name { display: none; }

    .msg-text {
      font-size: 0.93rem;
      line-height: 1.5;
      word-break: break-word;
      color: var(--text-primary);
    }

    .msg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 5px;
      gap: 8px;
    }

    .msg-time {
      font-size: 0.68rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .message.own .msg-time { color: rgba(255,255,255,0.38); }

    /* ── Actions ── */
    .msg-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .message:hover .msg-actions { opacity: 1; }

    .action-btn {
      font-size: 0.7rem;
      font-weight: 500;
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      width: auto;
      height: auto;
      padding: 3px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .action-btn:hover {
      background: var(--blue-dim);
      border-color: var(--border-blue);
      color: var(--blue-bright);
      transform: none;
      box-shadow: none;
    }

    .action-btn.delete-btn:hover {
      background: rgba(224, 82, 82, 0.12);
      border-color: rgba(224, 82, 82, 0.25);
      color: #e05252;
    }

    /* ── Quoted reply ── */
    .quoted-msg {
      background: rgba(0,0,0,0.2);
      border-left: 2.5px solid var(--blue-bright);
      padding: 6px 10px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      max-width: 100%;
      overflow: hidden;
    }

    .message.own .quoted-msg {
      background: rgba(255,255,255,0.08);
      border-left-color: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.65);
    }

    .quoted-msg strong { color: var(--blue-bright); }
    .message.own .quoted-msg strong { color: rgba(255,255,255,0.85); }

    /* ── Media ── */
    .media-content {
      margin: 8px 0;
      border-radius: 10px;
      overflow: hidden;
    }

    .media-content img {
      max-width: 100%;
      max-height: 280px;
      display: block;
      border-radius: 10px;
      object-fit: cover;
    }

    .video-container {
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0;
    }

    .video-container iframe {
      width: 100%;
      height: auto;
      min-height: 180px;
      aspect-ratio: 16/9;
      display: block;
      border: none;
    }

    .audio-container iframe {
      width: 100%;
      height: 80px;
      border: none;
    }

    .message:has(.video-container) { max-width: 90%; }
    .message:has(.video-container) .message-content { max-width: 100%; min-width: 260px; width: 100%; }
    .message:has(.audio-container) { max-width: 85%; }
    .message:has(.audio-container) .message-content { max-width: 100%; min-width: 220px; }

    /* ── Inline edit ── */
    .edit-input {
      width: 100%;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border-blue);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 6px;
      resize: none;
    }

    /* ══════════════════════════════
       CALL CARD
    ══════════════════════════════ */
    .call-card {
      background: rgba(24, 80, 48, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.25);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .call-card-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: white;
      flex-shrink: 0;
      animation: callPulse 2s ease-in-out infinite;
    }

    @keyframes callPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50%      { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }

    .call-card-icon.ended {
      background: linear-gradient(135deg, #374151, #1f2937);
      animation: none;
    }

    .call-card.ended-card { opacity: 0.5; filter: grayscale(60%); }
    .call-card-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
    .call-card-sub { font-size: 0.76rem; color: var(--text-muted); }

    .join-call-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .join-call-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(34,197,94,0.35); }
    .join-call-btn.ended { background: #374151; cursor: default; }
    .join-call-btn.ended:hover { transform: none; box-shadow: none; }

    /* ══════════════════════════════
       INPUT AREA
    ══════════════════════════════ */
    #reply-preview {
      display: none;
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
      padding: 8px 20px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      position: relative;
      z-index: 2;
    }

    #reply-preview strong { color: var(--blue-bright); }

    .reply-cancel-btn {
      width: 22px; height: 22px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .reply-cancel-btn:hover { color: #e05252; }

    #preview-bar {
      display: none;
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
      padding: 8px 20px;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 2;
    }

    #preview-bar img, #preview-bar video { height: 48px; border-radius: 6px; }

    .input-area {
      background: rgba(6, 10, 18, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 14px 20px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .input-wrapper {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: none;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      flex-shrink: 0;
      text-decoration: none;
    }

    .input-icon-btn:hover {
      border-color: var(--border-blue);
      color: var(--blue-bright);
      background: var(--blue-dim);
    }

    #callBtn {
      color: #4ade80;
      border-color: rgba(74,222,128,0.2);
    }

    #callBtn:hover {
      background: rgba(74, 222, 128, 0.1);
      border-color: rgba(74,222,128,0.4);
      color: #4ade80;
    }

    #comment {
      flex: 1;
      min-width: 0;
      padding: 11px 18px;
      border-radius: 22px;
      background: var(--bg-glass);
      color: var(--text-primary);
      font-size: 0.93rem;
      font-family: var(--font-ui);
      border: 1px solid var(--border-subtle);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #comment:focus {
      border-color: var(--border-blue);
      background: rgba(20, 34, 60, 0.8);
    }

    #comment::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    #sendBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37,99,235,0.45);
    }

    #sendBtn:disabled { opacity: 0.5; transform: none; box-shadow: none; }

    /* ══════════════════════════════
       TOASTS
    ══════════════════════════════ */
    #toast-container {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-surface);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid var(--border-med);
      border-left: 3px solid var(--blue-main);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toastIn 0.25s ease both;
      min-width: 200px;
      white-space: nowrap;
    }

    .toast.error { border-left-color: #e05252; }
    .toast.info  { border-left-color: var(--accent); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-12px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ══════════════════════════════
       PROFILE MODAL
    ══════════════════════════════ */
    #profile-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 16, 0.8);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow-y: auto;
    }

    .modal-panel {
      background: var(--bg-surface);
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      padding: 28px 24px;
      border: 1px solid var(--border-med);
      animation: panelIn 0.3s cubic-bezier(.22,.68,0,1.2) both;
      max-height: 88vh;
      overflow-y: auto;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: scale(0.94) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.4rem;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 24px;
    }

    .avatar-ring {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--accent);
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-ring label {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      cursor: pointer;
      transition: opacity 0.2s;
      font-size: 1.5rem;
      color: white;
    }

    .avatar-ring:hover label { opacity: 1; }

    .modal-field {
      margin-bottom: 20px;
    }

    .modal-label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
    }

    .modal-input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-med);
      color: var(--text-primary);
      font-size: 0.93rem;
      font-family: var(--font-ui);
      outline: none;
      transition: border-color 0.2s;
    }

    .modal-input:focus { border-color: var(--border-blue); }

    .recovery-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 20px;
    }

    .recovery-code {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      color: var(--accent);
      background: rgba(0,0,0,0.25);
      padding: 8px 12px;
      border-radius: 7px;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-top: 8px;
      word-break: break-all;
    }

    .modal-error { color: #e05252; font-size: 0.82rem; margin-top: 6px; min-height: 18px; }

    .btn-row { display: flex; gap: 12px; }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-med);
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover { background: rgba(255,255,255,0.09); color: var(--text-primary); }

    .btn-save {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border: none;
      color: white;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save:hover { box-shadow: 0 4px 16px rgba(37,99,235,0.4); }
    .btn-save:disabled { opacity: 0.55; }

    /* ══════════════════════════════
       CALL MODAL
    ══════════════════════════════ */
    #callModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 16, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 3000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #callModal .modal-panel { max-width: 420px; }

    .call-type-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .call-tab {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
      background: none;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .call-tab.active {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.3);
      color: #4ade80;
      font-weight: 600;
    }

    #memberListContainer {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 14px;
    }

    .call-option-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .call-option-row:hover { background: rgba(255,255,255,0.05); }
    .call-option-row input[type=checkbox] { accent-color: #22c55e; width: 16px; height: 16px; cursor: pointer; }
    .call-option-row img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-subtle); }
    .call-option-label { font-size: 0.9rem; color: var(--text-primary); }

    .placeholder-av {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--bg-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      border: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .btn-start-call {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: var(--font-ui);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start-call:hover { box-shadow: 0 4px 16px rgba(34,197,94,0.35); }
    .btn-start-call:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-outline {
      width: 100%;
      margin-top: 8px;
      padding: 11px;
      background: none;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: 0.88rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-outline:hover { border-color: var(--border-med); color: var(--text-secondary); }

    /* ══════════════════════════════
       INSTALL MODAL
    ══════════════════════════════ */
    #installModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 16, 0.8);
      backdrop-filter: blur(10px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    /* ══════════════════════════════
       PENDING / UNAPPROVED VIEW
    ══════════════════════════════ */
    .pending-wrap {
      text-align: center;
      padding: 40px 20px 80px;
      max-width: 680px;
      margin: 0 auto;
    }

    .pending-title {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 2rem;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .pending-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .slider-track {
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      display: flex;
      gap: 14px;
      padding-bottom: 10px;
      scroll-padding: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--border-med) transparent;
    }

    .slide-card {
      flex: 0 0 calc(min(280px, 85vw));
      scroll-snap-align: start;
      background: var(--bg-glass);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      overflow: hidden;
    }

    .slide-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .slide-card .slide-body {
      padding: 16px;
    }

    .slide-ref {
      font-weight: 600;
      color: var(--blue-bright);
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .slide-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 500px) {
      .chat-container { padding: 16px 12px 90px; }
      .message { max-width: 88%; }
      .message.own { max-width: 88%; }
      header { height: 56px; padding: 0 14px; }
      .header-logo { font-size: 1.1rem; }
    }

    @supports (padding-top: env(safe-area-inset-top)) {
      header { padding-top: env(safe-area-inset-top); height: calc(60px + env(safe-area-inset-top)); }
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      gap: 12px;
    }

    .empty-state i { font-size: 2.5rem; opacity: 0.3; }
  </style>
</head>
<body>

<div id="toast-container"></div>

<!-- ══ HEADER ══ -->

  <div class="header-inner">
    <img id="user-avatar" src="" alt="Profile"
         onerror="this.src='https://via.placeholder.com/38?text=@';">

    <div class="header-logo">Riverside <span>Connect</span></div>

    <a href="index.html" class="hbtn" title="Home" style="text-decoration:none;">

    <div style="position:relative;">

<div class="chat-wrap">

<!-- ══ REPLY PREVIEW ══ -->
<div id="reply-preview">

<div id="preview-bar">

  <button id="removeFile" class="hbtn" style="border-color:rgba(224,82,82,0.3);color:#e05252;width:34px;height:34px;">

<!-- ══ PROFILE MODAL ══ -->

    <div class="avatar-ring">

    <div class="modal-field">

    <div class="recovery-box">

        <button id="copy-recovery-btn" style="padding:6px 12px;background:var(--blue-dim);border:1px solid var(--border-blue);color:var(--blue-bright);border-radius:7px;font-size:0.8rem;font-weight:500;cursor:pointer;">Copy</button>

</div>

<!-- ══ CALL MODAL ══ -->
<div id="callModal">
  <div class="modal-panel">
    <h2 class="modal-title" style="color:#4ade80;font-family:var(--font-ui);font-style:normal;font-size:1.2rem;">
      <i class="fas fa-phone" style="margin-right:8px;"></i>Start a Call
    </h2>

    <input type="text" id="callTitleInput" class="modal-input"
           placeholder="Call title (optional)…" style="margin-bottom:14px;">

    <div class="call-type-tabs">
      <button class="call-tab active" id="tabAll" onclick="setCallType('all')">
        <i class="fas fa-users"></i> All Members

    <div id="memberListContainer" style="display:none;">

    </div>

<!-- ══ INSTALL MODAL ══ -->
<div id="installModal">
  <div class="modal-panel" style="max-width:320px;text-align:center;">
    <i class="fas fa-mobile-alt" style="font-size:2rem;color:var(--accent);margin-bottom:16px;display:block;"></i>
    <h2 style="font-family:var(--font-serif);font-style:italic;margin-bottom:10px;">Install App</h2>
    <p style="font-size:0.88rem;color:var(--text-secondary);margin-bottom:24px;">
      Install Riverside Connect for faster access right from your home screen.
    </p>
    <div style="display:flex;gap:10px;">
      <button id="installYes" class="btn-save">Install</button>
      <button id="installNo" class="btn-cancel">Cancel</button>
    </div>
  </div>
</div>

<canvas id="cropCanvas" style="display:none;"></canvas>

<script>
const scriptUrl = 'https://script.google.com/macros/s/AKfycbygp2-CU0rgs4eOq9vTALV7fFTuPRgIOa6wl2xhbSmoxqXZpXPP7mBMg1hT_PfE8uTs/exec';

let userName = localStorage.getItem('userName');
let callType = 'all';
let allMembersCache = [];
let isApproved = false;
let lastCommentCount = 0;
let pollingInterval = null;
let selectedFileData = null;
let replyingTo = null;

if (!userName) window.location.href = 'login.html';

/* ── Load own avatar ── */
const userAvatarImg = document.getElementById('user-avatar');
const storedPicLink = localStorage.getItem('userPicLink');
if (storedPicLink) {
  const id = extractFileId(storedPicLink);
  userAvatarImg.src = id ? `https://lh3.googleusercontent.com/d/${id}` : storedPicLink;
} else {
  userAvatarImg.src = 'https://via.placeholder.com/38?text=@';
}

const commentsDiv   = document.getElementById('comments');
const commentInput  = document.getElementById('comment');
const sendBtn       = document.getElementById('sendBtn');
const fileInput     = document.getElementById('fileInput');
const addFileBtn    = document.getElementById('addFileBtn');
const previewBar    = document.getElementById('preview-bar');
const previewContainer = document.getElementById('file-preview-container');
const removeFileBtn = document.getElementById('removeFile');

addFileBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    selectedFileData = { base64: e.target.result.split(',')[1], type: file.type, name: file.name };
    let html = '';
    if (file.type.startsWith('video'))      html = `<video src="${e.target.result}" style="height:48px;border-radius:6px;" muted></video>`;
    else if (file.type.startsWith('audio')) html = `<audio src="${e.target.result}" style="height:36px;width:140px;" controls></audio>`;
    else                                    html = `<img src="${e.target.result}" style="height:48px;border-radius:6px;">`;
    previewContainer.innerHTML = html;
    previewBar.style.display = 'flex';
  };
  reader.readAsDataURL(file);
});

removeFileBtn.addEventListener('click', () => {
  selectedFileData = null;
  fileInput.value = '';
  previewBar.style.display = 'none';
});

/* ════════════════════════════════
   DATE-GROUPED RENDER
════════════════════════════════ */
function groupByDate(comments) {
  const groups = {};
  comments.forEach(c => {
    const d = new Date(c.timestamp);
    const key = d.toDateString();
    if (!groups[key]) groups[key] = { date: d, messages: [] };
    groups[key].messages.push(c);
  });
  return groups;
}

function formatDateLabel(dateObj) {
  const now = new Date();
  const date = new Date(dateObj);
  const today = now.toDateString();
  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  if (date.toDateString() === today) return 'Today';
  if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return date.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
}

function formatTime(timestamp) {
  return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function loadComments(silent = true) {
  try {
    const response = await fetch(`${scriptUrl}?operation=getData`);
    const data = await response.json();

    if (silent && data.comments.length === lastCommentCount) return;
    lastCommentCount = data.comments.length;

    const wasAtBottom = Math.abs(commentsDiv.scrollHeight - commentsDiv.clientHeight - commentsDiv.scrollTop) < 150;

    if (data.announcements) updateAnnBadge(data.announcements.length);

    const rawComments = [...data.comments].reverse();
    const groups = groupByDate(rawComments);

    commentsDiv.innerHTML = '';

    Object.keys(groups).forEach(dateKey => {
      const { date, messages } = groups[dateKey];

      const groupDiv = document.createElement('div');
      groupDiv.className = 'date-group';

      const divider = document.createElement('div');
      divider.className = 'date-divider';
      divider.innerHTML = `<span class="date-divider-label">${formatDateLabel(date)}</span>`;
      groupDiv.appendChild(divider);

      let prevSender = null;

      messages.forEach((c, idx) => {

        /* ── Call card ── */
        if (c.comment && c.comment.startsWith('{"type":"call"')) {
          try {
            const callData = JSON.parse(c.comment);
            if (callData.type === 'call') {
              const isOwn = c.name === userName;
              const isInvited = callData.isAllUsers || (callData.invitees||[]).some(i => i.username === userName);
              if (!isInvited && !isOwn) return;

              const msg = document.createElement('div');
              msg.className = `message ${isOwn ? 'own' : ''} new-sender`;
              msg.innerHTML = buildCallCard(c, callData);

              if (isOwn) {
                const acts = document.createElement('div');
                acts.className = 'msg-actions';
                acts.style.opacity = '0';
                acts.innerHTML = `<button class="action-btn delete-btn" onclick="deleteMsg('${c.timestamp}')"><i class="fas fa-trash"></i> Delete</button>`;
                const mc = msg.querySelector('.message-content');
                if (mc) mc.appendChild(acts);
                msg.addEventListener('mouseenter', () => acts.style.opacity = '1');
                msg.addEventListener('mouseleave', () => acts.style.opacity = '0');
              }
              groupDiv.appendChild(msg);
              prevSender = null;
              return;
            }
          } catch(e) {}
        }

        const isOwn     = c.name === userName;
        const isSame    = (prevSender === c.name);
        const mediaLink = getLh3Link(c.fileLink);

        let mediaHtml = '';
        if (mediaLink) {
          const ext = (c.fileLink||'').toLowerCase();
          if (ext.match(/\.(mp4|mov|webm|m4v)$/i) || (c.fileType&&c.fileType.includes('video'))) {
            mediaHtml = `<div class="video-container"><iframe src="${c.fileLink}" allowfullscreen allow="autoplay;fullscreen;picture-in-picture" loading="lazy"></iframe></div>`;
          } else if (ext.match(/\.(mp3|wav|ogg|aac|m4a)$/i) || (c.fileType&&c.fileType.includes('audio'))) {
            mediaHtml = `<div class="audio-container"><iframe src="${c.fileLink}" allow="autoplay" loading="lazy" style="height:80px;"></iframe></div>`;
          } else {
            mediaHtml = `<div class="media-content"><img src="${mediaLink}" loading="lazy"></div>`;
          }
        }

        const replyHtml = c.replyTo ? `
          <div class="quoted-msg">
            <strong>@${c.replyTo.name}</strong>: ${c.replyTo.text.substring(0,60)}${c.replyTo.text.length>60?'…':''}
          </div>` : '';

        const actionsHtml = `
          <div class="msg-actions">
            <button class="action-btn" onclick="setReply('${c.name}','${c.comment.replace(/'/g,"\\'")}')"><i class="fas fa-reply"></i> Reply</button>
            ${isOwn ? `
              <button class="action-btn" onclick="startEdit('${c.timestamp}','${c.comment.replace(/'/g,"\\'")}')"><i class="fas fa-edit"></i> Edit</button>
              <button class="action-btn delete-btn" onclick="deleteMsg('${c.timestamp}')"><i class="fas fa-trash"></i></button>
            ` : ''}
          </div>`;

        const avatarSrc = `https://lh3.googleusercontent.com/d/${extractFileId(c.picLink)}`;

        const msg = document.createElement('div');
        msg.className = `message ${isOwn ? 'own' : ''} ${!isSame ? 'new-sender' : 'same-sender'}`;

        msg.innerHTML = `
          ${!isOwn ? `<img src="${avatarSrc}" class="avatar" onerror="this.style.visibility='hidden'">` : ''}
          <div class="message-content">
            ${!isSame ? `<div class="msg-name">${c.name}</div>` : ''}
            ${replyHtml}
            ${mediaHtml}
            <div class="msg-text" id="text-${c.timestamp}">${c.comment}</div>
            <div class="msg-footer">
              <span class="msg-time">${formatTime(c.timestamp)}</span>
              ${actionsHtml}
            </div>
          </div>
          ${isOwn ? `<img src="${avatarSrc}" class="avatar ${isSame ? 'same-sender' : ''}" onerror="this.style.visibility='hidden'">` : ''}
        `;

        groupDiv.appendChild(msg);
        prevSender = c.name;
      });

      commentsDiv.appendChild(groupDiv);
    });

    if (!silent || wasAtBottom) scrollToBottom(true);
  } catch(err) {
    console.error('Failed to load messages:', err);
  }
}

/* ════════════════════════════════
   STATUS CHECK
════════════════════════════════ */
async function checkUserStatus() {
  try {
    const res  = await fetch(`${scriptUrl}?operation=getUserStatus&name=${encodeURIComponent(userName)}`);
    const data = await res.json();
    if (data.status !== 'success') { showToast('Cannot verify account', 'error'); return; }

    const status = data.userStatus.toLowerCase();
    isApproved = (status === 'approved');

    const bellWrap = document.querySelector('#ann-badge')?.closest('div[style*="position"]') || document.querySelector('a[href="announce.html"]')?.parentElement;

    if (isApproved) {
      loadComments(false);
      startPolling();
      commentInput.focus();
    } else {
      commentsDiv.innerHTML = buildPendingView(userName, status);
      commentInput.disabled = true;
      commentInput.placeholder = 'Account awaiting approval…';
      commentInput.style.opacity = '0.5';
      sendBtn.disabled = true;
      sendBtn.style.opacity = '0.4';
      addFileBtn.disabled = true;
      addFileBtn.style.opacity = '0.4';
      if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
      showToast('Your account is awaiting approval', 'info');
    }
  } catch(err) {
    console.error(err);
    commentsDiv.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><span>Could not verify account. Please try again.</span></div>`;
  }
}

function buildPendingView(name, status) {
  return `
    <div class="pending-wrap">
      <div class="pending-title">Welcome to Riverside</div>
      <p class="pending-subtitle">Hello <strong>${name}</strong> — your account is <strong style="color:${status==='pending'?'#e8a84c':'#e05252'}">${status==='pending'?'awaiting approval':'not yet active'}</strong>.</p>
      <div style="background:var(--bg-glass);border:1px solid var(--border-subtle);border-radius:16px;padding:20px;text-align:left;">

function scrollToBottom(force = false) {
  const near = Math.abs(commentsDiv.scrollHeight - commentsDiv.clientHeight - commentsDiv.scrollTop) < 150;
  if (force || near) commentsDiv.scrollTop = commentsDiv.scrollHeight;
}

function extractFileId(url) {
  if (!url) return '';
  const m = url.match(/[-\w]{25,}/);
  return m ? m[0] : '';
}

function getLh3Link(url) {
  const id = extractFileId(url);
  return id ? `https://lh3.googleusercontent.com/d/${id}` : '';
}

function showToast(message, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fas fa-${type==='error'?'exclamation-circle':type==='info'?'info-circle':'check-circle'}"></i> <span>${message}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(-8px)'; t.style.transition='all 0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

function setReply(name, text) {
  replyingTo = { name, text };
  document.getElementById('reply-text').innerHTML = `Replying to <strong>${name}</strong>: <em style="opacity:.7;">${text.substring(0,35)}${text.length>35?'…':''}</em>`;
  document.getElementById('reply-preview').style.display = 'flex';
  commentInput.focus();
}

function cancelReply() {
  replyingTo = null;
  document.getElementById('reply-preview').style.display = 'none';
}

async function deleteMsg(timestamp) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(4,8,16,0.82);backdrop-filter:blur(10px);z-index:4000;display:flex;align-items:center;justify-content:center;padding:16px;';
  overlay.innerHTML = `
    <div style="background:var(--bg-surface);padding:24px;border-radius:16px;border:1px solid var(--border-med);text-align:center;max-width:300px;width:100%;">
      <i class="fas fa-trash" style="font-size:1.8rem;color:#e05252;margin-bottom:14px;display:block;"></i>
      <p style="font-weight:600;margin-bottom:6px;">Delete message?</p>
      <p style="font-size:0.83rem;color:var(--text-muted);margin-bottom:22px;">This action cannot be undone.</p>
      <div style="display:flex;gap:10px;">
        <button id="cxDel" class="btn-cancel">Cancel</button>
        <button id="cfDel" style="flex:1;padding:12px;background:#e05252;border:none;border-radius:10px;color:white;font-weight:600;cursor:pointer;font-family:var(--font-ui);">Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#cxDel').onclick = () => overlay.remove();
  overlay.querySelector('#cfDel').onclick = async () => {
    overlay.remove();
    try {
      const res = await fetch(scriptUrl, { method:'POST', body: JSON.stringify({ operation:'deleteComment', name:userName, timestamp }) });
      const r = await res.json();
      if (r.status==='success') { showToast('Message deleted'); loadComments(false); }
      else showToast(r.message||'Delete failed','error');
    } catch { showToast('Connection error','error'); }
  };
}

function startEdit(timestamp, originalText) {
  const el = document.getElementById(`text-${timestamp}`);
  el.innerHTML = `
    <textarea class="edit-input" id="ef-${timestamp}">${originalText}</textarea>
    <div style="display:flex;gap:6px;">
      <button class="action-btn" style="background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:#4ade80;" onclick="saveEdit('${timestamp}')">Save</button>
      <button class="action-btn" onclick="loadComments(false)">Cancel</button>
    </div>`;
  const input = document.getElementById(`ef-${timestamp}`);
  if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
}

async function saveEdit(timestamp) {
  const newText = (document.getElementById(`ef-${timestamp}`)?.value||'').trim();
  if (!newText) return;
  try {
    const res = await fetch(scriptUrl, { method:'POST', body: JSON.stringify({ operation:'editComment', name:userName, timestamp, newText }) });
    const r = await res.json();
    if (r.status==='success') { showToast('Message updated'); loadComments(false); }
    else showToast(r.message||'Update failed','error');
  } catch { showToast('Connection error','error'); }
}

async function sendMessage() {
  const text = commentInput.value.trim();
  if (!text && !selectedFileData) return;
  sendBtn.disabled = true;
  try {
    const res = await fetch(scriptUrl, {
      method: 'POST',
      body: JSON.stringify({ operation:'postComment', name:userName, comment:text, file:selectedFileData, replyTo:replyingTo })
    });
    const r = await res.json();
    if (r.status==='success') {
      commentInput.value = '';
      cancelReply();
      if (selectedFileData) removeFileBtn.click();
      await loadComments(false);
    } else showToast(r.message||'Failed to send','error');
  } catch { showToast('Network error','error'); }
  finally { sendBtn.disabled = false; }
}

sendBtn.addEventListener('click', sendMessage);
commentInput.addEventListener('keypress', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function startPolling() {
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(() => loadComments(true), 8000);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { if (pollingInterval) clearInterval(pollingInterval); }
  else if (isApproved) { loadComments(true); startPolling(); }
});

/* ── Ann Badge ── */
async function updateAnnBadge() {
  const badge = document.getElementById('ann-badge');
  try {
    const res  = await fetch(`${scriptUrl}?operation=getUnseenAnnCount&name=${encodeURIComponent(userName)}`);
    const data = await res.json();

const profileModal     = document.getElementById('profile-modal');
const modalAvatar      = document.getElementById('modal-avatar');
const modalNameInput   = document.getElementById('modal-name-input');
const modalError       = document.getElementById('modal-error');
const modalSaveBtn     = document.getElementById('modal-save-btn');
const modalCancelBtn   = document.getElementById('modal-cancel-btn');
const modalAvatarInput = document.getElementById('modal-avatar-input');
const canvas           = document.getElementById('cropCanvas');
const ctx              = canvas.getContext('2d');
let processedAvatarBase64 = '';

function openProfileModal() {
  modalNameInput.value = userName || '';
  modalAvatar.src = userAvatarImg.src;
  modalError.textContent = '';
  processedAvatarBase64 = '';
  profileModal.style.display = 'flex';
  modalAvatarInput.value = '';
  const code = localStorage.getItem('userIdCode') || '';
  const el = document.getElementById('recovery-code-display');
  el.textContent = code || 'No code found';
  el.style.color = code ? 'var(--accent)' : '#e05252';
}

function closeProfileModal() {
  profileModal.style.display = 'none';
  processedAvatarBase64 = '';
  modalAvatarInput.value = '';
}

userAvatarImg.addEventListener('click', openProfileModal);
modalCancelBtn.addEventListener('click', closeProfileModal);
profileModal.addEventListener('click', e => { if (e.target === profileModal) closeProfileModal(); });

modalAvatarInput.addEventListener('change', e => {
  const file = e.target.files?.[0];
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const size = 300;
      canvas.width = canvas.height = size;
      ctx.clearRect(0,0,size,size);
      ctx.beginPath();
      ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
      ctx.closePath();
      ctx.clip();
      let dw,dh,dx,dy;
      if (img.width > img.height) { dh=size; dw=img.width*(size/img.height); dx=-(dw-size)/2; dy=0; }
      else { dw=size; dh=img.height*(size/img.width); dx=0; dy=-(dh-size)/2; }
      ctx.drawImage(img,dx,dy,dw,dh);
      const dataUrl = canvas.toDataURL('image/png');
      processedAvatarBase64 = dataUrl.split(',')[1];
      modalAvatar.src = dataUrl;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

modalSaveBtn.addEventListener('click', async () => {
  const newName = (modalNameInput.value||'').trim();
  const nameChanged   = newName && newName !== userName;
  const avatarChanged = !!processedAvatarBase64;
  if (!nameChanged && !avatarChanged) { closeProfileModal(); return; }
  modalSaveBtn.disabled = true;
  modalSaveBtn.textContent = 'Saving…';
  try {
    const payload = { operation:'updateProfile', oldName:userName, identityCode:localStorage.getItem('userIdCode') };
    if (nameChanged) payload.newName = newName;
    if (avatarChanged) { payload.imageData = processedAvatarBase64; payload.imageName = `${newName||userName}_avatar.png`; }
    const res  = await fetch(scriptUrl, { method:'POST', body:JSON.stringify(payload) });
    const result = await res.json();
    if (result.status==='success') {
      if (nameChanged) { localStorage.setItem('userName', result.newName||newName); userName = result.newName||newName; }
      if (avatarChanged && result.picLink) {
        localStorage.setItem('userPicLink', result.picLink);
        userAvatarImg.src = result.picLink;
      }
      showToast('Profile updated');
      processedAvatarBase64 = '';
      closeProfileModal();
      loadComments(false);
    } else { modalError.textContent = result.message||'Update failed'; }
  } catch { modalError.textContent = 'Connection error'; }
  finally { modalSaveBtn.disabled = false; modalSaveBtn.textContent = 'Save Changes'; }
});

document.getElementById('copy-recovery-btn').addEventListener('click', () => {
  const code = document.getElementById('recovery-code-display').textContent.trim();
  if (!code || code === 'No code found') { showToast('No recovery code available','error'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('Recovery code copied!')).catch(() => showToast('Copy failed','error'));
});

function setCallType(type) {
  callType = type;
  document.getElementById('tabAll').classList.toggle('active', type==='all');
  document.getElementById('tabSelect').classList.toggle('active', type==='select');
  document.getElementById('memberListContainer').style.display = type==='select' ? 'block' : 'none';
}

document.getElementById('callBtn').addEventListener('click', async () => {
  if (!isApproved) { showToast('Account not yet approved','error'); return; }
  document.getElementById('callModal').style.display = 'flex';
  loadMembersForCall();
});

document.getElementById('callModal').addEventListener('click', e => {
  if (e.target === document.getElementById('callModal')) document.getElementById('callModal').style.display = 'none';
});

async function loadMembersForCall() {
  if (allMembersCache.length > 0) { renderMemberList(); return; }
  try {
    const res  = await fetch(`${scriptUrl}?operation=getMembers`);
    const data = await res.json();
    allMembersCache = (data.users||[]).filter(u => u.status==='approved' && u.name!==userName);
    renderMemberList();
  } catch(e) { console.error('Members load failed',e); }
}

function renderMemberList() {
  const container = document.getElementById('memberList');
  container.innerHTML = '';
  allMembersCache.forEach(u => {
    const row = document.createElement('div');
    row.className = 'call-option-row';
    const chk = document.createElement('input');
    chk.type='checkbox'; chk.value=u.name; chk.dataset.pic=u.picLink||''; chk.id='chk-'+u.name;
    const src = u.picLink ? getLh3Link(u.picLink) : '';
    let av;
    if (src) { av=document.createElement('img'); av.src=src; av.onerror=()=>av.style.display='none'; }
    else { av=document.createElement('div'); av.className='placeholder-av'; av.innerHTML='<i class="fas fa-user"></i>'; }
    const lbl = document.createElement('label');
    lbl.htmlFor='chk-'+u.name; lbl.className='call-option-label'; lbl.textContent=u.name;
    row.appendChild(chk); row.appendChild(av); row.appendChild(lbl);
    row.addEventListener('click', e => { if(e.target!==chk) chk.checked=!chk.checked; });
    container.appendChild(row);
  });
}

document.getElementById('startCallBtn').addEventListener('click', async () => {
  const btn   = document.getElementById('startCallBtn');
  const title = document.getElementById('callTitleInput').value.trim() || `${userName}'s Call`;
  let invitees = [];
  if (callType==='select') {
    const checked = document.querySelectorAll('#memberList input[type=checkbox]:checked');
    if (!checked.length) { showToast('Select at least one person','error'); return; }
    invitees = Array.from(checked).map(c => ({ username:c.value, picLink:c.dataset.pic }));
  }
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Starting…';
  try {
    const res = await fetch(scriptUrl, { method:'POST', body:JSON.stringify({ operation:'initiateCall', username:userName, picLink:localStorage.getItem('userPicLink')||'', title, invitees, isAllUsers:callType==='all' }) });
    const data = await res.json();
    if (data.status==='success') {
      document.getElementById('callModal').style.display='none';
      window.location.href = `call.html?callId=${data.callId}&host=1`;
      loadComments(false);
    } else showToast(data.message||'Failed to start call','error');
  } catch { showToast('Network error','error'); }
  finally { btn.disabled=false; btn.innerHTML='<i class="fas fa-phone"></i> Start Call'; }
});

/* ── Call card builder ── */
function buildCallCard(c, callData) {
  const isEnded = callData.status==='ended';
  const isOwn   = c.name===userName;
  const canJoin = !isEnded && (callData.isAllUsers || (callData.invitees||[]).some(i=>i.username===userName) || isOwn);
  const callUrl = `call.html?callId=${encodeURIComponent(callData.callId)}`;
  const invText = callData.isAllUsers ? 'Everyone' : (callData.invitees||[]).map(i=>i.username).slice(0,3).join(', ') + ((callData.invitees||[]).length>3?` +${callData.invitees.length-3}`:'');
  const picId   = extractFileId(c.picLink);
  const btnHtml = canJoin
    ? `<a href="${callUrl}" class="join-call-btn"><i class="fas fa-phone"></i> Join</a>`
    : `<span class="join-call-btn ended"><i class="fas fa-phone-slash"></i> Ended</span>`;

  return `
    ${picId ? `<img src="https://lh3.googleusercontent.com/d/${picId}" class="avatar">` : '<div class="avatar-placeholder"></div>'}
    <div class="message-content" style="background:transparent;border:none;padding:8px 0;">
      <div class="msg-name">${c.name}</div>
      <div class="call-card ${isEnded?'ended-card':''}">
        <div class="call-card-icon ${isEnded?'ended':''}">
          <i class="fas fa-${isEnded?'phone-slash':'phone-volume'}"></i>
        </div>
        <div style="flex:1;min-width:0;">
          <div class="call-card-title">${callData.title||'Call'}</div>
          <div class="call-card-sub"><i class="fas fa-users" style="font-size:0.7rem;margin-right:4px;"></i>${invText}</div>
        </div>
        ${btnHtml}
      </div>
      <span class="msg-time">${formatTime(c.timestamp)}</span>
    </div>`;
}

let deferredPrompt;
const installBtn   = document.getElementById('installAppBtn');
const installModal = document.getElementById('installModal');

if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true) {
  if (installBtn) installBtn.style.display='none';
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (installBtn) installBtn.style.display='flex';
});

installBtn?.addEventListener('click', () => { installModal.style.display='flex'; });
document.getElementById('installNo').addEventListener('click',  () => { installModal.style.display='none'; });
document.getElementById('installYes').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome==='accepted' && installBtn) installBtn.style.display='none';
  deferredPrompt=null;
  installModal.style.display='none';
});

window.addEventListener('appinstalled', () => {
  if (installBtn) installBtn.style.display='none';
  installModal.style.display='none';
  deferredPrompt=null;
});

checkUserStatus();
updateAnnBadge();
