<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riverside Connect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="manifest" href="./manifest.json">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Riverside Connect">
  <link rel="apple-touch-icon" sizes="180x180" href="maskable_icon_x192.png">

  <meta property="og:title" content="Riverside Connect">
  <meta property="og:description" content="Real-time Christian community">
  <meta property="og:image" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/maskable_icon_x192.png">
  <meta property="og:url" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/">

  <style>
    :root {
      --ink:       #e2e8f0;
      --paper:     #0a0f1e;
      --surface:   #0f172a;
      --lift:      #1a2540;
      --wire:      rgba(96,165,250,0.18);
      --steel:     #64748b;
      --lead:      #94a3b8;
      --accent:    #3b82f6;
      --accent2:   #60a5fa;
      --gold:      #facc15;
      --danger:    #ef4444;
      --green:     #10b981;

      --font-head: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;

      --bar-h: 50px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100dvh;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* ══ TOP BAR ══════════════════════════════════════════════ */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--bar-h);
      background: rgba(10,15,30,0.92);
      border-bottom: 1px solid var(--wire);
      z-index: 900;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px;
      backdrop-filter: blur(16px);
    }

    .tb-logo {
      display: flex;
      align-items: center;
      height: 100%;
      flex-shrink: 0;
      padding-right: 6px;
    }
    .tb-logo-text {
      font-family: var(--font-head);
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--accent2);
      line-height: 1;
    }

    .tb-spacer { flex: 1; }

    .tb-live-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 26px;
      padding: 0 14px 0 10px;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s;
    }
    .tb-live-btn:hover { background: #1a1a1a; }

    .tb-live-btn.is-live {
      background: #ef4444;
      animation: liveGlow 1.4s ease-in-out infinite;
    }
    .tb-live-btn.is-live:hover { background: #dc2626; }

    @keyframes liveGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
      50%      { box-shadow: 0 0 10px 3px rgba(239,68,68,0.6); }
    }

    #live-badge-tb {
      background: #000000;
      color: #ffffff;
      top: -6px;
      right: -6px;
    }

    .tb-icon-btn {
      position: relative;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: 9px;
      color: var(--lead);
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.15s;
      flex-shrink: 0;
      text-decoration: none;
    }
    .tb-icon-btn:hover { color: var(--accent2); background: var(--lift); }
    .tb-icon-btn:disabled { opacity: 0.5; cursor: default; }

    .tb-icon-btn.spinning i { animation: tbspin 0.8s linear infinite; }
    @keyframes tbspin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .tb-badge {
      position: absolute;
      top: 1px; right: 1px;
      min-width: 15px; height: 15px;
      background: #ef4444;
      color: #fff;
      font-size: 0.55rem;
      font-weight: 800;
      border-radius: 100px;
      display: none;
      align-items: center; justify-content: center;
      padding: 0 3px;
      border: 1.5px solid var(--paper);
      font-family: var(--font-body);
    }
    .tb-badge.visible { display: flex; }

    .tb-avatar-btn { padding: 0; }
    .tb-avatar-btn img {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(96,165,250,0.4);
      transition: border-color 0.15s;
    }
    .tb-avatar-btn:hover img { border-color: var(--accent2); }

    /* ══ CHAT LIST ═══════════════════════════════════════════ */
    #chat-list {
      position: fixed;
      top: var(--bar-h);
      left: 0; right: 0;
      bottom: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .list-section-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--steel);
      padding: 14px 16px 6px;
      background: var(--paper);
    }

    .chat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--wire);
      transition: background 0.15s;
      background: none;
      border-left: none; border-right: none; border-top: none;
      width: 100%;
      text-align: left;
      text-decoration: none;
      color: inherit;
      font-family: var(--font-body);
    }
    .chat-row:hover { background: var(--lift); }
    .chat-row:active { background: var(--lift); }

    .row-avatar {
      width: 50px; height: 50px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--lift);
      border: 2px solid rgba(96,165,250,0.18);
      flex-shrink: 0;
    }

    .row-content { flex: 1; min-width: 0; }

    .row-title-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .row-title {
      font-weight: 700;
      font-size: 0.94rem;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row-time {
      font-family: var(--font-mono);
      font-size: 0.63rem;
      color: var(--steel);
      flex-shrink: 0;
    }

    .row-sub-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 2px;
    }
    .row-subtitle {
      font-size: 0.8rem;
      color: var(--lead);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-badge {
      min-width: 20px; height: 20px;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      border-radius: 100px;
      display: none;
      align-items: center; justify-content: center;
      padding: 0 6px;
      flex-shrink: 0;
      font-family: var(--font-body);
    }
    .row-badge.visible { display: flex; }
    .row-badge.live { background: #ef4444; }
    .row-badge.on { background: rgba(16,185,129,0.18); color: #34d399; font-size: 0.6rem; }
    .row-badge.off { background: rgba(100,116,139,0.18); color: var(--steel); font-size: 0.6rem; }

    .list-empty {
      padding: 10px 16px 16px;
      color: var(--steel);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
    }

    .list-loading, .list-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      text-align: center;
    }
    .list-loading i, .list-error i {
      font-size: 2rem;
      color: var(--accent2);
      opacity: 0.4;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 0.5; }
    }
    .list-loading-title, .list-error-title {
      font-family: var(--font-head);
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      color: var(--lead);
      opacity: 0.5;
    }
    .list-loading-sub, .list-error-sub {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--steel);
    }

    /* ══ TOAST ════════════════════════════════════════════════ */
    #toast-area {
      position: fixed;
      top: calc(var(--bar-h) + 10px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      align-items: center;
    }
    .toast-msg {
      padding: 9px 16px;
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: white;
      white-space: nowrap;
      animation: toastIn 0.25s ease;
      pointer-events: auto;
      max-width: 90vw;
    }
    .toast-msg.ok  { background: rgba(16,185,129,0.92); }
    .toast-msg.err { background: rgba(239,68,68,0.92); }
    .toast-msg.inf { background: rgba(59,130,246,0.92); }
    @keyframes toastIn {
      from { opacity:0; transform: translateY(-8px) scale(0.95); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ══ INSTALL BAR ═════════════════════════════════════════ */
    #install-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 10px 16px;
      background: rgba(10,15,30,0.96);
      border-top: 1px solid var(--wire);
      z-index: 700;
      display: none;
    }
    #install-bar.show { display: block; }
    .install-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      padding: 11px 20px;
      background: rgba(59,130,246,0.12);
      color: var(--accent2);
      border: 1px solid rgba(96,165,250,0.3);
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-body);
    }
    .install-btn:hover { background: rgba(59,130,246,0.2); }

    /* ══ PENDING STATE ═══════════════════════════════════════ */
    #pending-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--paper);
      z-index: 500;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    #pending-screen.show { display: flex; }
    .pending-icon { font-size: 2.8rem; color: var(--accent2); opacity: 0.5; }
    .pending-title { font-family: var(--font-head); font-size: 1.8rem; letter-spacing: 0.08em; color: var(--lead); }
    .pending-sub { font-size: 0.88rem; line-height: 1.6; color: var(--steel); max-width: 320px; }
    .pending-badge {
      padding: 4px 14px;
      background: rgba(245,158,11,0.15);
      color: #fbbf24;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      border-radius: 100px;
    }

    @media (prefers-reduced-motion: reduce) {
      .list-loading i, .list-error i { animation: none; opacity: 0.4; }
    }
  </style>
</head>
<body>

<!-- ══ TOP BAR ══════════════════════════════════════════════════════ -->
<header id="topbar">
  <div class="tb-logo">
    <div class="tb-logo-text">RIVERSIDE CONNECT</div>
  </div>

  <div class="tb-spacer"></div>

  <button class="tb-icon-btn" id="refresh-btn" title="Refresh">
    <i class="fas fa-rotate"></i>
  </button>

  <a href="live.html?filter=live" class="tb-live-btn" id="tb-live" title="Live Now">
    <span class="tb-live-label">Live</span>
    <span class="tb-badge" id="live-badge-tb">0</span>
  </a>

  <a href="announce.html" class="tb-icon-btn" id="tb-ann" title="Notifications">
    <i class="fas fa-bell"></i>
    <span class="tb-badge" id="ann-badge-tb">0</span>
  </a>

  <a href="profile.html" class="tb-icon-btn tb-avatar-btn" title="Profile">
    <img id="user-avatar" src="" alt="Profile"
         onerror="this.src='https://ui-avatars.com/api/?background=3b82f6&color=fff&name=RC'">
  </a>
</header>

<!-- ══ CHAT LIST ═══════════════════════════════════════════════════ -->
<div id="chat-list">
  <div class="list-loading" id="list-loading">
    <i class="fas fa-church"></i>
    <div class="list-loading-title">RIVERSIDE</div>
    <div class="list-loading-sub">LOADING…</div>
  </div>
</div>

<!-- ══ PENDING SCREEN ════════════════════════════════════════════════ -->
<div id="pending-screen">
  <div class="pending-badge" id="pending-badge">PENDING APPROVAL</div>
  <div class="pending-icon"><i class="fas fa-church"></i></div>
  <div class="pending-title">WELCOME</div>
  <p class="pending-sub">Your account is under review. Full access to the feed, channels, and more will be unlocked once approved.</p>
</div>

<!-- ══ INSTALL BAR ════════════════════════════════════════════════════ -->
<div id="install-bar">
  <button class="install-btn" id="install-btn">
    <i class="fas fa-download"></i> Add to Home Screen
  </button>
</div>

<div id="toast-area"></div>

<!-- ══════════════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZ9VVt9A2LlehC6jMMwNMVSkWCBFnN86W7m3gQgAIqbRVPgDUhE1IzHmLtFzV6zbQE/exec';
const DASHBOARD_URL = 'https://script.google.com/macros/s/AKfycbzZ9VVt9A2LlehC6jMMwNMVSkWCBFnN86W7m3gQgAIqbRVPgDUhE1IzHmLtFzV6zbQE/exec';

const userName = localStorage.getItem('userName') || '';
if (!userName) { window.location.href = 'login.html'; }

let isNotificationEnabled = localStorage.getItem('notificationsEnabled') !== 'false';
const CACHE_KEY = 'rc_chatlist_html_v1';

/* ── HELPERS ──────────────────────────────────────────────────── */
function lh3(url) {
  if (!url) return '';
  const m = url.match(/[-\w]{25,}/);
  return m ? `https://lh3.googleusercontent.com/d/${m[0]}` : url;
}
function fallback(name) {
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1e293b&color=60a5fa&size=88`;
}
/* Drop real image URLs in here whenever you have them — every row below
   pulls from this object, so swapping an icon is a one-line change. */
const APP_ICON = 'maskable_icon_x192.png';
const ICONS = {
  home:     APP_ICON,
  announce: APP_ICON,
  lyrics:   APP_ICON,
  live:     APP_ICON,
  studio:   APP_ICON,
  camera:   APP_ICON,
  split:    APP_ICON,
  profile:  APP_ICON,
  notifs:   APP_ICON
};
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  return sameDay
    ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : d.toLocaleDateString([], { day: 'numeric', month: 'short' });
}
function esc(s) {
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ── TOAST ─────────────────────────────────────────────────────── */
function toast(msg, type = 'inf', dur = 3200) {
  const area = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

/* ── AVATAR ─────────────────────────────────────────────────────── */
(function() {
  const av = document.getElementById('user-avatar');
  const pic = localStorage.getItem('userPicLink');
  if (pic) {
    const id = pic.match(/[-\w]{25,}/)?.[0];
    av.src = id ? `https://lh3.googleusercontent.com/d/${id}` : pic;
  } else {
    av.src = fallback(userName.charAt(0) || 'R');
  }
})();

/* ── NOTIFICATION TOGGLE (row-driven) ────────────────────────────── */
function updateNotifRowUI() {
  const badge = document.getElementById('notif-row-badge');
  if (!badge) return;
  if (isNotificationEnabled) {
    badge.textContent = 'ON';
    badge.className = 'row-badge visible on';
  } else {
    badge.textContent = 'OFF';
    badge.className = 'row-badge visible off';
  }
}

async function toggleNotifications() {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) {
    toast('Notifications not supported', 'err'); return;
  }
  isNotificationEnabled = !isNotificationEnabled;
  localStorage.setItem('notificationsEnabled', isNotificationEnabled.toString());
  updateNotifRowUI();

  if (isNotificationEnabled) {
    try {
      await registerFcmToken(true);
      toast('Notifications enabled', 'ok');
    } catch (err) {
      console.error(err);
      toast('Failed to enable notifications', 'err');
      isNotificationEnabled = false;
      localStorage.setItem('notificationsEnabled', 'false');
      updateNotifRowUI();
    }
  } else {
    toast('Notifications turned off', 'inf');
  }
}

/* ── FCM TOKEN: registers a fresh token with the backend on every open ── */
async function registerFcmToken(forcePermissionPrompt) {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  if (Notification.permission === 'denied' && !forcePermissionPrompt) return;

  const { initializeApp }  = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js');
  const { getMessaging, getToken } = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-messaging.js');
  const app = initializeApp({
    apiKey: "AIzaSyCuB56TTi5COJnuDmVf6PiGsOjTwvQ0PNo",
    authDomain: "riverside-connect-a8458.firebaseapp.com",
    projectId: "riverside-connect-a8458",
    storageBucket: "riverside-connect-a8458.firebasestorage.app",
    messagingSenderId: "938830806378",
    appId: "1:938830806378:web:254ed56cba3dc02290f913"
  });
  const msg   = getMessaging(app);
  const swReg = await navigator.serviceWorker.register('./sw.js', { scope: './' });

  let perm = Notification.permission;
  if (perm === 'default') perm = await Notification.requestPermission();
  if (perm !== 'granted') return;

  const token = await getToken(msg, {
    vapidKey: "BLqQIS31O_tuw_UMdReBZHTmy_HNXEcwNaPsor8O8dCt-v0XFepSoGPJmw6P6dYBfh1PDtCaMCxLO4-j7KS4yO8",
    serviceWorkerRegistration: swReg
  });
  if (!token) return;

  await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ operation: 'saveFcmToken', username: userName, fcmToken: token })
  });
}

/* ── INSTALL ─────────────────────────────────────────────────────── */
let deferredPrompt = null;
const installBar = document.getElementById('install-bar');
const installBtn = document.getElementById('install-btn');

if (!window.matchMedia('(display-mode: standalone)').matches && !navigator.standalone) {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBar.classList.add('show');
  });
}
installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBar.classList.remove('show');
    deferredPrompt = null;
  }
});
window.addEventListener('appinstalled', () => installBar.classList.remove('show'));

/* ── LIVE BADGE (top bar) ─────────────────────────────────────────── */
async function loadLiveBadge() {
  try {
    const chRes  = await fetch(`${SCRIPT_URL}?operation=getLiveChannels`);
    const chData = await chRes.json();
    const channels = chData.channels || [];

    const counts = await Promise.all(channels.map(ch =>
      fetch(`${SCRIPT_URL}?operation=getLiveBroadcasts&channelId=${encodeURIComponent(ch.id)}`)
        .then(r => r.json())
        .then(d => (d.broadcasts || []).filter(b => b.status === 'live').length)
        .catch(() => 0)
    ));

    const total = counts.reduce((a, b) => a + b, 0);
    const btn   = document.getElementById('tb-live');
    const badge = document.getElementById('live-badge-tb');

    if (total > 0) {
      badge.textContent = total > 99 ? '99+' : total;
      badge.classList.add('visible');
      btn.classList.add('is-live');
    } else {
      badge.classList.remove('visible');
      btn.classList.remove('is-live');
    }

    // Reflect in the row too, if the list has been built already
    const rowBadge = document.getElementById('live-row-badge');
    const rowSub   = document.getElementById('live-row-sub');
    if (rowBadge && rowSub) {
      if (total > 0) {
        rowBadge.textContent = total > 99 ? '99+' : total;
        rowBadge.className = 'row-badge visible live';
        rowSub.textContent = `${total} stream${total > 1 ? 's' : ''} live now`;
      } else {
        rowBadge.classList.remove('visible');
        rowSub.textContent = 'No live streams right now';
      }
    }
  } catch {}
}

/* ── ANNOUNCEMENTS BADGE ──────────────────────────────────────────── */
async function loadAnnBadge() {
  try {
    const res  = await fetch(`${DASHBOARD_URL}?operation=getUnseenAnnCount&name=${encodeURIComponent(userName)}`);
    const data = await res.json();
    const n    = data.unseenCount || 0;

    const tb = document.getElementById('ann-badge-tb');
    if (n > 0) { tb.textContent = n > 99 ? '99+' : n; tb.classList.add('visible'); }
    else       { tb.classList.remove('visible'); }

    const rowBadge = document.getElementById('ann-row-badge');
    const rowSub   = document.getElementById('ann-row-sub');
    if (rowBadge && rowSub) {
      if (n > 0) {
        rowBadge.textContent = n > 99 ? '99+' : n;
        rowBadge.classList.add('visible');
        rowSub.textContent = `${n} new update${n > 1 ? 's' : ''}`;
      } else {
        rowBadge.classList.remove('visible');
        rowSub.textContent = 'No new updates';
      }
    }
  } catch {}
}

/* ── ROW BUILDER ──────────────────────────────────────────────────── */
function buildRow({ id, href, onClick, avatarSrc, fallbackName, title, subtitle, subtitleId, time, badgeId, badgeClass }) {
  const tag = href ? 'a' : 'button';
  const el = document.createElement(tag);
  el.className = 'chat-row';
  if (href) el.href = href;
  if (id) el.id = id;

  el.innerHTML = `
    <img class="row-avatar" src="${avatarSrc}" onerror="this.src='${fallback(fallbackName)}'" alt="">
    <div class="row-content">
      <div class="row-title-line">
        <span class="row-title">${esc(title)}</span>
        <span class="row-time">${time ? esc(time) : ''}</span>
      </div>
      <div class="row-sub-line">
        <span class="row-subtitle" ${subtitleId ? `id="${subtitleId}"` : ''}>${esc(subtitle || '')}</span>
        <span class="row-badge ${badgeClass || ''}" ${badgeId ? `id="${badgeId}"` : ''}></span>
      </div>
    </div>
  `;

  if (onClick) el.addEventListener('click', onClick);
  return el;
}

function sectionLabel(text) {
  const el = document.createElement('div');
  el.className = 'list-section-label';
  el.textContent = text;
  return el;
}

/* ── BUILD THE FULL CHAT LIST ─────────────────────────────────────── */
async function loadChatList() {
  const list = document.getElementById('chat-list');

  try {
    // 1. Check user status first
    const statusRes  = await fetch(`${DASHBOARD_URL}?operation=getUserStatus&name=${encodeURIComponent(userName)}`);
    const statusData = await statusRes.json();
    const isApproved  = (statusData.userStatus || '').toLowerCase() === 'approved';

    if (!isApproved) {
      const badge = document.getElementById('pending-badge');
      badge.textContent = (statusData.userStatus || 'pending').toUpperCase();
      document.getElementById('pending-screen').classList.add('show');
      list.innerHTML = '';
      return;
    }

    // 2. Fetch channels + Q&A channels in parallel
    const [chRes, qnaRes] = await Promise.all([
      fetch(`${DASHBOARD_URL}?operation=getAllChannels`).then(r => r.json()).catch(() => ({ channels: [] })),
      fetch(`${DASHBOARD_URL}?operation=getAllQnAChannels`).then(r => r.json()).catch(() => ({ channels: [] }))
    ]);
    const channels    = chRes.channels || [];
    const qnaChannels = qnaRes.channels || [];

    // 3. Fetch latest post per channel for the preview line (best-effort, isolated)
    const channelPosts = await Promise.all(channels.map(ch =>
      fetch(`${SCRIPT_URL}?operation=getChannelPosts&channelId=${encodeURIComponent(ch.id)}&username=${encodeURIComponent(userName)}`)
        .then(r => r.json())
        .then(d => {
          const posts = (d.posts || []).slice().sort((a, b) => new Date(b.created) - new Date(a.created));
          return posts[0] || null;
        })
        .catch(() => null)
    ));

    list.innerHTML = '';

    // ── Home ──
    list.appendChild(buildRow({
      href: 'home.html',
      avatarSrc: ICONS.home,
      fallbackName: 'Chat',
      title: 'Chat',
      subtitle: 'Direct chats'
    }));

    // ── Announcements ──
    list.appendChild(buildRow({
      href: 'announce.html',
      avatarSrc: ICONS.announce,
      fallbackName: 'Announcements',
      title: 'Announcements',
      subtitle: 'Loading…',
      subtitleId: 'ann-row-sub',
      badgeId: 'ann-row-badge'
    }));

    // ── Channels ──
    list.appendChild(sectionLabel('CHANNELS'));
    if (!channels.length) {
      const empty = document.createElement('div');
      empty.className = 'list-empty';
      empty.textContent = 'No channels available yet';
      list.appendChild(empty);
    } else {
      channels.forEach((ch, i) => {
        const post = channelPosts[i];
        const avatarSrc = ch.picLink ? lh3(ch.picLink) : fallback(ch.name);
        let preview = 'No posts yet';
        if (post) {
          const cleanText = (post.content || '')
            .replace(/https?:\/\/drive\.google\.com\/[^\s<>"']*/gi, '')
            .replace(/\/view\b\S*/gi, '')
            .replace(/usp=\S+/gi, '')
            .replace(/\s{2,}/g, ' ').trim();
          preview = cleanText || (post.media?.link ? '📎 Attachment' : 'New post');
        }
        list.appendChild(buildRow({
          href: `channel.html?channelId=${encodeURIComponent(ch.id)}`,
          avatarSrc,
          fallbackName: ch.name,
          title: ch.name,
          subtitle: preview,
          time: post ? fmtTime(post.created) : ''
        }));
      });
    }

    // ── Q&A ──
    list.appendChild(sectionLabel('Q&A'));
    if (!qnaChannels.length) {
      const empty = document.createElement('div');
      empty.className = 'list-empty';
      empty.textContent = 'No Q&A spaces yet';
      list.appendChild(empty);
    } else {
      qnaChannels.forEach(ch => {
        const avatarSrc = ch.picLink ? lh3(ch.picLink) : fallback(ch.name);
        list.appendChild(buildRow({
          href: `Q&A.html?channelId=${encodeURIComponent(ch.id)}`,
          avatarSrc,
          fallbackName: ch.name,
          title: ch.name,
          subtitle: 'Tap to ask or answer a question'
        }));
      });
    }

    // ── More / tools ──
    list.appendChild(sectionLabel('MORE'));

    list.appendChild(buildRow({
      href: 'lyric.html',
      avatarSrc: ICONS.lyrics,
      fallbackName: 'Lyrics',
      title: 'Lyrics',
      subtitle: 'Digital hymnal & songs'
    }));

    list.appendChild(buildRow({
      href: 'live.html',
      avatarSrc: ICONS.live,
      fallbackName: 'Live',
      title: 'Live',
      subtitle: 'Loading…',
      subtitleId: 'live-row-sub',
      badgeId: 'live-row-badge'
    }));

    list.appendChild(buildRow({
      href: 'studio.html',
      avatarSrc: ICONS.studio,
      fallbackName: 'Studio',
      title: 'Studio',
      subtitle: 'Broadcast & create'
    }));

    list.appendChild(buildRow({
      href: 'camera.html',
      avatarSrc: ICONS.camera,
      fallbackName: 'Camera',
      title: 'Camera',
      subtitle: 'Capture a moment'
    }));

    list.appendChild(buildRow({
      href: 'split.html',
      avatarSrc: ICONS.split,
      fallbackName: 'Split',
      title: 'Split',
      subtitle: 'Track & split cash'
    }));

    list.appendChild(buildRow({
      href: 'user.html',
      avatarSrc: ICONS.profile,
      fallbackName: 'Profile',
      title: 'Profile',
      subtitle: 'Your account & settings'
    }));

    list.appendChild(buildRow({
      id: 'notif-row',
      avatarSrc: ICONS.notifs,
      fallbackName: 'Notifs',
      title: 'Notifications',
      subtitle: 'Push alerts for this device',
      badgeId: 'notif-row-badge',
      onClick: toggleNotifications
    }));
    updateNotifRowUI();

    // Cache the finished list so returning to this page paints instantly
    // instead of showing the loading state again.
    try { sessionStorage.setItem(CACHE_KEY, list.innerHTML); } catch {}

  } catch (err) {
    console.error('Chat list load error:', err);
    // Only show the error state if we have nothing cached on screen already.
    if (!sessionStorage.getItem(CACHE_KEY)) {
      list.innerHTML = `
        <div class="list-error">
          <i class="fas fa-wifi" style="animation:none;"></i>
          <div class="list-error-title">LOAD FAILED</div>
          <div class="list-error-sub">CHECK CONNECTION AND RELOAD</div>
        </div>`;
    } else {
      toast('Could not refresh list', 'err');
    }
  }
}

/* ── REFRESH ─────────────────────────────────────────────────────── */
let isRefreshing = false;
async function refreshAll() {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.disabled = true;
  try {
    await Promise.all([loadChatList(), loadAnnBadge(), loadLiveBadge()]);
    toast('Refreshed', 'ok', 1500);
  } catch {
    toast('Refresh failed', 'err');
  } finally {
    btn.classList.remove('spinning');
    btn.disabled = false;
    isRefreshing = false;
  }
}

/* ── INSTANT RESTORE ──────────────────────────────────────────────── */
// Paints the last-known list immediately (no spinner) while loadChatList()
// quietly re-fetches and swaps in fresh content underneath.
function restoreCachedList() {
  let cached;
  try { cached = sessionStorage.getItem(CACHE_KEY); } catch { cached = null; }
  if (!cached) return false;

  const list = document.getElementById('chat-list');
  list.innerHTML = cached;

  // innerHTML restore drops JS listeners — reattach the Notifs row handler.
  const notifRow = document.getElementById('notif-row');
  if (notifRow) notifRow.addEventListener('click', toggleNotifications);
  updateNotifRowUI();
  return true;
}

/* ── INIT ─────────────────────────────────────────────────────────── */
// Restore synchronously as soon as this script runs — before waiting on
// DOMContentLoaded or any network call — so there's nothing to "load" on
// the way back from another page.
const hadCache = restoreCachedList();

window.addEventListener('DOMContentLoaded', () => {
  loadChatList().then(() => {
    loadAnnBadge();
    loadLiveBadge();
  });
  // Every app open: register a fresh FCM token with the backend, period.
  registerFcmToken(false).catch(err => console.error('FCM registration failed:', err));

  setInterval(loadAnnBadge, 30000);
  setInterval(loadLiveBadge, 30000);
  document.getElementById('refresh-btn').addEventListener('click', refreshAll);
});
</script>
</body>
</html>
