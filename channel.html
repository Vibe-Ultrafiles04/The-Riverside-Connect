  stagedEvents = [];
  evImageData = null;
  document.getElementById('ev-date-input').value = '';
  document.getElementById('ev-title-input').value = '';
  document.getElementById('ev-img-preview').style.display = 'none';
  document.getElementById('ev-count').textContent = '0';
  document.getElementById('event-input-modal').classList.add('open');
}
function closeEventInputModal() {
  document.getElementById('event-input-modal').classList.remove('open');
}

document.getElementById('write-event-btn').addEventListener('click', openEventInputModal);
document.getElementById('ev-cancel-btn').addEventListener('click', closeEventInputModal);
document.getElementById('ev-input-close').addEventListener('click', closeEventInputModal);

document.getElementById('ev-img-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    evImageData = { base64: ev.target.result.split(',')[1], name: file.name, type: file.type };
    document.getElementById('ev-img-preview-img').src = ev.target.result;
    document.getElementById('ev-img-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
});

document.getElementById('ev-img-remove').addEventListener('click', () => {
  evImageData = null;
  document.getElementById('ev-img-preview').style.display = 'none';
  document.getElementById('ev-img-file').value = '';
});

document.getElementById('ev-add-btn').addEventListener('click', () => {
  const date  = document.getElementById('ev-date-input').value.trim();
  const title = document.getElementById('ev-title-input').value.trim();
  if (!date || !title) { toast('Date and title required', 'err'); return; }

  const store = document.getElementById('write-events-store');
  const row = document.createElement('div');
  row.dataset.evRow = '1';
  row.style.display = 'none';
  row.innerHTML = `
    <input data-ev-date type="date" value="${date}">
    <textarea data-ev-title>${title}</textarea>
  `;
  if (evImageData) {
    row.dataset.imageBase64 = evImageData.base64;
    row.dataset.imageName   = evImageData.name;
    row.dataset.imageType   = evImageData.type;
  }
  store.appendChild(row);

  document.getElementById('ev-date-input').value = '';
  document.getElementById('ev-title-input').value = '';
  evImageData = null;
  document.getElementById('ev-img-preview').style.display = 'none';
  document.getElementById('ev-img-file').value = '';

  const count = store.querySelectorAll('[data-ev-row]').length;
  document.getElementById('ev-count').textContent = count;
  toast(`Event added (${count} staged)`, 'ok');
});

document.getElementById('ev-done-btn').addEventListener('click', () => {
  closeEventInputModal();
  submitPost();
});

/* ── CREATE / EDIT CHANNEL ────────────────────────────────────────── */
let chAvatarData = null;

function openChModal(mode = 'create', ch = null) {
  editingChannel = mode === 'edit' ? ch : null;
  chAvatarData = null;

  document.getElementById('ch-modal-title').textContent = mode === 'create' ? 'CREATE CHANNEL' : 'EDIT CHANNEL';
  document.getElementById('ch-submit-btn').textContent  = mode === 'create' ? 'CREATE' : 'SAVE CHANGES';
  document.getElementById('ch-name-field').value  = ch?.name || '';
  document.getElementById('ch-desc-field').value  = ch?.description || '';

  const av = ch?.picLink ? lh3(ch.picLink) : fallbackAvatar(ch?.name || 'C');
  document.getElementById('ch-avatar-preview').src = av;

  // Show delete button only when editing and user is the creator
  const deleteBtn = document.getElementById('ch-delete-btn');
  deleteBtn.style.display = (mode === 'edit' && ch?.creator === currentUser) ? 'block' : 'none';

  document.getElementById('ch-modal').classList.add('open');
}

function closeChModal() {
  document.getElementById('ch-modal').classList.remove('open');
  editingChannel = null;
  chAvatarData = null;
}

document.getElementById('drawer-create-btn').addEventListener('click', () => { closeDrawer(); openChModal('create'); });
document.getElementById('ch-modal-close').addEventListener('click', closeChModal);
document.getElementById('ch-cancel-btn').addEventListener('click', closeChModal);

document.getElementById('ch-avatar-wrap').addEventListener('click', () => {
  document.getElementById('ch-avatar-file').click();
});
document.getElementById('ch-avatar-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    chAvatarData = { base64: ev.target.result.split(',')[1], name: file.name, type: file.type };
    document.getElementById('ch-avatar-preview').src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// Delete channel button inside edit modal
document.getElementById('ch-delete-btn').addEventListener('click', async () => {
  if (!editingChannel) return;
  const ok = await confirmToast(
    'Delete this channel?',
    'All posts and comments will be permanently removed.',
    'DELETE', 'CANCEL'
  );
  if (!ok) return;
  closeChModal();
  try {
    const data = await post({ operation: 'deleteChannel', channelId: editingChannel.id, username: currentUser });
    if (data.status === 'success') {
      toast('Channel deleted', 'ok');
      allChannels = allChannels.filter(c => c.id !== editingChannel.id);
      localStorage.removeItem(CH_CACHE_KEY);
      cacheChannels(allChannels);
      renderChannelUI(allChannels);
      currentChannel = null;
      document.getElementById('post-rail').innerHTML = `
        <div class="state-view">
          <div class="empty-label">SELECT A CHANNEL</div>
          <div class="empty-sub">CHOOSE FROM THE TICKER ABOVE</div>
        </div>`;
      document.getElementById('btn-write').style.display = 'none';
      document.getElementById('mh-ch-name').textContent = 'RIVERSIDE';
      document.getElementById('mh-ch-meta').textContent = 'SELECT A CHANNEL';
    } else {
      toast(data.message || 'Delete failed', 'err');
    }
  } catch { toast('Network error', 'err'); }
});

document.getElementById('ch-submit-btn').addEventListener('click', async () => {
  const name = document.getElementById('ch-name-field').value.trim();
  const desc = document.getElementById('ch-desc-field').value.trim();
  if (!name) { toast('Channel name required', 'err'); return; }

  const submitBtn = document.getElementById('ch-submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = editingChannel ? 'SAVING...' : 'CREATING...';

  try {
    let payload;
    if (editingChannel) {
      payload = { operation: 'editChannel', channelId: editingChannel.id, user: currentUser, newName: name, newDescription: desc };
      if (chAvatarData) { payload.imageData = chAvatarData.base64; payload.imageName = chAvatarData.name; }
    } else {
      payload = { operation: 'createChannel', creator: currentUser, name, description: desc };
      if (chAvatarData) { payload.imageData = chAvatarData.base64; payload.imageName = chAvatarData.name; }
    }

    const data = await post(payload);
    if (data.status === 'success') {
      toast(editingChannel ? 'Channel updated!' : 'Channel created!', 'ok');
      closeChModal();
      localStorage.removeItem(CH_CACHE_KEY);
      await loadChannels(true);
    } else {
      toast(data.message || 'Failed', 'err');
    }
  } catch { toast('Network error', 'err'); }
  finally {
    submitBtn.disabled = false;
    submitBtn.textContent = editingChannel ? 'SAVE CHANGES' : 'CREATE';
  }
});

/* ── REFRESH ──────────────────────────────────────────────────────── */
document.getElementById('btn-refresh').addEventListener('click', async () => {
  if (!currentChannel) return;
  const icon = document.querySelector('#btn-refresh i');
  icon.style.transition = 'transform 0.6s linear';
  icon.style.transform = 'rotate(360deg)';
  setTimeout(() => { icon.style.transition = ''; icon.style.transform = ''; }, 650);
  await renderPosts(currentChannel.id);
});

/* ── POLLING ──────────────────────────────────────────────────────── */
function startPolling() {
  if (channelPolling) clearInterval(channelPolling);
  channelPolling = setInterval(async () => {
    if (!currentChannel || document.hidden) return;
    try {
      const data = await api({ operation: 'getChannelPostsLight', channelId: currentChannel.id });
      const serverPosts = data.posts || [];
      const serverIds = new Set(serverPosts.map(p => p.postId));

      const rail = document.getElementById('post-rail');
      let localDeletedIds = [];
      try { localDeletedIds = JSON.parse(rail.dataset.deletedIds || '[]'); } catch {}
      const deletedSet = new Set(localDeletedIds);

      const currentVisibleIds = new Set(
        Array.from(document.querySelectorAll('.post-view[data-post-id]')).map(el => el.dataset.postId)
      );

      const hasRealNew = serverPosts.some(sp => !currentVisibleIds.has(sp.postId) && !deletedSet.has(sp.postId));

      if (hasRealNew) {
        await renderPosts(currentChannel.id);
        toast('New posts loaded', 'ok');
      }

      document.querySelectorAll('.comment-panel.open').forEach(panel => {
        const postId = panel.id.replace('cp-', '');
        const list = document.getElementById(`cl-${postId}`);
        if (list) loadComments(postId);
      });

      const stillRelevant = localDeletedIds.filter(id => !serverIds.has(id));
      rail.dataset.deletedIds = JSON.stringify(stillRelevant);

    } catch { /* silent */ }
  }, 14000);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (channelPolling) { clearInterval(channelPolling); channelPolling = null; }
  } else if (currentChannel) {
    startPolling();
  }
});

/* ── SWIPE HINT ───────────────────────────────────────────────────── */
if (!localStorage.getItem('rv_swipe_seen')) {
  document.getElementById('swipe-hint').style.opacity = '1';
  localStorage.setItem('rv_swipe_seen', '1');
}

    const url = new URL(event.data.url || event.data);
    const newChId   = url.searchParams.get('channelId');
    const newPostId = url.searchParams.get('postId');
    if (newChId) {
      const ch = allChannels.find(c => c.id === newChId);
      if (ch) openChannel(ch, newPostId || null);
    } else if (newPostId) {
      scrollToPost(newPostId);
    }
  }
