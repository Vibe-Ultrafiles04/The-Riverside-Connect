<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements · Riverside Connect</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="./manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Riverside Connect">
  <link rel="apple-touch-icon" href="maskable_icon_x192.png">

  <style>
    :root {
      --bg-deep:       #07090f;
      --bg-surface:    #0d1117;
      --bg-card:       #111827;
      --bg-card-hover: #161f2e;
      --border:        rgba(255,255,255,0.07);
      --border-accent: rgba(212,175,55,0.35);
      --gold:          #d4af37;
      --gold-light:    #f0d060;
      --gold-dim:      rgba(212,175,55,0.18);
      --text-primary:  #f0ece4;
      --text-secondary:#94a3b8;
      --text-muted:    #4a5568;
      --blue:          #3b82f6;
      --red:           #ef4444;
      --radius-card:   16px;
      --radius-sm:     8px;
      --font-display:  'Playfair Display', Georgia, serif;
      --font-body:     'DM Sans', system-ui, sans-serif;
      --header-h:      68px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── Noise texture overlay ─────────────────────────────────────── */
    body::before {
      content:'';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(7,9,15,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
    }

    .header-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .header-back:hover { color: var(--text-primary); }
    .header-back i { font-size: 0.85rem; }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .header-brand {
      flex: 1;
    }
    .header-brand h1 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text-primary);
    }
    .header-brand .brand-sub {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.25);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f87171;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.7); }
    }

    .btn-new-ann {
      display: none; /* hidden until admin check */
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: 999px;
      background: var(--gold);
      color: #07090f;
      border: none;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.22s;
    }
    .btn-new-ann:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(212,175,55,0.35);
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    .page-layout {
      display: flex;
      height: calc(100vh - var(--header-h));
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--bg-surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-label {
      padding: 20px 20px 12px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 16px;
    }

    .sidebar-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      border-left: 2px solid transparent;
      margin-bottom: 2px;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); }
    .sidebar-item.active {
      background: var(--gold-dim);
      border-left-color: var(--gold);
    }

    .si-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
    }

    .si-info { flex: 1; min-width: 0; }
    .si-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .si-preview {
      font-size: 0.77rem;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .si-time {
      font-size: 0.68rem;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .sidebar-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* ── Main feed ──────────────────────────────────────────────────── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px 60px;
      scroll-behavior: smooth;
    }

    .main-content::-webkit-scrollbar { width: 5px; }
    .main-content::-webkit-scrollbar-track { background: transparent; }
    .main-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius:3px; }

    .feed-header {
      max-width: 740px;
      margin: 0 auto 28px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .feed-header-left h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.15;
    }
    .feed-header-left p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.03em;
    }
    .feed-count {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* ── Announcement card ──────────────────────────────────────────── */
    .ann-card {
      max-width: 740px;
      margin: 0 auto 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      animation: card-in 0.4s ease-out both;
      position: relative;
    }
    .ann-card:hover {
      border-color: rgba(212,175,55,0.2);
      background: var(--bg-card-hover);
    }

    @keyframes card-in {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .ann-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px 14px;
    }

    .ann-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-accent);
      flex-shrink: 0;
    }

    .ann-author-block { flex: 1; }
    .ann-author-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--gold);
      letter-spacing: 0.01em;
    }
    .ann-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .ann-badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid var(--border-accent);
    }

    /* Gold left accent on card */
    .ann-card::before {
      content:'';
      position: absolute;
      left: 0;
      top: 20px;
      bottom: 20px;
      width: 3px;
      background: linear-gradient(180deg, var(--gold) 0%, transparent 100%);
      border-radius: 0 2px 2px 0;
      opacity: 0.6;
    }

    /* Media */
    .ann-media {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 0 20px 14px;
      scroll-snap-type: x mandatory;
    }
    .ann-media::-webkit-scrollbar { height: 4px; }
    .ann-media::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius:2px; }

    .ann-media-item {
      flex: 0 0 auto;
      width: 82%;
      max-height: 380px;
      scroll-snap-align: start;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .ann-media-item img,
    .ann-media-item video,
    .ann-media-item iframe {
      width: 100%;
      height: auto;
      display: block;
    }

    .ann-body {
      padding: 0 20px 16px;
      font-size: 0.96rem;
      line-height: 1.72;
      color: var(--text-primary);
      white-space: pre-line;
      word-break: break-word;
    }

    .ann-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }

    .ann-views {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .ann-views-count {
      font-weight: 600;
      color: var(--text-secondary);
    }

    .ann-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .ann-card:hover .ann-actions { opacity: 1; }

    .ann-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      font-family: var(--font-body);
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .ann-btn-edit {
      color: var(--gold);
      border-color: rgba(212,175,55,0.3);
      background: transparent;
    }
    .ann-btn-edit:hover { background: var(--gold-dim); }
    .ann-btn-delete {
      color: #f87171;
      border-color: rgba(239,68,68,0.25);
      background: transparent;
    }
    .ann-btn-delete:hover { background: rgba(239,68,68,0.12); }

    /* Edit textarea */
    .edit-textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-accent);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1.65;
      resize: vertical;
      min-height: 100px;
      outline: none;
      margin-bottom: 8px;
    }
    .edit-row {
      display: flex;
      gap: 8px;
      padding: 0 20px 16px;
    }
    .btn-save {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      background: var(--gold);
      color: #07090f;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
    }
    .btn-save:hover { background: var(--gold-light); }
    .btn-cancel {
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: var(--font-body);
    }

    /* ── Empty / loading states ─────────────────────────────────────── */
    .state-empty {
      max-width: 740px;
      margin: 60px auto;
      text-align: center;
      padding: 60px 20px;
    }
    .state-empty-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid var(--border-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.8rem;
      color: var(--gold);
    }
    .state-empty h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .state-empty p { font-size: 0.875rem; color: var(--text-muted); }

    .skeleton-card {
      max-width: 740px;
      margin: 0 auto 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px;
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:0.7} 50%{opacity:0.3} }
    .skel-row {
      height: 12px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      margin-bottom: 10px;
    }

    /* ── Modal ──────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 0;
    }
    @media (min-width: 600px) {
      .modal-overlay { align-items: center; padding: 0; }
    }

    .modal-sheet {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 28px 24px 32px;
      animation: sheet-up 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    @media (min-width: 600px) {
      .modal-sheet { border-radius: 20px; animation: fade-scale 0.25s ease; }
    }
    @keyframes sheet-up { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes fade-scale { from{transform:scale(0.96);opacity:0} to{transform:scale(1);opacity:1} }

    .modal-drag {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin: 0 auto 24px;
    }
    @media (min-width: 600px) { .modal-drag { display: none; } }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .modal-subtitle {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 22px;
    }

    .modal-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.97rem;
      line-height: 1.7;
      padding: 16px;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-textarea:focus { border-color: var(--border-accent); }
    .modal-textarea::placeholder { color: var(--text-muted); }

    /* Schedule section */
    .schedule-section {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
    }
    .schedule-toggle-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      user-select: none;
    }
    .schedule-toggle-label input[type=checkbox] {
      width: 16px;
      height: 16px;
      accent-color: var(--gold);
      cursor: pointer;
    }
    .schedule-datetime {
      display: none;
      margin-top: 12px;
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-accent);
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      color-scheme: dark;
    }
    .schedule-preview {
      font-size: 0.8rem;
      color: var(--gold);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Media add */
    .media-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }
    .btn-add-media {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-add-media:hover {
      border-color: var(--border-accent);
      color: var(--gold);
    }

    /* Preview strip */
    .preview-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-top: 14px;
      padding-bottom: 6px;
      min-height: 0;
    }
    .preview-thumb {
      position: relative;
      flex: 0 0 100px;
      width: 100px;
      height: 100px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-deep);
    }
    .preview-thumb img,
    .preview-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Modal footer */
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .modal-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn-post {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      border-radius: 999px;
      background: var(--gold);
      color: #07090f;
      border: none;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.22s;
    }
    .btn-post:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(212,175,55,0.35);
    }
    .btn-post:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.25);
      border-top-color: #07090f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── Delete/confirm overlay ────────────────────────────────────── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: card-in 0.2s ease;
    }
    .confirm-card {
      background: var(--bg-card);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 16px;
      padding: 28px;
      max-width: 320px;
      width: 90%;
      text-align: center;
    }
    .confirm-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.3rem;
      color: #f87171;
    }
    .confirm-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .confirm-msg { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 22px; }
    .confirm-btns { display: flex; gap: 10px; }
    .btn-confirm-cancel {
      flex: 1; padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
    }
    .btn-confirm-delete {
      flex: 1; padding: 10px;
      border-radius: 8px;
      border: none;
      background: #ef4444;
      color: white;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Toast ──────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }
    .toast {
      background: var(--bg-card);
      color: var(--text-primary);
      padding: 11px 20px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 0.83rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: toast-in 0.3s ease both;
      white-space: nowrap;
    }
    .toast.success { border-color: rgba(34,197,94,0.3); }
    .toast.success i { color: #4ade80; }
    .toast.error { border-color: rgba(239,68,68,0.3); }
    .toast.error i { color: #f87171; }
    @keyframes toast-in { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }

    /* ── Sidebar scrollbar ─────────────────────────────────── */
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius:2px; }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { padding: 20px 16px 60px; }
      .feed-header { margin-bottom: 20px; }
      .feed-header-left h2 { font-size: 1.5rem; }
      .ann-card::before { display: none; }
      .header-brand .brand-sub { display: none; }
    }
    @media (max-width: 480px) {
      .site-header { padding: 0 16px; }
      .btn-new-ann span { display: none; }
      .btn-new-ann { padding: 9px 13px; }
      .live-badge span { display: none; }
    }
  </style>
</head>
<body>

<div id="toast-container"></div>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header class="site-header">
  <a href="index.html" class="header-back">
    <i class="fas fa-arrow-left"></i>
    <span>Home</span>
  </a>
  <div class="header-divider"></div>
  <div class="header-brand">
    <h1>Announcements</h1>
    <div class="brand-sub">Riverside Connect</div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span>Live</span>
    </div>
    <button class="btn-new-ann" id="btnNewAnn">
      <i class="fas fa-plus"></i>
      <span>Post</span>
    </button>
  </div>
</header>

<!-- ── Layout ──────────────────────────────────────────────────────────── -->
<div class="page-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-label">Recent Posts</div>
    <div class="sidebar-list" id="sidebarList">
      <div class="skeleton-card" style="padding:14px;">
        <div class="skel-row" style="width:40%;height:10px;"></div>
        <div class="skel-row" style="width:80%;margin-top:8px;"></div>
      </div>
      <div class="skeleton-card" style="padding:14px;animation-delay:0.2s;">
        <div class="skel-row" style="width:35%;height:10px;"></div>
        <div class="skel-row" style="width:70%;margin-top:8px;"></div>
      </div>
    </div>
  </aside>

  <!-- Main feed -->
  <main class="main-content" id="mainContent">
    <div class="feed-header">
      <div class="feed-header-left">
        <h2>Board</h2>
        <p>Official updates from the Riverside team</p>
      </div>
      <div class="feed-count" id="feedCount"></div>
    </div>

    <div id="announcementsFeed">
      <!-- Skeleton loaders -->
      <div class="skeleton-card"><div class="skel-row" style="width:30%"></div><div class="skel-row" style="width:90%"></div><div class="skel-row" style="width:65%"></div></div>
      <div class="skeleton-card" style="animation-delay:0.15s"><div class="skel-row" style="width:25%"></div><div class="skel-row" style="width:85%"></div><div class="skel-row" style="width:50%"></div></div>
      <div class="skeleton-card" style="animation-delay:0.3s"><div class="skel-row" style="width:35%"></div><div class="skel-row" style="width:75%"></div></div>
    </div>
  </main>
</div>

<!-- ── New Announcement Modal ─────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-drag"></div>
    <div class="modal-title">New Announcement</div>
    <div class="modal-subtitle">This will be visible to all members immediately.</div>

    <textarea class="modal-textarea" id="annText" placeholder="Write your announcement here…&#10;&#10;Use paragraphs for clarity. Keep it concise and informative."></textarea>

    <!-- Media -->
    <div class="media-row">
      <button class="btn-add-media" id="btnAddMedia">
        <i class="fas fa-image"></i>
        Attach media
      </button>
      <input type="file" id="fileInput" accept="image/*,video/*" multiple style="display:none;">
    </div>
    <div class="preview-strip" id="previewStrip"></div>

    <!-- Schedule -->
    <div class="schedule-section">
      <label class="schedule-toggle-label">
        <input type="checkbox" id="scheduleToggle">
        Schedule for later
      </label>
      <input type="datetime-local" id="scheduleInput" class="schedule-datetime">
      <div class="schedule-preview" id="schedulePreview" style="display:none;">
        <i class="fas fa-calendar-check"></i>
        <span id="scheduleText"></span>
      </div>
    </div>

    <div class="modal-footer">
      <span class="modal-hint"><kbd>Ctrl + Enter</kbd> to post</span>
      <button class="btn-post" id="btnPost">
        <i class="fas fa-paper-plane"></i>
        Post Announcement
      </button>
    </div>
  </div>
</div>

<script>
  /* ── Config ─────────────────────────────────────────────────────── */
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbztGcPfIe_AWXSKMcYNvhtAuL5O315bo5hgcicw5Xe4sBEyDb8dreEBi42ALnZY64l2/exec';
  const userName = localStorage.getItem('userName');
  if (!userName) window.location.href = 'login.html';

  /* ── State ───────────────────────────────────────────────────────── */
  let selectedFiles = [];
  let lastCount = 0;
  let pollingTimer = null;
  let isAdmin = false;
  const announcementTexts = {};

  /* ── DOM refs ────────────────────────────────────────────────────── */
  const btnNewAnn     = document.getElementById('btnNewAnn');
  const modalOverlay  = document.getElementById('modalOverlay');
  const annText       = document.getElementById('annText');
  const fileInput     = document.getElementById('fileInput');
  const btnAddMedia   = document.getElementById('btnAddMedia');
  const previewStrip  = document.getElementById('previewStrip');
  const btnPost       = document.getElementById('btnPost');
  const scheduleToggle= document.getElementById('scheduleToggle');
  const scheduleInput = document.getElementById('scheduleInput');
  const schedulePreview=document.getElementById('schedulePreview');
  const scheduleText  = document.getElementById('scheduleText');
  const feed          = document.getElementById('announcementsFeed');
  const sidebarList   = document.getElementById('sidebarList');
  const feedCount     = document.getElementById('feedCount');

  /* ── Admin check ─────────────────────────────────────────────────── */
  async function checkAdmin() {
    try {
      const r = await fetch(`${scriptUrl}?operation=getUserStatus&name=${encodeURIComponent(userName)}`);
      const d = await r.json();
      if (d.status === 'success' && d.userStatus === 'approved' && d.isAdmin === true) {
        isAdmin = true;
        btnNewAnn.style.display = 'flex';
      }
    } catch(e) { /* silent */ }
  }

  /* ── Helpers ─────────────────────────────────────────────────────── */
  function extractFileId(url) {
    if (!url) return '';
    const m = url.match(/[-\w]{25,}/);
    return m ? m[0] : '';
  }
  function getLh3(url) {
    const id = extractFileId(url);
    return id ? `https://lh3.googleusercontent.com/d/${id}` : '';
  }
  function formatTime(ts) {
    const d = new Date(ts), now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const isYest  = d.toDateString() === new Date(now.setDate(now.getDate()-1)).toDateString();
    const day = isToday ? 'Today' : isYest ? 'Yesterday' : d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    return `${day} · ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }
  function showToast(msg, type='success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i> <span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.4s'; setTimeout(()=>el.remove(),400); }, 3200);
  }

  /* ── Modal ───────────────────────────────────────────────────────── */
  btnNewAnn.addEventListener('click', () => {
    modalOverlay.style.display = 'flex';
    annText.focus();
  });

  modalOverlay.addEventListener('click', e => {
    if (e.target === modalOverlay) closeModal();
  });

  function closeModal() {
    modalOverlay.style.display = 'none';
    annText.value = '';
    previewStrip.innerHTML = '';
    selectedFiles = [];
    scheduleToggle.checked = false;
    scheduleInput.style.display = 'none';
    scheduleInput.value = '';
    schedulePreview.style.display = 'none';
    scheduleText.textContent = '';
  }

  /* ── Media ───────────────────────────────────────────────────────── */
  btnAddMedia.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', function() {
    Array.from(this.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const b64 = e.target.result.split(',')[1];
        selectedFiles.push({ base64: b64, type: file.type, name: file.name });
        addThumb(e.target.result, file.type, selectedFiles.length - 1);
      };
      reader.readAsDataURL(file);
    });
    this.value = '';
  });

  function addThumb(dataUrl, type, idx) {
    const thumb = document.createElement('div');
    thumb.className = 'preview-thumb';
    thumb.innerHTML = (type.startsWith('video')
      ? `<video src="${dataUrl}" muted></video>`
      : `<img src="${dataUrl}">`)
      + `<button class="preview-remove" data-idx="${idx}"><i class="fas fa-times"></i></button>`;
    thumb.querySelector('.preview-remove').addEventListener('click', e => {
      const i = parseInt(e.currentTarget.dataset.idx);
      selectedFiles.splice(i,1);
      previewStrip.removeChild(thumb);
      previewStrip.querySelectorAll('.preview-remove').forEach((b,j) => b.dataset.idx = j);
    });
    previewStrip.appendChild(thumb);
  }

  /* ── Schedule ────────────────────────────────────────────────────── */
  scheduleToggle.addEventListener('change', () => {
    if (scheduleToggle.checked) {
      const now = new Date(Date.now() + 5*60*1000);
      const pad = n => String(n).padStart(2,'0');
      scheduleInput.min = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
      scheduleInput.style.display = 'block';
      scheduleInput.focus();
    } else {
      scheduleInput.style.display = 'none';
      scheduleInput.value = '';
      schedulePreview.style.display = 'none';
    }
  });
  scheduleInput.addEventListener('change', () => {
    if (!scheduleInput.value) { schedulePreview.style.display='none'; return; }
    const d = new Date(scheduleInput.value);
    scheduleText.textContent = `Will post: ${d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})} at ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    schedulePreview.style.display = 'flex';
  });

  /* ── Ctrl+Enter to post ──────────────────────────────────────────── */
  annText.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); postAnnouncement(); }
  });

  /* ── Post ────────────────────────────────────────────────────────── */
  btnPost.addEventListener('click', postAnnouncement);

  async function postAnnouncement() {
    const text = annText.value.trim();
    if (!text && selectedFiles.length === 0) return;

    let scheduledTime = null;
    if (scheduleToggle.checked) {
      if (!scheduleInput.value) { showToast('Please pick a date and time','error'); return; }
      const [dp,tp] = scheduleInput.value.split('T');
      const [y,mo,d] = dp.split('-').map(Number);
      const [h,mi] = tp.split(':').map(Number);
      const picked = new Date(y,mo-1,d,h,mi);
      if (isNaN(picked.getTime())) { showToast('Invalid date/time','error'); return; }
      if (picked <= new Date()) { showToast('Scheduled time must be in the future','error'); return; }
      scheduledTime = picked.toISOString();
    }

    btnPost.disabled = true;
    btnPost.innerHTML = `<span class="spinner"></span> ${scheduledTime ? 'Scheduling…' : 'Posting…'}`;

    try {
      const res = await fetch(scriptUrl, {
        method: 'POST',
        body: JSON.stringify({ operation:'postAnnouncement', name:userName, comment:text, files:selectedFiles, scheduledTime })
      });
      const data = await res.json();
      if (data.status === 'success') {
        closeModal();
        if (data.scheduled) {
          showToast('✓ Scheduled successfully', 'success');
        } else {
          showToast('Announcement posted', 'success');
          await loadAnnouncements(false);
        }
      } else {
        showToast(data.message || 'Failed to post', 'error');
      }
    } catch(e) {
      showToast('Network error', 'error');
    } finally {
      btnPost.disabled = false;
      btnPost.innerHTML = '<i class="fas fa-paper-plane"></i> Post Announcement';
    }
  }

  /* ── Delete ──────────────────────────────────────────────────────── */
  async function deleteAnn(timestamp) {
    const overlay = document.createElement('div');
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = `
      <div class="confirm-card">
        <div class="confirm-icon"><i class="fas fa-trash-alt"></i></div>
        <div class="confirm-title">Delete Announcement?</div>
        <div class="confirm-msg">This action is permanent and cannot be undone.</div>
        <div class="confirm-btns">
          <button class="btn-confirm-cancel">Cancel</button>
          <button class="btn-confirm-delete">Delete</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('.btn-confirm-cancel').onclick = () => overlay.remove();
    overlay.querySelector('.btn-confirm-delete').onclick = async () => {
      overlay.remove();
      try {
        const res = await fetch(scriptUrl,{method:'POST',body:JSON.stringify({operation:'deleteAnnouncement',name:userName,timestamp})});
        const d = await res.json();
        if (d.status==='success') { showToast('Announcement deleted'); loadAnnouncements(false); }
        else showToast(d.message||'Delete failed','error');
      } catch(e) { showToast('Connection error','error'); }
    };
  }

  /* ── Edit ────────────────────────────────────────────────────────── */
  function startEdit(timestamp) {
    const orig = announcementTexts[timestamp] || '';
    const bodyEl = document.getElementById(`body-${timestamp}`);
    if (!bodyEl) return;

    const ta = document.createElement('textarea');
    ta.className = 'edit-textarea';
    ta.id = `edit-${timestamp}`;
    ta.value = orig;

    const row = document.createElement('div');
    row.className = 'edit-row';
    row.innerHTML = `
      <button class="btn-save" onclick="saveEdit('${timestamp}')"><i class="fas fa-check"></i> Save</button>
      <button class="btn-cancel" onclick="loadAnnouncements(false)">Cancel</button>`;

    bodyEl.parentNode.insertBefore(ta, bodyEl);
    bodyEl.parentNode.insertBefore(row, bodyEl);
    bodyEl.style.display = 'none';
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
  }

  async function saveEdit(timestamp) {
    const newText = document.getElementById(`edit-${timestamp}`)?.value?.trim();
    if (!newText) return;
    try {
      const res = await fetch(scriptUrl,{method:'POST',body:JSON.stringify({operation:'editAnnouncement',name:userName,timestamp,newText})});
      const d = await res.json();
      if (d.status==='success') { showToast('Updated'); loadAnnouncements(false); }
      else showToast(d.message||'Update failed','error');
    } catch(e) { showToast('Connection error','error'); }
  }

  /* ── Render ──────────────────────────────────────────────────────── */
  async function loadAnnouncements(silent=true) {
    try {
      const [annRes, viewsRes] = await Promise.all([
        fetch(`${scriptUrl}?operation=getData`),
        fetch(`${scriptUrl}?operation=getAnnouncementViewCounts`)
      ]);
      const [annData, viewsData] = await Promise.all([annRes.json(), viewsRes.json()]);

      const list = annData.announcements || [];
      const viewCounts = viewsData.viewCounts || [];

      if (silent && list.length === lastCount) return;
      lastCount = list.length;

      feed.innerHTML = '';
      sidebarList.innerHTML = '';

      if (list.length === 0) {
        feedCount.textContent = '';
        feed.innerHTML = `
          <div class="state-empty">
            <div class="state-empty-icon"><i class="fas fa-bullhorn"></i></div>
            <h3>Nothing here yet</h3>
            <p>Official announcements will appear here when posted by the team.</p>
          </div>`;
        sidebarList.innerHTML = '<div class="sidebar-empty">No announcements yet</div>';
        return;
      }

      feedCount.textContent = `${list.length} post${list.length!==1?'s':''}`;

      list.forEach((c, i) => {
        const isOwn = c.name === userName && isAdmin;
        announcementTexts[c.timestamp] = c.comment;
        const viewCount = viewCounts[i] || 0;

        /* Media HTML */
        const links = c.fileLink ? c.fileLink.split(',') : [];
        const types = c.fileType ? c.fileType.split(',') : [];
        let mediaHtml = '';
        if (links.length > 0) {
          mediaHtml = '<div class="ann-media">';
          links.forEach((lk,fi) => {
            const t = types[fi] || '';
            const isVid = t.includes('video') || lk.match(/\.(mp4|mov|webm)$/i);
            mediaHtml += `<div class="ann-media-item">${isVid
              ? `<iframe src="${lk}" height="320" frameborder="0" allowfullscreen></iframe>`
              : `<img src="${getLh3(lk)}" loading="lazy">`
            }</div>`;
          });
          mediaHtml += '</div>';
        }

        /* Card */
        const card = document.createElement('div');
        card.className = 'ann-card';
        card.style.animationDelay = `${i*0.05}s`;
        card.innerHTML = `
          <div class="ann-card-header">
            <img class="ann-avatar" src="${getLh3(c.picLink) || 'https://via.placeholder.com/44'}" onerror="this.src='https://picsum.photos/id/64/44/44'" alt="">
            <div class="ann-author-block">
              <div class="ann-author-name">${c.name}</div>
              <div class="ann-time">${formatTime(c.timestamp)}</div>
            </div>
            <div class="ann-badge">Official</div>
          </div>
          ${mediaHtml}
          <div class="ann-body" id="body-${c.timestamp}">${c.comment}</div>
          <div class="ann-footer">
            <div class="ann-views">
              <i class="far fa-eye"></i>
              <span class="ann-views-count">${viewCount}</span>
              <span>views</span>
            </div>
            ${isOwn ? `
            <div class="ann-actions">
              <button class="ann-btn ann-btn-edit" onclick="startEdit('${c.timestamp}')">
                <i class="fas fa-pen"></i> Edit
              </button>
              <button class="ann-btn ann-btn-delete" onclick="deleteAnn('${c.timestamp}')">
                <i class="fas fa-trash-alt"></i> Delete
              </button>
            </div>` : ''}
          </div>`;
        feed.appendChild(card);

        /* Sidebar item */
        const si = document.createElement('div');
        si.className = 'sidebar-item';
        si.innerHTML = `
          <img class="si-avatar" src="${getLh3(c.picLink)||'https://via.placeholder.com/36'}" onerror="this.src='https://picsum.photos/id/64/36/36'" alt="">
          <div class="si-info">
            <div class="si-name">${c.name}</div>
            <div class="si-preview">${(c.comment||'').replace(/\n/g,' ').substring(0,42)}${c.comment?.length>42?'…':''}</div>
          </div>
          <div class="si-time">${new Date(c.timestamp).toLocaleDateString([],{month:'short',day:'numeric'})}</div>`;
        si.onclick = () => {
          document.querySelectorAll('.sidebar-item').forEach(s=>s.classList.remove('active'));
          si.classList.add('active');
          card.scrollIntoView({behavior:'smooth',block:'start'});
        };
        sidebarList.appendChild(si);
      });

      if (!silent) document.getElementById('mainContent').scrollTop = 0;
    } catch(e) {
      console.error('Load error',e);
    }
  }

  /* ── Mark seen ───────────────────────────────────────────────────── */
  async function markSeen() {
    try {
      const r = await fetch(`${scriptUrl}?operation=getData`);
      const d = await r.json();
      const n = d.announcements?.length || 0;
      await fetch(scriptUrl,{method:'POST',body:JSON.stringify({operation:'markAnnouncementsSeen',name:userName,seenUpTo:n})});
      localStorage.setItem('lastSeenAnnCount',n);
    } catch(e){}
  }

  /* ── Polling ─────────────────────────────────────────────────────── */
  function startPolling() {
    if (pollingTimer) clearInterval(pollingTimer);
    pollingTimer = setInterval(() => loadAnnouncements(true), 9000);
  }
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { clearInterval(pollingTimer); }
    else { loadAnnouncements(true); startPolling(); }
  });

  /* ── Init ────────────────────────────────────────────────────────── */
  (async () => {
    await checkAdmin();
    await loadAnnouncements(false);
    markSeen();
    startPolling();
  })();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(() => console.log('SW registered'))
      .catch(e => console.error('SW error', e));
  }
</script>

</body>
</html>
