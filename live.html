<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riverside Live – Channels</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    :root {
      --bg:       #0a0a0c;
      --bg1:      #111116;
      --bg2:      #18181f;
      --bg3:      #1e1e28;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --red:      #ff3b3b;
      --red-glow: rgba(255,59,59,0.25);
      --blue:     #4f8eff;
      --teal:     #00d2b8;
      --amber:    #ffb347;
      --text:     #f0f0f5;
      --text2:    #9999aa;
      --text3:    #555566;
      --radius:   12px;
      --radius-lg:18px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg1); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 99px; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(10,10,12,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
      height: 58px;
      display: flex; align-items: center;
    }
    .nav-inner {
      width: 100%; max-width: 1380px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .logo { display:flex; align-items:center; gap:9px; text-decoration:none; flex-shrink:0; }
    .logo-mark { width:34px; height:34px; border-radius:8px; background:var(--red); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:0.85rem; color:white; letter-spacing:-0.5px; }
    .logo-name { font-family:'Syne',sans-serif; font-weight:700; font-size:1.05rem; letter-spacing:1.5px; color:var(--text); text-transform:uppercase; }

    /* Search — always visible, flex-shrinks gracefully */
    .nav-search {
      flex: 1; max-width: 440px; margin: 0 auto;
      position: relative;
    }
    .nav-search input {
      width: 100%; background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 999px; padding: 8px 16px 8px 40px;
      color: var(--text); font-family: 'Manrope', sans-serif;
      font-size: 0.85rem; outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .nav-search input:focus { border-color: var(--border2); background: var(--bg3); }
    .nav-search input::placeholder { color: var(--text3); }
    .nav-search i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:0.8rem; }

    .nav-spacer { flex: 1; }
    .nav-pill { display:flex; align-items:center; gap:7px; padding:7px 16px; border-radius:999px; font-size:0.82rem; font-weight:600; text-decoration:none; cursor:pointer; border:none; font-family:'Manrope',sans-serif; transition:all 0.18s; flex-shrink:0; }
    .nav-pill.ghost { background:transparent; border:1px solid var(--border); color:var(--text2); }
    .nav-pill.ghost:hover { border-color:var(--border2); color:var(--text); background:var(--bg2); }
    .nav-pill.primary { background:var(--red); color:white; box-shadow:0 0 16px var(--red-glow); }
    .nav-pill.primary:hover { background:#e62e2e; box-shadow:0 0 24px var(--red-glow); transform:translateY(-1px); }

    /* Mobile search toggle */
    .nav-search-toggle {
      display: none;
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text2); cursor: pointer;
      align-items: center; justify-content: center; font-size: 0.85rem;
      transition: all 0.18s; flex-shrink: 0;
    }
    .nav-search-toggle:hover { background:var(--bg3); color:var(--text); }

    /* Mobile search dropdown */
    .mobile-search-bar {
      display: none;
      background: rgba(10,10,12,0.98);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .mobile-search-bar.open { display: flex; }
    .mobile-search-bar input {
      width: 100%; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 9px 16px 9px 40px;
      color: var(--text); font-family: 'Manrope',sans-serif;
      font-size: 0.9rem; outline: none;
    }
    .mobile-search-bar input:focus { border-color: var(--border2); }
    .mobile-search-bar .ms-icon { position:absolute; left:28px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:0.8rem; pointer-events:none; }
    .mobile-search-wrap { flex:1; position:relative; }

    /* ── HERO ── */
    .hero { max-width:1380px; margin:0 auto; padding:52px 24px 36px; display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; }
    .hero-left h1 { font-family:'Syne',sans-serif; font-size:clamp(2rem,5vw,3.4rem); font-weight:800; line-height:1.05; letter-spacing:-1px; color:var(--text); }
    .hero-left h1 span { color:var(--red); }
    .hero-sub { margin-top:8px; color:var(--text2); font-size:0.95rem; }
    .hero-live-indicator { display:flex; align-items:center; gap:10px; background:var(--bg2); border:1px solid var(--border); border-radius:999px; padding:8px 18px; }
    .pulse-ring { position:relative; width:10px; height:10px; flex-shrink:0; }
    .pulse-ring::before { content:''; position:absolute; inset:0; border-radius:50%; background:var(--red); animation:pulse-out 1.6s ease-out infinite; }
    .pulse-ring::after { content:''; position:absolute; inset:1px; border-radius:50%; background:var(--red); }
    @keyframes pulse-out { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(2.5)} }
    .hero-live-text { font-family:'JetBrains Mono',monospace; font-size:0.75rem; font-weight:600; color:var(--text2); letter-spacing:1px; }
    .hero-live-count { font-family:'JetBrains Mono',monospace; font-size:0.85rem; font-weight:600; color:var(--red); }

    /* ── FILTER BAR ── */
    .filter-bar { max-width:1380px; margin:0 auto; padding:0 24px 32px; display:flex; align-items:center; gap:8px; overflow-x:auto; scrollbar-width:none; }
    .filter-bar::-webkit-scrollbar { display:none; }
    .filter-chip { padding:7px 18px; border-radius:999px; border:1px solid var(--border); background:transparent; color:var(--text2); font-size:0.82rem; font-weight:600; cursor:pointer; white-space:nowrap; font-family:'Manrope',sans-serif; transition:all 0.18s; flex-shrink:0; }
    .filter-chip:hover { border-color:var(--border2); color:var(--text); background:var(--bg2); }
    .filter-chip.active { background:var(--text); color:var(--bg); border-color:var(--text); }
    .filter-chip.live-chip.active { background:var(--red); color:white; border-color:var(--red); box-shadow:0 0 12px var(--red-glow); }
    .filter-divider { width:1px; height:20px; background:var(--border); flex-shrink:0; margin:0 4px; }

    /* ── CONTENT ── */
    .content { max-width:1380px; margin:0 auto; padding:0 24px 60px; }
    .section-label { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
    .section-label-text { font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--text3); }
    .section-label-line { flex:1; height:1px; background:var(--border); }
    .section-label-count { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text3); }

    /* ── CHANNEL GRID ── */
    .channels-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; }

    .channel-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: transform 0.22s cubic-bezier(.22,.68,0,1.2), border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .channel-card:hover { transform:translateY(-5px); border-color:rgba(255,255,255,0.14); box-shadow:0 24px 48px rgba(0,0,0,0.5); }
    .channel-card.has-live { border-color:rgba(255,59,59,0.25); }
    .channel-card.has-live:hover { border-color:rgba(255,59,59,0.45); box-shadow:0 24px 48px rgba(255,59,59,0.12); }

    .card-thumb { width:100%; aspect-ratio:16/9; background:var(--bg2); position:relative; overflow:hidden; }
    .card-thumb-img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; }
    .channel-card:hover .card-thumb-img { transform:scale(1.04); }
    .card-thumb-gradient { position:absolute; inset:0; background:linear-gradient(to top,rgba(10,10,12,0.95) 0%,rgba(10,10,12,0.3) 45%,transparent 100%); }

    .card-live-badge { position:absolute; top:10px; left:10px; background:var(--red); padding:3px 8px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:0.65rem; font-weight:600; color:white; letter-spacing:1px; display:flex; align-items:center; gap:5px; }
    .card-live-badge .dot { width:5px; height:5px; border-radius:50%; background:white; animation:blink-dot 1.1s ease-in-out infinite; }
    @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .card-waiting-badge { position:absolute; top:10px; left:10px; background:rgba(255,179,71,0.15); border:1px solid rgba(255,179,71,0.4); padding:3px 8px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:0.65rem; font-weight:600; color:var(--amber); letter-spacing:1px; }

    /* Broadcast count badge — top right of thumbnail */
    .card-bcast-count {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      padding: 3px 9px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; font-weight: 600;
      color: var(--text2); letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 5px;
    }
    .card-bcast-count.has-live-count { color: var(--red); border-color: rgba(255,59,59,0.3); background: rgba(255,59,59,0.1); }

    .card-avatar { position:absolute; bottom:-18px; left:16px; width:48px; height:48px; border-radius:50%; border:3px solid var(--bg1); background:var(--bg2); overflow:hidden; display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; color:white; z-index:2; flex-shrink:0; }
    .card-avatar img { width:100%; height:100%; object-fit:cover; }

    .card-body { padding:26px 16px 16px; }
    .card-top { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; }
    .card-info { flex:1; min-width:0; }
    .card-channel-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .card-desc { font-size:0.8rem; color:var(--text2); line-height:1.5; margin-top:3px; display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    /* Stream preview row — just a CTA now */
    .card-cta-row {
      display: flex; align-items: center; gap: 9px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; margin-top: 10px;
      transition: border-color 0.18s, background 0.18s;
    }
    .channel-card:hover .card-cta-row { border-color: var(--red); background: rgba(255,59,59,0.06); }
    .card-cta-icon { width:28px; height:28px; border-radius:6px; background:rgba(255,59,59,0.12); display:flex; align-items:center; justify-content:center; color:var(--red); font-size:0.7rem; flex-shrink:0; }
    .card-cta-info { flex:1; min-width:0; }
    .card-cta-title { font-size:0.8rem; font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .card-cta-label { font-size:0.68rem; color:var(--red); font-family:'JetBrains Mono',monospace; letter-spacing:0.5px; margin-top:1px; }
    .card-cta-arrow { color:var(--text3); font-size:0.75rem; flex-shrink:0; transition:color 0.18s; }
    .channel-card:hover .card-cta-arrow { color: var(--red); }

    .channel-card:hover .card-cta-row.waiting { border-color:var(--amber); background:rgba(255,179,71,0.05); }
    .card-cta-row.waiting .card-cta-icon { background:rgba(255,179,71,0.1); color:var(--amber); }
    .card-cta-row.waiting .card-cta-label { color:var(--amber); }

    .card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:12px; }
    .card-past { font-size:0.72rem; color:var(--text3); display:flex; align-items:center; gap:5px; }

    .thumb-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    .thumb-placeholder i { font-size:2.5rem; opacity:0.12; }

    /* ── SKELETON ── */
    .skeleton { background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%); background-size:200% 100%; animation:shimmer 1.6s infinite; border-radius:6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-card { background:var(--bg1); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
    .skel-banner { height:168px; border-radius:0; }
    .skel-body { padding:28px 16px 16px; }
    .skel-line { height:13px; margin-bottom:9px; }

    /* ── EMPTY STATE ── */
    .empty-state { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:90px 20px; gap:12px; color:var(--text2); text-align:center; }
    .empty-icon { width:70px; height:70px; border-radius:50%; background:var(--bg2); display:flex; align-items:center; justify-content:center; font-size:1.8rem; color:var(--text3); margin-bottom:8px; }
    .empty-state h3 { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; color:var(--text); }
    .empty-state p { font-size:0.88rem; max-width:300px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .channels-grid { grid-template-columns: 1fr; }
      .nav-search { display: none; }
      .nav-search-toggle { display: flex; }
      .hero { padding: 32px 16px 24px; }
      .filter-bar { padding: 0 16px 24px; }
      .content { padding: 0 16px 60px; }
      .nav-inner { padding: 0 16px; }
      .nav-pill span { display: none; }
      .nav-pill { padding: 7px 10px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <div class="logo-mark">R</div>
      <span class="logo-name">Riverside</span>
    </a>

    <div class="nav-search">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search channels…" id="search-input" oninput="onSearch()">
    </div>

    <div class="nav-spacer"></div>

    <!-- Mobile search toggle -->
    <button class="nav-search-toggle" onclick="toggleMobileSearch()" id="search-toggle-btn" title="Search">
      <i class="fas fa-search"></i>
    </button>

    <a href="index.html" class="nav-pill ghost"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="studio.html" class="nav-pill primary"><i class="fas fa-broadcast-tower"></i><span>Go Live</span></a>
  </div>
</nav>

<!-- Mobile search bar -->
<div class="mobile-search-bar" id="mobile-search-bar">
  <div class="mobile-search-wrap">
    <i class="fas fa-search ms-icon"></i>
    <input type="text" placeholder="Search channels…" id="mobile-search-input" oninput="onMobileSearch()">
  </div>
</div>

<div class="hero">
  <div class="hero-left">
    <h1>Watch <span>Live</span><br>Broadcasts</h1>
    <p class="hero-sub">Follow your favorite channels · Join live worship &amp; services</p>
  </div>
  <div class="hero-live-indicator">
    <div class="pulse-ring"></div>
    <span class="hero-live-text">LIVE NOW&nbsp;&nbsp;</span>
    <span class="hero-live-count" id="live-count">—</span>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-chip active" onclick="setFilter('all',this)">All Channels</button>
  <button class="filter-chip live-chip" onclick="setFilter('live',this)">
    <i class="fas fa-circle" style="color:var(--red);font-size:0.55rem"></i>&ensp;Live Now
  </button>
  <button class="filter-chip" onclick="setFilter('waiting',this)">Upcoming</button>
  <div class="filter-divider"></div>
  <button class="filter-chip" onclick="setFilter('ended',this)">Past Broadcasts</button>
</div>

<div class="content">
  <div class="section-label">
    <span class="section-label-text">Channels</span>
    <div class="section-label-line"></div>
    <span class="section-label-count" id="ch-count">—</span>
  </div>
  <div class="channels-grid" id="channels-grid">
    <div class="skel-card"><div class="skeleton skel-banner"></div><div class="skel-body"><div class="skeleton skel-line" style="width:65%"></div><div class="skeleton skel-line" style="width:45%"></div></div></div>
    <div class="skel-card"><div class="skeleton skel-banner"></div><div class="skel-body"><div class="skeleton skel-line" style="width:75%"></div><div class="skeleton skel-line" style="width:50%"></div></div></div>
    <div class="skel-card"><div class="skeleton skel-banner"></div><div class="skel-body"><div class="skeleton skel-line" style="width:55%"></div><div class="skeleton skel-line" style="width:40%"></div></div></div>
    <div class="skel-card"><div class="skeleton skel-banner"></div><div class="skel-body"><div class="skeleton skel-line" style="width:70%"></div><div class="skeleton skel-line" style="width:55%"></div></div></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkdNPwEu9nOVH2GmqYUny-Yx3R_r00O_HbTABTfigUfk-FwRGIRNKSc8wJVyfTTQYR/exec';

let allChannels   = [];
let allBroadcasts = {};
let activeFilter  = 'all';
let searchQuery   = '';

const lh3 = url => { if(!url)return''; const id=url.match(/[-\w]{25,}/)?.[0]; return id?`https://lh3.googleusercontent.com/d/${id}`:url; };
const hslFromStr = s => { let h=0; for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h); return `hsl(${Math.abs(h)%360},50%,30%)`; };
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* Mobile search */
function toggleMobileSearch() {
  const bar = document.getElementById('mobile-search-bar');
  const isOpen = bar.classList.toggle('open');
  if (isOpen) { document.getElementById('mobile-search-input').focus(); }
  else { document.getElementById('mobile-search-input').value = ''; searchQuery = ''; render(); }
}
function onMobileSearch() {
  searchQuery = document.getElementById('mobile-search-input').value.trim();
  render();
}

async function loadAll() {
  try {
    const r = await fetch(`${SCRIPT_URL}?operation=getLiveChannels`);
    const d = await r.json();
    if (d.status !== 'success') throw new Error();
    allChannels = d.channels || [];
    await Promise.all(allChannels.map(async ch => {
      try {
        const br = await fetch(`${SCRIPT_URL}?operation=getLiveBroadcasts&channelId=${encodeURIComponent(ch.id)}`);
        const bd = await br.json();
        allBroadcasts[ch.id] = bd.broadcasts || [];
      } catch { allBroadcasts[ch.id] = []; }
    }));
    render();
    updateLiveCount();
  } catch {
    document.getElementById('channels-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-satellite-dish"></i></div>
        <h3>No channels yet</h3>
        <p>Channels will appear here once created in Studio.</p>
      </div>`;
  }
}

function render() {
  let list = [...allChannels];
  const q = searchQuery.toLowerCase();
  if (q) list = list.filter(ch => (ch.name||'').toLowerCase().includes(q) || (ch.description||'').toLowerCase().includes(q));

  if (activeFilter === 'live')    list = list.filter(ch => (allBroadcasts[ch.id]||[]).some(b=>b.status==='live'));
  else if (activeFilter === 'waiting') list = list.filter(ch => { const bs=allBroadcasts[ch.id]||[]; return bs.some(b=>b.status==='waiting')&&!bs.some(b=>b.status==='live'); });
  else if (activeFilter === 'ended')   list = list.filter(ch => { const bs=allBroadcasts[ch.id]||[]; return bs.some(b=>b.status==='ended')&&!bs.some(b=>b.status==='live')&&!bs.some(b=>b.status==='waiting'); });

  document.getElementById('ch-count').textContent = list.length + ' channel' + (list.length!==1?'s':'');

  if (!list.length) {
    document.getElementById('channels-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-tv"></i></div>
        <h3>No channels found</h3>
        <p>${activeFilter==='live'?'No one is live right now.':activeFilter==='waiting'?'No upcoming broadcasts.':'No channels match your search.'}</p>
      </div>`;
    return;
  }
  document.getElementById('channels-grid').innerHTML = list.map(ch => channelCard(ch)).join('');
}

function channelCard(ch) {
  const bs      = allBroadcasts[ch.id] || [];
  const live    = bs.find(b=>b.status==='live');
  const waiting = bs.find(b=>b.status==='waiting');
  const pastCnt = bs.filter(b=>b.status==='ended').length;
  const liveCnt = bs.filter(b=>b.status==='live').length;
  const banner  = lh3(ch.bannerLink);
  const pic     = lh3(ch.picLink);
  const init    = (ch.name||'?')[0].toUpperCase();
  const bg      = hslFromStr(ch.name||'x');

  // Destination page
  const href = `slidelive.html?channel=${encodeURIComponent(ch.id)}`;

  const thumbHtml = banner
    ? `<img src="${banner}" class="card-thumb-img" onerror="this.style.display='none'">`
    : `<div class="thumb-placeholder"><i class="fas fa-photo-video"></i></div>`;

  const statusBadge = live
    ? `<div class="card-live-badge"><div class="dot"></div>LIVE</div>`
    : waiting
    ? `<div class="card-waiting-badge">⏳ SOON</div>`
    : '';

  // Broadcast count badge
  const totalBcasts = bs.length;
  const bcastBadge = totalBcasts > 0
    ? `<div class="card-bcast-count ${liveCnt>0?'has-live-count':''}">
        <i class="fas fa-${liveCnt>0?'circle':'film'}" style="font-size:0.5rem"></i>
        ${liveCnt>0 ? liveCnt+' live' : totalBcasts+' broadcast'+(totalBcasts!==1?'s':'')}
       </div>`
    : '';

  const ctaRow = live
    ? `<div class="card-cta-row">
        <div class="card-cta-icon"><i class="fas fa-play"></i></div>
        <div class="card-cta-info">
          <div class="card-cta-title">${esc(live.title)}</div>
          <div class="card-cta-label">● LIVE NOW — tap to watch</div>
        </div>
        <i class="fas fa-chevron-right card-cta-arrow"></i>
       </div>`
    : waiting
    ? `<div class="card-cta-row waiting">
        <div class="card-cta-icon"><i class="fas fa-clock"></i></div>
        <div class="card-cta-info">
          <div class="card-cta-title">${esc(waiting.title)}</div>
          <div class="card-cta-label">STARTING SOON</div>
        </div>
        <i class="fas fa-chevron-right card-cta-arrow"></i>
       </div>`
    : `<div class="card-cta-row" style="opacity:0.6">
        <div class="card-cta-icon" style="background:rgba(85,85,102,0.2);color:var(--text3)"><i class="fas fa-film"></i></div>
        <div class="card-cta-info">
          <div class="card-cta-title" style="color:var(--text2)">View broadcasts</div>
          <div class="card-cta-label" style="color:var(--text3)">${pastCnt} past broadcast${pastCnt!==1?'s':''}</div>
        </div>
        <i class="fas fa-chevron-right card-cta-arrow"></i>
       </div>`;

  return `
  <a class="channel-card ${live?'has-live':''}" href="${href}">
    <div class="card-thumb">
      ${thumbHtml}
      <div class="card-thumb-gradient"></div>
      ${statusBadge}
      ${bcastBadge}
      <div class="card-avatar" style="${pic?'':'background:'+bg}">
        ${pic?`<img src="${pic}" onerror="this.style.display='none'">`:init}
      </div>
    </div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-info">
          <div class="card-channel-name">${esc(ch.name)}</div>
          <div class="card-desc">${esc(ch.description||'No description provided.')}</div>
        </div>
      </div>
      ${ctaRow}
      ${pastCnt>0&&!live?`<div class="card-footer"><span class="card-past"><i class="fas fa-film"></i>&ensp;${pastCnt} past broadcast${pastCnt>1?'s':''}</span></div>`:''}
    </div>
  </a>`;
}

function updateLiveCount() {
  const n = allChannels.filter(ch=>(allBroadcasts[ch.id]||[]).some(b=>b.status==='live')).length;
  document.getElementById('live-count').textContent = n ? n + ' live' : 'None live';
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function onSearch() {
  searchQuery = document.getElementById('search-input').value.trim();
  render();
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
