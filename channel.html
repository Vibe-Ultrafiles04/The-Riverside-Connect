<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Channels · Riverside</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <link rel="manifest" href="./manifest.json">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Riverside Connect">

  <link rel="apple-touch-icon" sizes="180x180" href="maskable_icon_x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="maskable_icon_x192.png">
  <link rel="apple-touch-icon" sizes="167x167" href="maskable_icon_x192.png">
  <link rel="apple-touch-icon" href="maskable_icon_x192.png">
  
  <meta property="og:title" content="Riverside Connect">
  <meta property="og:description" content="Join the conversation in Riverside Connect – a simple, real-time chat experience. Share thoughts, media & more.">
  <meta property="og:image" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/maskable_icon_x192.png">
  <meta property="og:url" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Riverside Connect">
  <meta name="twitter:description" content="Join the conversation in Riverside Connect – a simple, real-time chat experience.">
  <meta name="twitter:image" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/maskable_icon_x192.png">

  <meta property="og:site_name" content="Riverside Connect">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Riverside Connect chat preview">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      min-height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    html, body { height: 100%; }

    .sidebar {
      width: 280px;
      background: rgba(15,23,42,0.94);
      backdrop-filter: blur(14px);
      border-right: 1px solid rgba(96,165,250,0.18);
      overflow-y: auto;
      flex-shrink: 0;
      padding: 16px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(96,165,250,0.2);
      margin-bottom: 16px;
    }

    .back-btn {
      color: #60a5fa;
      font-size: 1.5rem;
      text-decoration: none;
      padding: 8px;
      border-radius: 50%;
    }

    .sidebar h1 {
      font-size: 1.4rem;
      color: #60a5fa;
      font-weight: 700;
      flex: 1;
    }

    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .channel-tab {
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(30,41,59,0.4);
      transition: all 0.2s;
    }

    .channel-tab:hover, .channel-tab.active {
      background: rgba(96,165,250,0.3);
    }

    .channel-tab.active { border-left: 4px solid #60a5fa; }

    .channel-tab-name { font-weight: 600; font-size: 1.05rem; }
    .channel-tab-desc { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .channel-header {
      background: rgba(15,23,42,0.94);
      backdrop-filter: blur(14px);
      padding: 16px 24px;
      border-bottom: 1px solid rgba(96,165,250,0.22);
      flex-shrink: 0;
    }

    .channel-title {
      font-size: 1.7rem;
      color: #60a5fa;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .channel-meta { color: #94a3b8; font-size: 0.98rem; }

    .feed-wrapper {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .feed {
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding-bottom: 120px;
      min-height: 100%;
    }

    .post {
      background: rgba(30,41,59,0.88);
      border-radius: 16px;
      margin-bottom: 28px;
      border: 1px solid rgba(96,165,250,0.15);
      overflow: hidden;
      width: 100%;
    }

    .post-header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
    }

    .post-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid rgba(96,165,250,0.45);
    }

    .post-author { font-weight: 700; font-size: 1.1rem; color: #60a5fa; }
    .post-time { color: #94a3b8; font-size: 0.85rem; }

    .post-content {
      padding: 0 16px 16px;
      line-height: 1.6;
      font-size: 1.05rem;
      white-space: pre-wrap;
    }

    .post-media img, .post-media video {
      width: 100%;
      display: block;
      max-height: 580px;
      object-fit: contain;
      background: #000;
    }

    .post-footer {
      padding: 12px 16px;
      display: flex;
      gap: 24px;
      border-top: 1px solid rgba(96,165,250,0.12);
      color: #94a3b8;
      align-items: center;
    }

    .post-like {
      cursor: pointer;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .post-like:hover { color: #ef4444; }
    .post-like.liked { color: #f87171; }
    .post-like:hover { transform: scale(1.15); }

    /* ── View count — clean pill style ─────────────────────────────────── */
    .post-views {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #64748b;
      font-size: 0.88rem;
      cursor: pointer;
      user-select: none;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(96,165,250,0.06);
      border: 1px solid rgba(96,165,250,0.12);
      transition: all 0.18s ease;
      margin-left: auto;
    }

    .post-views:hover {
      color: #60a5fa;
      background: rgba(96,165,250,0.14);
      border-color: rgba(96,165,250,0.3);
    }

    .post-views i { font-size: 0.8rem; }

    .post-views .view-count {
      font-weight: 600;
      color: #94a3b8;
      transition: color 0.18s;
    }

    .post-views:hover .view-count { color: #60a5fa; }

    /* Views loading shimmer */
    .view-count.loading {
      display: inline-block;
      width: 20px;
      height: 12px;
      background: rgba(96,165,250,0.2);
      border-radius: 4px;
      animation: shimmer 1.4s infinite ease-in-out;
      vertical-align: middle;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }

    /* ── Comment section ────────────────────────────────────────────────── */
    .comment-section {
      padding: 0 16px 16px;
      border-top: 1px solid rgba(96,165,250,0.12);
      max-height: 60vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #60a5fa #1e293b;
      display: none;
    }

    .comment-section.open {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    .comment-section::-webkit-scrollbar { width: 5px; }
    .comment-section::-webkit-scrollbar-track { background: transparent; }
    .comment-section::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.5); border-radius: 10px; }
    .comment-section::-webkit-scrollbar-thumb:hover { background: #60a5fa; }

    .comments-list {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .comments-list::after {
      content: "";
      height: 20px;
      flex-shrink: 0;
    }

    .comment-section .input-area {
      position: sticky;
      bottom: 0;
      background: rgba(15,23,42,0.98);
      padding: 12px 0;
      z-index: 10;
      border-top: 1px solid rgba(96,165,250,0.25);
    }

    .comment-section .input-wrapper {
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 4px;
    }

    .comment {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .comment-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .comment-body {
      background: rgba(255,255,255,0.06);
      padding: 10px 14px;
      border-radius: 16px;
      flex: 1;
    }

    .comment-author { font-weight: 600; font-size: 0.95rem; }
    .comment-text { margin-top: 4px; }

    /* Comment count toggle */
    .post-footer .comment-count {
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .post-footer .comment-count:hover { color: #60a5fa; }

    .post-footer .comment-count .icon { margin-right: 2px; }

    .post-footer .comment-count::after {
      content: "comments";
      font-size: 0.72rem;
      margin-left: 2px;
      opacity: 0.65;
    }

    .post-footer .comment-count.open::after { content: "hide"; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 24px rgba(59,130,246,0.4);
      cursor: pointer;
      z-index: 1000;
      transition: all 0.2s;
    }

    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(59,130,246,0.5);
    }

    /* Posting Panel */
    .post-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15,23,42,0.98);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(96,165,250,0.3);
      padding: 24px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 999;
      max-height: 70vh;
      overflow-y: auto;
    }

    .post-panel.active { transform: translateY(0); }

    .post-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .post-panel-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.6rem;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(96,165,250,0.4);
      color: white;
      font-size: 1.05rem;
      min-height: 120px;
      resize: vertical;
      margin-bottom: 16px;
    }

    .media-preview {
      max-width: 100%;
      max-height: 300px;
      border-radius: 12px;
      margin: 12px 0;
      display: block;
    }

    .post-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .media-btn {
      color: #60a5fa;
      font-size: 1.8rem;
      cursor: pointer;
      padding: 12px;
    }

    .submit-post {
      padding: 12px 32px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
    }

    .empty, .loading {
      text-align: center;
      padding: 140px 32px;
      color: #94a3b8;
      font-size: 1.2rem;
    }

    #toast-container {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      max-width: 90%;
    }

    .toast {
      background: #1e293b;
      padding: 14px 24px;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
      border-left: 5px solid #3b82f6;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideDown 0.35s ease;
    }

    .toast.error { border-left-color: #ef4444; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        max-height: 45dvh;
        border-right: none;
        border-bottom: 1px solid rgba(96,165,250,0.18);
      }
      .fab { bottom: 90px; right: 24px; }
      .post-panel { padding: 20px; }
    }

    .feed-wrapper {
      padding-left: 0;
      padding-right: 0;
    }

    .feed-wrapper::-webkit-scrollbar { width: 5px; }
    .feed-wrapper::-webkit-scrollbar-track { background: transparent; }
    .feed-wrapper::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.5); border-radius: 10px; }
    .feed-wrapper::-webkit-scrollbar-thumb:hover { background: #60a5fa; }

    .post-media {
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #60a5fa #1e293b;
    }

    .post-media::-webkit-scrollbar { height: 6px; }
    .post-media::-webkit-scrollbar-thumb { background: #60a5fa; border-radius: 3px; }

    /* ── Bubble comment styles ─────────────────────────────────────────── */
    .bubble-comments .message {
      display: flex;
      align-items: flex-start;
      max-width: 82%;
      gap: 10px;
      margin-bottom: 14px;
      animation: fadeIn 0.35s ease-out;
    }

    .bubble-comments .message.own {
      margin-left: auto;
      flex-direction: row-reverse;
    }

    .bubble-comments .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #60a5fa33;
      flex-shrink: 0;
    }

    .bubble-comments .message-content {
      background: rgba(30,41,59,0.78);
      backdrop-filter: blur(6px);
      padding: 10px 14px;
      border-radius: 18px;
      border-top-left-radius: 4px;
      position: relative;
      max-width: calc(100% - 52px);
    }

    .bubble-comments .message.own .message-content {
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: white;
      border-top-left-radius: 18px;
      border-top-right-radius: 4px;
    }

    .bubble-comments .name {
      font-weight: 600;
      color: #60a5fa;
      font-size: 0.92rem;
      margin-bottom: 3px;
    }

    .bubble-comments .message.own .name {
      color: white;
      opacity: 0.95;
    }

    .bubble-comments .text {
      word-break: break-word;
      line-height: 1.38;
      font-size: 0.96rem;
    }

    .bubble-comments .time {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 5px;
      opacity: 0.85;
      display: block;
    }

    .bubble-comments .message.own .time { color: rgba(255,255,255,0.75); }

    .bubble-comments .quoted-msg {
      background: rgba(0,0,0,0.25);
      border-left: 3px solid #60a5fa;
      padding: 6px 10px;
      border-radius: 6px;
      margin: 6px 0 10px 0;
      font-size: 0.86rem;
      color: #cbd5e1;
    }

    .bubble-comments .message.own .quoted-msg {
      background: rgba(255,255,255,0.12);
      border-left-color: white;
      color: #f1f5f9;
    }

    .bubble-comments .media-content {
      margin: 8px 0 4px 0;
      border-radius: 10px;
      overflow: hidden;
    }

    .bubble-comments .media-content img,
    .bubble-comments .media-content video {
      max-width: 100%;
      max-height: 280px;
      display: block;
      border-radius: 10px;
    }

    /* Delete buttons */
    .delete-post-btn {
      opacity: 0.6;
      transition: opacity 0.2s, transform 0.15s;
    }

    .delete-post-btn:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    .delete-post-btn:active { transform: scale(0.95); }

    .delete-post-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .post.deleting {
      opacity: 0.45;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .message .delete-comment-btn {
      background: none;
      border: none;
      color: #f87171;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 2px 6px;
      opacity: 0.6;
      transition: all 0.2s;
    }

    .message:hover .delete-comment-btn,
    .message.own .delete-comment-btn { opacity: 0.9; }

    .message .delete-comment-btn:hover {
      opacity: 1;
      transform: scale(1.15);
      color: #ef4444;
    }

    .message:not(.own) .delete-comment-btn { display: none; }

    .message.deleting {
      opacity: 0.5;
      transition: opacity 0.4s;
    }

    .delete-comment-btn:disabled { cursor: not-allowed !important; }

    .toast.confirm-toast {
      min-width: 400px;
      text-align: left;
    }

    .toast.confirm-toast button:hover {
      opacity: 0.9;
      transform: scale(1.03);
    }

    /* Skeleton */
    .skeleton {
      height: 72px;
      background: rgba(96,165,250,0.12);
      border-radius: 12px;
      animation: pulse 1.6s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.15; }
    }

    /* Top Navigation */
    .top-nav {
      background: rgba(15,23,42,0.94);
      backdrop-filter: blur(14px);
      padding: 12px 16px;
      border-bottom: 1px solid rgba(96,165,250,0.22);
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 900;
      flex-shrink: 0;
    }

    .channels-btn {
      background: rgba(96,165,250,0.2);
      color: #60a5fa;
      border: none;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .channels-btn:hover { background: rgba(96,165,250,0.4); }

    .page-title {
      font-size: 1.3rem;
      color: #60a5fa;
      margin: 0;
      flex: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Channels Panel */
    .channels-panel {
      position: fixed;
      top: 0;
      left: -320px;
      width: 300px;
      height: 100%;
      background: rgba(15,23,42,0.98);
      backdrop-filter: blur(14px);
      border-right: 1px solid rgba(96,165,250,0.3);
      transition: left 0.35s ease;
      z-index: 950;
      overflow-y: auto;
      padding: 16px;
    }

    .channels-panel.open { left: 0; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(96,165,250,0.2);
    }

    .panel-header h2 { margin: 0; color: #60a5fa; }

    .close-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 2rem;
      cursor: pointer;
    }

    main.main { width: 100%; }

    @media (max-width: 768px) {
      .channels-panel {
        width: 100%;
        left: -100%;
      }
      .channels-panel.open { left: 0; }
    }

    .back-btn-top {
      color: #60a5fa;
      font-size: 1.4rem;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      transition: all 0.2s;
    }

    .back-btn-top:hover {
      background: rgba(96,165,250,0.25);
      transform: scale(1.1);
    }

    @media (max-width: 480px) {
      .top-nav { padding: 10px 12px; gap: 10px; }
      .back-btn-top { padding: 6px 10px; font-size: 1.3rem; }
      .channels-btn { padding: 6px 12px; font-size: 0.95rem; }
    }

    /* Description toggle */
    .desc-container { position: relative; }
    .desc-toggle-wrapper { margin-top: 2px; }
    .desc-toggle { color: #60a5fa; cursor: pointer; font-size: 0.9rem; }
    .desc-toggle:hover { color: #93c5fd; text-decoration: underline; }
    .desc-short, .desc-full { transition: all 0.4s ease; }

    /* Channel Modal */
    .channel-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 2000;
    }

    .channel-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .channel-modal-content {
      background: rgba(15,23,42,0.95);
      padding: 28px;
      width: 90%;
      max-width: 420px;
      border-radius: 18px;
      border: 1px solid rgba(96,165,250,0.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .channel-modal-content h3 { margin-bottom: 18px; color: #60a5fa; }

    .channel-modal-content input,
    .channel-modal-content textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(96,165,250,0.4);

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiU_LeE6AnCQFzLmORd6kpkHVh3cllbpXhYOg4H1L8U2MAbjF0X0nR03n8_2yFc0KN/exec';

const postEventsMap = new Map();

/* ─────────────────────────────────────────────────────────────────────────
   PER-POST VIEW TRACKING
   viewedPostIds  — Set of postIds already recorded THIS session
   postViewCounts — Map of postId → displayed count (optimistic cache)
   ───────────────────────────────────────────────────────────────────────── */
const viewedPostIds  = new Set();
const postViewCounts = new Map();

let currentUserName  = localStorage.getItem("userName") || "";
let currentChannelId = null;
let allChannels      = [];
let isUserApproved   = false;
let targetPostId     = null;

if (!currentUserName) window.location.href = "index.html";

const channelList   = document.getElementById("channelList");
const channelHeader = document.getElementById("channelHeader");
const feed          = document.getElementById("feed");
const fabPost       = document.getElementById("fabPost");
const postPanel     = document.getElementById("postPanel");
const postContent   = document.getElementById("postContent");
const mediaInput    = document.getElementById("mediaInput");
const mediaPreview  = document.getElementById("mediaPreview");
const createBtn     = document.getElementById("createChannelBtn");

/* ── Channel caching ───────────────────────────────────────────────────── */
const CHANNELS_CACHE_KEY = "riverside_channels_cache";
const CHANNELS_CACHE_TTL = 10 * 60 * 1000;

function getCachedChannels() {
  try {
    const json = localStorage.getItem(CHANNELS_CACHE_KEY);
    if (!json) return null;
    const data = JSON.parse(json);
    if (Date.now() - data.timestamp > CHANNELS_CACHE_TTL) {
      localStorage.removeItem(CHANNELS_CACHE_KEY);
      return null;
    }
    return data.channels || [];
  } catch (e) {
    localStorage.removeItem(CHANNELS_CACHE_KEY);
    return null;
  }
}

function saveChannelsToCache(channels) {
  try {
    localStorage.setItem(CHANNELS_CACHE_KEY, JSON.stringify({ timestamp: Date.now(), channels }));
  } catch (e) {}
}

function clearChannelsCache() {
  localStorage.removeItem(CHANNELS_CACHE_KEY);
}

function getLh3Link(url) {
  if (!url) return '';
  const id = url.match(/[-\w]{25,}/)?.[0];
  return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

/* ══════════════════════════════════════════════════════════════════════════
   PER-POST VIEW RECORDING — called once per postId per session
   ══════════════════════════════════════════════════════════════════════════ */
async function recordSinglePostView(postId) {
  if (!postId || viewedPostIds.has(postId)) return; // already recorded this session

  viewedPostIds.add(postId); // mark immediately so parallel calls are blocked

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        operation: "recordChannelPostView",
        postId:    postId,
        username:  currentUserName,
        channelId: currentChannelId
      })
    });

    const data = await res.json();

    if (data.status === "success") {
      // Backend returned the new count for this specific post
      const newCount = data.count ?? null;
      if (newCount !== null) {
        updatePostViewCountUI(postId, newCount);
        postViewCounts.set(postId, newCount);
      }
    }
  } catch (err) {
    // Silent — don't disturb UX for view tracking failures
    console.warn("recordSinglePostView failed for", postId, err);
  }
}

/* ── Fetch and display view count for a single post ─────────────────────── */
async function fetchPostViewCount(postId) {
  try {
    const r = await fetch(
      `${SCRIPT_URL}?operation=getChannelPostViewCount&postId=${encodeURIComponent(postId)}`
    );
    const data = await r.json();

    if (data.status === "success") {
      const count = data.count ?? 0;
      updatePostViewCountUI(postId, count);
      postViewCounts.set(postId, count);
    }
  } catch (err) {
    console.warn("fetchPostViewCount failed:", postId, err);
  }
}

/* ── Update the DOM element for a specific post's view count ─────────────── */
function updatePostViewCountUI(postId, count) {
  const el = document.querySelector(`.post-views[data-postid="${postId}"] .view-count`);
  if (el) {
    el.classList.remove('loading');
    el.textContent = count;
  }
}

/* ── Record views for all currently rendered posts ──────────────────────── */
async function recordViewsForVisiblePosts() {
  const postEls = document.querySelectorAll('.post[data-post-id]');
  const postIds = Array.from(postEls).map(el => el.dataset.postId).filter(Boolean);

  // Fire individually — each call is per-post-per-viewer on backend
  for (const pid of postIds) {
    await recordSinglePostView(pid); // await keeps server load gentle
  }
}

/* ── Refresh ALL displayed view counts from server ───────────────────────── */
async function refreshAllViewCounts() {
  const postEls = document.querySelectorAll('.post[data-post-id]');
  for (const el of postEls) {
    const postId = el.dataset.postId;
    if (postId) await fetchPostViewCount(postId);
  }
}

/* ════════════════════════════════════════════════════════════════════════
   CHANNEL LOADING
   ════════════════════════════════════════════════════════════════════════ */
async function checkCreateChannelPermission() {
  try {
    const r = await fetch(`${SCRIPT_URL}?operation=getUserStatus&name=${encodeURIComponent(currentUserName)}`);
    const data = await r.json();
    if (data.status === "success") {
      const canCreate = data.userStatus === "approved" && data.isAdmin === true;
      isUserApproved = data.userStatus === "approved";
      createBtn.style.display = canCreate ? "block" : "none";
    }
  } catch (e) {
    createBtn.style.display = "none";
  }
}

createBtn.onclick = () => {
  document.getElementById("channelModal").classList.add("active");
};

async function loadAllChannels(forceFresh = false) {
  let channels = !forceFresh ? getCachedChannels() : null;

  if (channels) {
    renderChannelList(channels);
    refreshChannelsInBackground();
  } else {
    await fetchAndRenderChannels();
  }

  let channelToOpen = null;
  const urlParams = new URLSearchParams(window.location.search);
  const urlChannelId = urlParams.get('channelId');
  const urlPostId    = urlParams.get('postId');

  if (urlChannelId) {
    channelToOpen = (channels || allChannels).find(ch => ch.id === urlChannelId);
    if (urlPostId) targetPostId = urlPostId;
  }

  if (!channelToOpen) {
    const lastId = localStorage.getItem("lastChannelId");
    if (lastId) channelToOpen = (channels || allChannels).find(ch => ch.id === lastId);
  }

  if (!channelToOpen && (channels || allChannels).length > 0) {
    channelToOpen = (channels || allChannels)[0];
  }

  if (channelToOpen) {
    openChannelTab(
      channelToOpen.id, channelToOpen.name, channelToOpen.description,
      channelToOpen.creator, channelToOpen.created, channelToOpen.picLink
    );
    localStorage.setItem("lastChannelId", channelToOpen.id);
    if (targetPostId) setTimeout(() => scrollToPost(targetPostId), 800);
  }
}

function renderChannelList(channels) {
  allChannels = channels;
  channelList.innerHTML = channels.length === 0
    ? '<div class="empty" style="padding:32px;text-align:center;">No channels yet</div>'
    : '';

  channels.forEach(ch => {
    const tab = document.createElement("div");
    tab.className = "channel-tab";
    const avatarSrc = ch.picLink
      ? getLh3Link(ch.picLink)
      : 'https://via.placeholder.com/48?text=' + ch.name.charAt(0).toUpperCase();

    tab.innerHTML = `
      <div style="display:flex; align-items:center; gap:12px;">
        <img src="${avatarSrc}"
             style="width:48px; height:48px; border-radius:50%; object-fit:cover; border:2px solid rgba(96,165,250,0.4); flex-shrink:0;"
             onerror="this.src='https://picsum.photos/id/64/48/48'">
        <div>
          <div class="channel-tab-name">${ch.name}</div>
          <div class="channel-tab-desc">${ch.description || "No description"}</div>
        </div>
      </div>
    `;
    tab.onclick = () => openChannelTab(ch.id, ch.name, ch.description, ch.creator, ch.created, ch.picLink);
    channelList.appendChild(tab);
  });
}

async function fetchAndRenderChannels() {
  try {
    const r = await fetch(`${SCRIPT_URL}?operation=getAllChannels`);
    if (!r.ok) throw new Error("Network response was not ok");
    const resp = await r.json();
    const freshChannels = resp.channels || [];
    allChannels = freshChannels;
    saveChannelsToCache(freshChannels);
    renderChannelList(freshChannels);
  } catch (err) {
    channelList.innerHTML = '<div class="empty">Failed to load channels</div>';
  }
}

function refreshChannelsInBackground() {
  fetchAndRenderChannels().catch(() => {});
}

/* ════════════════════════════════════════════════════════════════════════
   CHANNEL OPEN
   ════════════════════════════════════════════════════════════════════════ */
async function openChannelTab(channelId, name, description, creator, created, picLink) {
  if (!channelId) return;

  localStorage.setItem("lastChannelId", channelId);
  currentChannelId = channelId;

  // Reset per-session view tracking when switching channels
  viewedPostIds.clear();
  postViewCounts.clear();

  document.querySelectorAll('.channel-tab').forEach(el => el.classList.remove('active'));
  const active = [...document.querySelectorAll('.channel-tab')].find(
    el => el.querySelector('.channel-tab-name')?.textContent === name
  );
  if (active) active.classList.add('active');

  const avatarSrc = picLink
    ? getLh3Link(picLink)
    : `https://via.placeholder.com/64?text=${name.charAt(0).toUpperCase()}`;

  const isCreator = creator === currentUserName;
  const descText  = (description || "No description").trim();
  const words     = descText.split(/\s+/);
  const shortDesc = words.slice(0, 3).join(" ") + (words.length > 3 ? "..." : "");
  const needsToggle = words.length > 3;

  const dateStr = new Date(created).toLocaleDateString(undefined, {
    month: 'short', day: 'numeric', year: 'numeric'
  });

  channelHeader.innerHTML = `
    <div style="display: flex; align-items: flex-start; gap: 16px; padding: 8px 0;">
      <div style="position: relative; width: 64px; height: 64px; flex-shrink: 0; cursor: ${isCreator ? 'pointer' : 'default'};">
        <div style="position: absolute; inset: -4px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #60a5fa, #3b82f6 60%, transparent 80%); z-index: 1; pointer-events: none;"></div>
        <img src="${avatarSrc}" id="channelAvatarHeader"
             style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid rgba(15,23,42,0.9); box-shadow: 0 4px 16px rgba(59,130,246,0.35); position: relative; z-index: 2;"
             onerror="this.src='https://picsum.photos/id/64/48/48'" alt="${name} icon">
        ${isCreator ? `
          <div id="avatarEditOverlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; z-index: 3; pointer-events: none;">
            <i class="fas fa-camera" style="font-size: 1.8rem; color: white;"></i>
          </div>` : ''}
      </div>

      <div style="flex: 1; min-width: 0;">
        <h2 class="channel-title" style="margin: 0 0 6px 0; font-size: 1.4rem;">${name}</h2>
        <div class="channel-meta" style="line-height: 1.45;">
          <div class="desc-line" style="display: flex; align-items: baseline; flex-wrap: nowrap; gap: 0.4em; overflow: hidden;">
            <span class="desc-short" style="color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.4s ease;">${shortDesc}</span>
            ${needsToggle ? `<span class="desc-toggle" style="color: #60a5fa; cursor: pointer; font-size: 0.9rem; white-space: nowrap; flex-shrink: 0; user-select: none; transition: color 0.2s;">more</span>` : ''}
            <span class="desc-creator-date" style="color: #94a3b8; font-size: 0.92rem; white-space: nowrap; flex-shrink: 0; margin-left: auto;">By ${creator} • ${dateStr}</span>
          </div>
          <div class="desc-full-container" style="max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.55s ease, opacity 0.4s ease;">
            <div class="desc-full" style="color: #cbd5e1; padding-top: 6px; padding-bottom: 4px;">${descText}</div>
            <div style="color: #94a3b8; font-size: 0.92rem; padding-bottom: 4px;">By ${creator} • ${dateStr}</div>
            ${needsToggle ? `<span class="desc-toggle-less" style="color: #f87171; cursor: pointer; font-size: 0.9rem; display: block; margin-top: 2px; user-select: none;">less</span>` : ''}
          </div>
        </div>
      </div>
    </div>
    ${isCreator ? `
    <button id="deleteChannelBtn" title="Delete this channel (permanent)"
            style="margin-left: auto; background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; border-radius: 999px; padding: 8px 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;"
            onmouseover="this.style.background='rgba(239,68,68,0.3)'; this.style.transform='scale(1.05)'"
            onmouseout="this.style.background='rgba(239,68,68,0.15)'; this.style.transform='scale(1)'">
      <i class="far fa-trash-alt"></i> Delete Channel
    </button>` : ''}
  `;

  channelHeader.style.display = 'block';

  if (isCreator) {
    const avatarImg = document.getElementById('channelAvatarHeader');
    const overlay   = document.getElementById('avatarEditOverlay');
    avatarImg.addEventListener('mouseenter', () => overlay && (overlay.style.opacity = '1'));
    avatarImg.addEventListener('mouseleave', () => overlay && (overlay.style.opacity = '0'));
    avatarImg.addEventListener('click', () => openEditChannelModal(channelId, name, description, picLink));

    const deleteBtn = document.getElementById("deleteChannelBtn");
    if (deleteBtn) deleteBtn.onclick = () => deleteCurrentChannel();
  }

  // Toggle expand/collapse description
  const toggleMore = channelHeader.querySelector('.desc-toggle');
  const toggleLess = channelHeader.querySelector('.desc-toggle-less');
  const shortLine  = channelHeader.querySelector('.desc-line');
  const fullCont   = channelHeader.querySelector('.desc-full-container');

  if (toggleMore && needsToggle) {
    const toggle = () => {
      const expanded = fullCont.style.maxHeight && fullCont.style.maxHeight !== '0px';
      if (!expanded) {
        fullCont.style.maxHeight = `${fullCont.scrollHeight}px`;
        fullCont.style.opacity = '1';
        shortLine.style.opacity = '0';
        shortLine.style.height = '0';
        toggleMore.style.display = 'none';
        if (toggleLess) toggleLess.style.display = 'inline';
      } else {
        fullCont.style.maxHeight = '0';
        fullCont.style.opacity = '0';
        shortLine.style.opacity = '1';
        shortLine.style.height = 'auto';
        toggleMore.style.display = 'inline';
        if (toggleLess) toggleLess.style.display = 'none';
      }
    };
    toggleMore.addEventListener('click', toggle);
    if (toggleLess) toggleLess.addEventListener('click', toggle);
  }

  await checkChannelAuthorisation(channelId);
  await loadPosts(channelId);

  // Record views + refresh counts AFTER posts render
  await recordViewsForVisiblePosts();

  startChannelPolling();
}

/* ════════════════════════════════════════════════════════════════════════
   POST LOADING
   ════════════════════════════════════════════════════════════════════════ */
async function checkChannelAuthorisation(channelId) {
  try {
    const r = await fetch(`${SCRIPT_URL}?operation=isAuthorised&username=${encodeURIComponent(currentUserName)}&channelId=${encodeURIComponent(channelId)}`);
    const data = await r.json();
    fabPost.style.display = (data.status === "success" && data.isAuthorised) ? 'flex' : 'none';
  } catch (e) {
    fabPost.style.display = 'none';
  }
}

async function loadPosts(channelId) {
  feed.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading posts...</div>';

  try {
    const r = await fetch(
      `${SCRIPT_URL}?operation=getChannelPosts&channelId=${channelId}&username=${encodeURIComponent(currentUserName)}`
    );
    const { posts = [] } = await r.json();

    feed.innerHTML = posts.length === 0
      ? `<div class="empty">
           <i class="far fa-comment-dots" style="font-size:5rem; opacity:0.4; margin-bottom:24px;"></i><br>
           No posts yet<br>
           <small>Click the + button to be the first!</small>
         </div>`
      : '';

    posts.forEach(post => {
      const div = document.createElement("div");
      div.className = "post";
      div.dataset.postId = post.postId;

      if (post.events?.length > 0) postEventsMap.set(post.postId, post.events);

      const avatarSrc = getLh3Link(post.picLink) || 'https://via.placeholder.com/52?text=@';
      const isOwnPost = post.author === currentUserName;

      let mediaHtml = '';
      if (post.media?.link) {
        const mediaSrc = getMediaSrc(post.media.link, post.media.type);
        if (post.media.type?.startsWith('image')) {
          mediaHtml = `
            <div class="post-media" style="overflow-x:auto; display:flex; gap:8px; padding:8px 0; scroll-snap-type:x mandatory;">
              <img src="${mediaSrc}" loading="lazy" style="max-height:500px; border-radius:12px; scroll-snap-align:start;" onerror="this.src='https://picsum.photos/id/64/48/48'">
            </div>`;
        } else {
          mediaHtml = `
            <div class="post-media" style="overflow-x:auto; display:flex; gap:8px; padding:8px 0;">
              <iframe src="${mediaSrc}" width="100%" height="400" frameborder="0" allowfullscreen></iframe>
            </div>`;
        }
      }

      // Calendar HTML
      let calendarHtml = '';
      if (post.events?.length > 0) {
        const byMonth = {};
        post.events.forEach(ev => {
          const [year, month] = ev.date.split('-');
          const key = `${year}-${month}`;
          if (!byMonth[key]) byMonth[key] = [];
          byMonth[key].push(ev);
        });

        calendarHtml = `<div class="calendar-container" data-post-id="${post.postId}">`;
        Object.keys(byMonth).sort().forEach(key => {
          const [year, month] = key.split('-');
          const monthName = new Date(year, month - 1).toLocaleString('default', { month: 'long', year: 'numeric' });
          calendarHtml += `
            <div class="month-calendar">
              <h4>${monthName}</h4>
              <div class="calendar-grid">
                ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="day-header">${d}</div>`).join('')}
                ${generateMonthGrid(year, month, byMonth[key])}
              </div>
            </div>`;
        });
        calendarHtml += '</div>';
      }

      /* ── VIEW COUNT — starts with shimmer, filled after fetch ──────── */
      div.innerHTML = `
        <div class="post-header">
          <img class="post-avatar" src="${avatarSrc}" onerror="this.src='https://via.placeholder.com/52?text=@'">
          <div>
            <div class="post-author">${post.author}</div>
            <div class="post-time">${new Date(post.created).toLocaleString([], {
              hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
            })}</div>
          </div>
          ${isOwnPost ? `
            <button class="delete-post-btn"
                    title="Delete this post"
                    onclick="deleteMyChannelPost('${post.postId}', event)"
                    style="position: absolute; top: 12px; right: 12px; background: none; border: none; color: #f87171; font-size: 1.3rem; cursor: pointer; opacity: 0.75; transition: all 0.2s; z-index: 5;">
              <i class="far fa-trash-alt"></i>
            </button>` : ''}
        </div>

        <div class="post-content">${post.content
          .replace(/https?:\/\/[^ \n<>"']*(?:drive\.google\.com|view\?usp=|usp=sharing|usp=drive_link|drive_link)[^ \n<>"']*/gi, '')
          .replace(/\?usp=[^ \n<>"']*/gi, '')
          .replace(/drive_link/gi, '')
          .replace(/\s{2,}/g, ' ')
          .trim()
          .replace(/\n/g, '<br>')}
        </div>

        ${mediaHtml}
        ${calendarHtml}

        <div class="post-footer">
          <span class="post-like ${post.likedByCurrentUser ? 'liked' : ''}">
            <i class="${post.likedByCurrentUser ? 'fas' : 'far'} fa-heart"></i>
            ${post.likes || 0}
          </span>
          <span class="comment-count" data-postid="${post.postId}">
            <i class="far fa-comment icon"></i>
            <span class="count">...</span>
          </span>

          <!-- View count — per post, per viewer -->
          <span class="post-views" data-postid="${post.postId}" title="Unique viewers of this post">
            <i class="fas fa-eye"></i>
            <span class="view-count loading"></span>
          </span>
        </div>

        <div class="comment-section bubble-comments" data-postid="${post.postId}">
          <div class="comments-list" id="comments-${post.postId}"></div>
          <div class="input-area" style="margin-top:16px; padding:12px; background:rgba(15,23,42,0.92); border-top:1px solid rgba(96,165,250,0.25);">
            <div class="input-wrapper" style="display:flex; gap:10px; align-items:center;">
              <input type="text"
                     class="comment-input"
                     id="comment-input-${post.postId}"
                     placeholder="Write a comment..."
                     style="flex:1; padding:12px 16px; border-radius:24px; background:rgba(255,255,255,0.08); border:none; color:white; font-size:15px;">
              <button class="send-comment-btn"
                      onclick="submitChannelComment('${post.postId}')"
                      style="width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#3b82f6,#60a5fa); color:white; border:none; font-size:1.1rem; cursor:pointer;">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      `;

      feed.appendChild(div);

      // Wire up interactions
      const countBtn = div.querySelector('.comment-count');
      if (countBtn) {
        countBtn.onclick = () => toggleComments(post.postId);
        const countSpan = countBtn.querySelector('.count');
        if (countSpan) loadCommentCount(post.postId, countSpan);
      }

      const likeBtn = div.querySelector('.post-like');
      likeBtn.onclick = () => toggleLike(post.postId, likeBtn);

      loadComments(post.postId, div.querySelector(".comments-list"));

      /* ── Wire up per-post view click → viewers list modal ─────────── */
      const viewsEl = div.querySelector('.post-views');
      if (viewsEl) {
        viewsEl.onclick = () => openViewersModal(post.postId);
      }

      // Fetch real count for this specific post (shimmer → real number)
      fetchPostViewCount(post.postId);
    });

    if (targetPostId) setTimeout(() => scrollToPost(targetPostId), 400);

    const wrapper = document.querySelector('.feed-wrapper');
    if (wrapper) wrapper.scrollTop = 0;

  } catch (err) {
    feed.innerHTML = '<div class="empty">Failed to load posts — check connection</div>';
  }
}

/* ════════════════════════════════════════════════════════════════════════
   VIEWERS MODAL — shows who viewed THIS specific post
   ════════════════════════════════════════════════════════════════════════ */
function openViewersModal(postId) {
  const modal = document.getElementById('viewersModal');
  const list  = document.getElementById('viewersList');
  if (!modal || !list) return;

  list.innerHTML = '<div class="no-viewers"><i class="fas fa-spinner fa-spin"></i> Loading viewers...</div>';
  modal.classList.add('active');

  fetch(`${SCRIPT_URL}?operation=getChannelPostViewers&postId=${encodeURIComponent(postId)}`)
    .then(r => r.json())
    .then(data => {
      if (data.status !== "success") {
        list.innerHTML = '<div class="no-viewers">Could not load viewers</div>';
        return;
      }

      const viewers = data.viewers || [];
      if (viewers.length === 0) {
        list.innerHTML = '<div class="no-viewers">No views yet</div>';
        return;
      }

      list.innerHTML = '';
      viewers.forEach(v => {
        const item = document.createElement('div');
        item.className = 'viewer-item';
        const avatarSrc = v.picLink ? getLh3Link(v.picLink) : 'https://via.placeholder.com/44?text=@';
        item.innerHTML = `
          <img class="viewer-avatar" src="${avatarSrc}" onerror="this.src='https://picsum.photos/id/64/48/48'">
          <div class="viewer-info">
            <div class="viewer-name">${v.username}</div>
            <div class="viewer-time">Viewed ${new Date(v.viewedAt).toLocaleString([], {
              hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
            })}</div>
          </div>
        `;
        list.appendChild(item);
      });
    })
    .catch(() => {
      list.innerHTML = '<div class="no-viewers">Error loading viewers</div>';
    });
}

function closeViewersModal() {
  document.getElementById('viewersModal')?.classList.remove('active');
}

/* ════════════════════════════════════════════════════════════════════════
   POST PANEL
   ════════════════════════════════════════════════════════════════════════ */
function openPostPanel() {
  postPanel.classList.add('active');
  postContent.focus();
}

function closePostPanel() {
  postPanel.classList.remove('active');
  postContent.value = '';
  mediaInput.value = '';
  mediaPreview.innerHTML = '';
  mediaPreview.style.display = 'none';
}

mediaInput.onchange = function (e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (ev) {
    const preview = document.createElement(file.type.startsWith('image') ? 'img' : 'video');
    preview.src = ev.target.result;
    preview.className = 'media-preview';
    if (file.type.startsWith('video')) preview.controls = true;
    mediaPreview.innerHTML = '';
    mediaPreview.appendChild(preview);
    mediaPreview.style.display = 'block';
    document.getElementById('scheduleToggle').checked = false;
    document.getElementById('scheduledTime').style.display = 'none';
    document.getElementById('scheduledTime').value = '';
  };
  reader.readAsDataURL(file);
};

/* ════════════════════════════════════════════════════════════════════════
   EVENTS / CALENDAR MODAL
   ════════════════════════════════════════════════════════════════════════ */
let eventModal = null;

function openEventModal() {
  if (!eventModal) {
    eventModal = document.createElement('div');
    eventModal.id = 'multiEventModal';
    eventModal.style.cssText = `position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 5000;`;
    eventModal.innerHTML = `
      <div style="background: rgba(30,41,59,0.98); border-radius: 16px; width: 90%; max-width: 520px; padding: 24px; border: 1px solid rgba(96,165,250,0.4); box-shadow: 0 20px 60px rgba(0,0,0,0.7); color: white; position: relative; max-height: 92vh; overflow-y: auto;">
        <button onclick="closeEventModal()" style="position:absolute; top:12px; right:16px; background:none; border:none; color:#94a3b8; font-size:2.4rem; cursor:pointer;">×</button>
        <h3 style="margin:0 0 20px; color:#60a5fa; text-align:center;">Add Events to Post</h3>
        <div id="eventCount" style="text-align:center; color:#94a3b8; margin-bottom:16px; font-size:0.95rem;">Events added: <span id="countNum">0</span></div>
        <div id="eventForm" style="display:flex; flex-direction:column; gap:16px; margin-bottom:24px;">
          <input type="date" id="evDate" required style="padding:12px; border-radius:10px; border:1px solid #60a5fa; background:rgba(255,255,255,0.08); color:white; font-size:1rem;">
          <textarea id="evTitle" placeholder="Event title (use / for description)&#10;Example: Event Title/ Event Description" required style="min-height:100px; padding:12px; border-radius:10px; border:1px solid #60a5fa; background:rgba(255,255,255,0.08); color:white; font-size:1rem; resize:vertical; line-height:1.5;"></textarea>
          <label style="color:#60a5fa; cursor:pointer; font-size:0.95rem; display:flex; align-items:center; gap:8px;">
            <i class="fas fa-image"></i> Add event image (optional)
            <input type="file" id="evImage" accept="image/*" style="display:none;">
          </label>
          <div id="evPreview" style="max-width:100%; max-height:220px; display:none; margin-top:8px; border-radius:10px; overflow:hidden; border:1px solid rgba(96,165,250,0.4); background:#000;"></div>
          <button id="addEvBtn" style="padding:12px; background:linear-gradient(135deg,#3b82f6,#60a5fa); color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer;">Add This Event</button>
        </div>
        <div style="display:flex; gap:12px; justify-content:space-between; margin-top:20px;">
          <button onclick="closeEventModal()" style="flex:1; padding:12px; background:transparent; border:1px solid #64748b; color:#94a3b8; border-radius:12px; font-weight:600; cursor:pointer;">Cancel</button>
          <button id="postAllBtn" style="flex:1; padding:12px; background:linear-gradient(135deg,#10b981,#34d399); color:white; border:none; border-radius:12px; font-weight:700; font-size:1.1rem; cursor:pointer;">Post All Events</button>
        </div>
      </div>
    `;
    document.body.appendChild(eventModal);

    const fileInput = eventModal.querySelector('#evImage');
    const preview   = eventModal.querySelector('#evPreview');
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        preview.innerHTML = `<img src="${ev.target.result}" style="width:100%; height:auto; display:block;">`;
        preview.style.display = 'block';
        preview.dataset.base64 = ev.target.result.split(',')[1];
        preview.dataset.name = file.name;
        preview.dataset.type = file.type;
      };
      reader.readAsDataURL(file);
    });

    eventModal.querySelector('#addEvBtn').onclick = () => {
      const date  = eventModal.querySelector('#evDate').value.trim();
      const title = eventModal.querySelector('#evTitle').value.trim();
      if (!date || !title) { showToast("Date and title required", "error"); return; }

      const container = document.getElementById('eventsContainer');
      const row = document.createElement('div');
      row.style.display = 'none';
      row.innerHTML = `<input type="date" value="${date}"><textarea>${title}</textarea>`;

      if (preview.dataset.base64) {
        row.dataset.imageBase64 = preview.dataset.base64;
        row.dataset.imageName   = preview.dataset.name;
        row.dataset.imageType   = preview.dataset.type;
      }

      container.appendChild(row);
      eventModal.querySelector('#evDate').value = '';
      eventModal.querySelector('#evTitle').value = '';
      preview.style.display = 'none';
      preview.innerHTML = '';
      fileInput.value = '';

      const countEl = eventModal.querySelector('#countNum');
      countEl.textContent = parseInt(countEl.textContent || '0') + 1;
      showToast(`Event added (${countEl.textContent} total)`, "success");
    };

    eventModal.querySelector('#postAllBtn').onclick = () => {
      closeEventModal();
      submitPost();
    };
  }

  eventModal.style.display = 'flex';
  eventModal.querySelector('#evDate').value = '';
  eventModal.querySelector('#evTitle').value = '';
  eventModal.querySelector('#evPreview').style.display = 'none';
  eventModal.querySelector('#evPreview').innerHTML = '';
  eventModal.querySelector('#evImage').value = '';
  const countEl = eventModal.querySelector('#countNum');
  if (countEl) countEl.textContent = '0';
}

function closeEventModal() {
  if (eventModal) eventModal.style.display = 'none';
}

function generateMonthGrid(year, month, events) {
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dayStr   = d.toString().padStart(2, '0');
    const fullDate = `${year}-${month}-${dayStr}`;
    const hasEvent = events.some(e => e.date === fullDate);
    html += `<div class="${hasEvent ? 'highlighted' : ''}" data-date="${fullDate}">${d}</div>`;
  }
  return html;
}

function showEventsForDate(dateStr, dayEvents) {
  const modal   = document.getElementById('eventModal');
  const titleEl = document.getElementById('eventModalDate');
  const listEl  = document.getElementById('eventList');
  if (!modal || !titleEl || !listEl) return;

  modal.classList.remove('active');
  listEl.innerHTML = '';

  const [y, m, d] = dateStr.split('-');
  const dateObj = new Date(y, m - 1, d);
  titleEl.textContent = isNaN(dateObj.getTime())
    ? "Invalid Date"
    : dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  if (!dayEvents?.length) {
    listEl.innerHTML = '<div style="text-align:center; color:#94a3b8; padding:20px;">No events on this day</div>';
  } else {
    dayEvents.forEach(ev => {
      const raw = (ev.title || 'Untitled Event').trim();
      const [titlePart, descPart = ''] = raw.includes('/') ? raw.split('/', 2).map(s => s.trim()) : [raw, ''];
      const item = document.createElement('div');
      item.className = 'event-item';
      let html = `<div class="event-item-title">${titlePart}</div>`;
      if (descPart) html += `<div class="event-item-desc">${descPart.replace(/\n/g, '<br>')}</div>`;
      if (ev.imageUrl?.includes('uc?id=')) {
        const id = ev.imageUrl.match(/uc\?id=([a-zA-Z0-9_-]+)/i)?.[1];
        if (id) html += `<div style="margin-top:10px; border-radius:10px; overflow:hidden;"><img src="https://lh3.googleusercontent.com/d/${id}" style="width:100%; height:auto; display:block;" loading="lazy" onerror="this.src='https://picsum.photos/id/64/48/48'"></div>`;
      }
      item.innerHTML = html;
      listEl.appendChild(item);
    });
  }
  modal.classList.add('active');
}

/* ════════════════════════════════════════════════════════════════════════
   SUBMIT POST
   ════════════════════════════════════════════════════════════════════════ */
async function submitPost() {
  let content = postContent.value.trim();
  const file = mediaInput.files[0];
  let fileData = null;

  const driveRegex = /https?:\/\/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/i;
  const match = content.match(driveRegex);
  const parsedLink = match ? match[1] : null;

  if (parsedLink && !file) {
    content = content.replace(driveRegex, '').trim();
    fileData = { link: parsedLink };
  } else if (file) {
    fileData = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve({ base64: reader.result.split(',')[1], name: file.name, type: file.type });
      reader.readAsDataURL(file);
    });
  }

  let events = [];
  const eventsContainer = document.getElementById('eventsContainer');
  const wasHidden = eventsContainer.style.display === 'none';
  if (wasHidden) eventsContainer.style.display = 'block';

  eventsContainer.querySelectorAll('div').forEach(row => {
    const dateInput  = row.querySelector('input[type="date"]');
    const titleInput = row.querySelector('textarea');
    const dateVal    = dateInput?.value?.trim();
    const titleVal   = titleInput?.value?.trim();
    if (dateVal && titleVal) {
      const eventObj = { date: dateVal, title: titleVal };
      if (row.dataset.imageBase64) {
        eventObj.image = { base64: row.dataset.imageBase64, name: row.dataset.imageName, type: row.dataset.imageType };
      }
      events.push(eventObj);
    }
  });

  if (wasHidden) eventsContainer.style.display = 'none';

  eventsContainer.querySelectorAll('div').forEach(row => {
    const d = row.querySelector('input[type="date"]')?.value?.trim();
    const t = row.querySelector('textarea')?.value?.trim();
    if (!d || !t) row.remove();
  });

  if (events.length === 0 && !content.trim() && !fileData) {
    showToast("Please add text, media, or at least one event", "error");
    return;
  }

  if (!currentChannelId) { showToast("Please select a channel first", "error"); return; }

  try {
    const scheduleToggle    = document.getElementById('scheduleToggle');
    const scheduledTimeVal  = document.getElementById('scheduledTime').value;
    const payload = {
      operation: "createChannelPost",
      channelId: currentChannelId,
      author: currentUserName,
      content: content || "",
      file: fileData || (events.length > 0 ? { events } : null),
      scheduledTime: (scheduleToggle.checked && scheduledTimeVal) ? new Date(scheduledTimeVal).toISOString() : null
    };

    const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
    const data = await res.json();

    if (data.status === "success") {
      showToast("Posted!", "success");
      closePostPanel();
      eventsContainer.innerHTML = '';
      loadPosts(currentChannelId);
    } else {
      showToast("Failed: " + (data.message || "Unknown"), "error");
    }
  } catch (err) {
    showToast("Network error", "error");
  }
}

function getMediaSrc(url, type) {
  const id = url.match(/[-\w]{25,}/)?.[0];
  if (!id) return url;
  if (type.startsWith('image')) return `https://lh3.googleusercontent.com/d/${id}`;
  if (type.startsWith('video')) return `https://drive.google.com/file/d/${id}/preview`;
  return url;
}

    });

    if (data.status === "success") {
      const icon = likeElement.querySelector('i');
      const lastText = likeElement.childNodes[likeElement.childNodes.length - 1];
      let count = parseInt((lastText?.textContent || '').trim()) || 0;

      if (likeElement.classList.contains('liked')) {
        count = Math.max(0, count - 1);
        likeElement.classList.remove('liked');
        icon.className = 'far fa-heart';
      } else {
        count += 1;
        likeElement.classList.add('liked');
        icon.className = 'fas fa-heart';
      }

      lastText.textContent = ` ${count}`;
    } else {
      showToast(data.message || "Could not update like", "error");

    showToast("Network error", "error");
  }
}

async function loadComments(postId, container) {
  try {
    const r = await fetch(`${SCRIPT_URL}?operation=getChannelComments&postId=${postId}&username=${encodeURIComponent(currentUserName)}`);
    const { comments = [] } = await r.json();

    const lastDelete = container.dataset.lastDeleteTime;
    if (lastDelete && (Date.now() - parseInt(lastDelete) < 40000)) return;

    container.innerHTML = comments.length === 0
      ? '<div style="text-align:center; padding:20px; color:#94a3b8; font-size:0.9rem;">No comments yet</div>'
      : '';

    comments.reverse().forEach(c => {
      const isOwn = c.author === currentUserName;
      const avatarSrc = getLh3Link(c.picLink) || 'https://via.placeholder.com/38?text=@';

      let mediaHtml = '';
      if (c.media?.link) {
        const src = getLh3Link(c.media.link);
        if (c.media.type?.startsWith('image')) {
          mediaHtml = `<div class="media-content"><img src="${src}" loading="lazy"></div>`;
        } else {
          mediaHtml = `<div class="media-content"><video controls src="${src}" loading="lazy"></video></div>`;
        }
      }

      const msg = document.createElement('div');
      msg.className = `message ${isOwn ? 'own' : ''}`;
      msg.dataset.commentId = c.id;
      msg.dataset.postId    = postId;

      msg.innerHTML = `
        <img class="avatar" src="${avatarSrc}" onerror="this.src='https://picsum.photos/id/64/48/48'">
        <div class="message-content">
          <div class="name" style="display: flex; justify-content: space-between; align-items:center;">
            ${c.author}
            ${isOwn ? `<button class="delete-comment-btn" title="Delete comment" onclick="deleteMyChannelComment('${c.id}', '${postId}', event)"><i class="far fa-trash-alt"></i></button>` : ''}
          </div>
          ${c.replyTo ? `
            <div class="quoted-msg">
              <b>@${c.replyTo.author}</b>: ${c.replyTo.content.substring(0, 60)}${c.replyTo.content.length > 60 ? '...' : ''}
            </div>` : ''}
          ${mediaHtml}
          <div class="text">${c.content.replace(/\n/g, '<br>')}</div>
          <span class="time">${new Date(c.created).toLocaleString([], { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' })}</span>

          <div class="comment-reactions" data-comment-id="${c.id}">
            <button class="comment-reaction-toggle" title="React"><i class="fas fa-ellipsis-h"></i></button>
            <div class="comment-reaction-menu">
              <button data-emoji="fire" class="${c.reactions?.myReaction === 'fire' ? 'active' : ''}">🔥</button>
              <button data-emoji="love" class="${c.reactions?.myReaction === 'love' ? 'active' : ''}">❤️</button>
              <button data-emoji="thanks" class="${c.reactions?.myReaction === 'thanks' ? 'active' : ''}">🙏</button>
            </div>
            <div class="comment-reaction-counts">
              <span data-type="fire" class="${(c.reactions?.fire || 0) > 0 ? 'has-count' : ''}"><span class="reaction-count">${c.reactions?.fire || 0}</span> 🔥</span>
              <span data-type="love" class="${(c.reactions?.love || 0) > 0 ? 'has-count' : ''}"><span class="reaction-count">${c.reactions?.love || 0}</span> ❤️</span>
              <span data-type="thanks" class="${(c.reactions?.thanks || 0) > 0 ? 'has-count' : ''}"><span class="reaction-count">${c.reactions?.thanks || 0}</span> 🙏</span>
            </div>
          </div>
        </div>
      `;

      container.appendChild(msg);

      const reactionToggle = msg.querySelector('.comment-reaction-toggle');
      const reactionMenu   = msg.querySelector('.comment-reaction-menu');
      if (reactionToggle && reactionMenu) {
        reactionToggle.onclick = e => {
          e.stopPropagation();
          document.querySelectorAll('.comment-reaction-menu').forEach(m => { if (m !== reactionMenu) m.style.display = 'none'; });
          reactionMenu.style.display = reactionMenu.style.display === 'block' ? 'none' : 'block';
        };
        reactionMenu.querySelectorAll('button').forEach(btn => {
          btn.onclick = () => {
            toggleCommentReaction(c.id, postId, btn.dataset.emoji);
            reactionMenu.style.display = 'none';
          };
        });
      }
    });
  } catch (err) {
    container.innerHTML = '<div style="color:#f87171; padding:16px;">Could not load comments</div>';
  }

/* ════════════════════════════════════════════════════════════════════════
   COMMENT REACTIONS
   ════════════════════════════════════════════════════════════════════════ */
async function toggleCommentReaction(commentId, postId, emojiType) {
  const container = document.querySelector(`.comment-reactions[data-comment-id="${commentId}"]`);
  if (!container) return;

  const prevMyReaction = container.querySelector('.comment-reaction-menu button.active')?.dataset.emoji || null;
  const prevCounts = {};
  container.querySelectorAll('.comment-reaction-counts span').forEach(span => {
    const type = span.dataset.type;
    const countEl = span.querySelector('.reaction-count');
    prevCounts[type] = countEl ? parseInt(countEl.textContent || '0', 10) : 0;
  });

  const isRemoving = prevMyReaction === emojiType;
  const newMyReaction = isRemoving ? null : emojiType;

  container.querySelectorAll('.comment-reaction-menu button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.emoji === newMyReaction);
  });

  if (isRemoving) {
    const span = container.querySelector(`[data-type="${emojiType}"]`);
    if (span) {
      const countEl = span.querySelector('.reaction-count');
      const count = Math.max(0, parseInt(countEl.textContent || '1', 10) - 1);
      countEl.textContent = count;
      span.classList.toggle('has-count', count > 0);
    }
  } else {
    if (prevMyReaction && prevMyReaction !== emojiType) {
      const oldSpan = container.querySelector(`[data-type="${prevMyReaction}"]`);
      if (oldSpan) {
        const oldCountEl = oldSpan.querySelector('.reaction-count');
        const oldCount = Math.max(0, parseInt(oldCountEl.textContent || '1', 10) - 1);
        oldCountEl.textContent = oldCount;
        oldSpan.classList.toggle('has-count', oldCount > 0);
      }
    }
    const newSpan = container.querySelector(`[data-type="${emojiType}"]`);
    if (newSpan) {
      const newCountEl = newSpan.querySelector('.reaction-count');
      const newCount = parseInt(newCountEl.textContent || '0', 10) + 1;
      newCountEl.textContent = newCount;
      newSpan.classList.add('has-count');
    }
  }

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        operation: "toggleChannelCommentReaction",
        commentId, postId,
        channelId: currentChannelId,
        username: currentUserName,
        reactionType: emojiType
      })
    });
    const data = await res.json();
    if (data.status === "success") {
      updateCommentReactionUI(commentId, data.reactions);
    } else {
      revertToPrevious(container, prevMyReaction, prevCounts);
      showToast(data.message || "Failed", "error");
    }
  } catch (err) {
    revertToPrevious(container, prevMyReaction, prevCounts);
    showToast("Network error", "error");
  }
}

function revertToPrevious(container, prevMyReaction, prevCounts) {
  container.querySelectorAll('.comment-reaction-menu button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.emoji === prevMyReaction);
  });
  Object.keys(prevCounts).forEach(type => {
    const span = container.querySelector(`[data-type="${type}"]`);
    if (span) {
      const countEl = span.querySelector('.reaction-count');
      if (countEl) countEl.textContent = prevCounts[type];
      span.classList.toggle('has-count', prevCounts[type] > 0);
    }
  });
}

function updateCommentReactionUI(commentId, reactions) {
  const container = document.querySelector(`.comment-reactions[data-comment-id="${commentId}"]`);
  if (!container) return;
  Object.keys(reactions.counts || {}).forEach(type => {
    const span = container.querySelector(`[data-type="${type}"]`);
    const countEl = span?.querySelector('.reaction-count');
    if (countEl && span) {
      const count = reactions.counts[type] || 0;
      countEl.textContent = count;
      span.classList.toggle('has-count', count > 0);
    }
  });
  container.querySelectorAll('.comment-reaction-menu button').forEach(btn => {
    btn.classList.toggle('active', reactions.myReaction === btn.dataset.emoji);
  });
}

/* ════════════════════════════════════════════════════════════════════════
   DELETE COMMENT
   ════════════════════════════════════════════════════════════════════════ */
async function deleteMyChannelComment(commentId, postId, event) {
  event.stopPropagation();
  event.preventDefault();

  const messageEl = event.target.closest('.message');
  if (!messageEl) return;

  const confirmed = await showConfirmToast("Delete this comment?", "This cannot be undone.", "Delete", "Cancel");
  if (!confirmed) return;

  const deleteBtn = messageEl.querySelector('.delete-comment-btn');
  if (deleteBtn) { deleteBtn.disabled = true; deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }
  messageEl.classList.add('deleting');

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ operation: "deleteChannelComment", commentId, postId, username: currentUserName })
    });
    const data = await res.json();

    if (data.status === "success" || data.message?.includes("not found") || data.message?.includes("not the owner")) {
      messageEl.remove();
      showToast("Comment deleted", "success");
      const countEl = document.querySelector(`.comment-count[data-postid="${postId}"] .count`);
      if (countEl) countEl.textContent = Math.max(0, parseInt(countEl.textContent.trim()) - 1);
      const commentsList = document.getElementById(`comments-${postId}`);
      if (commentsList) commentsList.dataset.lastDeleteTime = Date.now();
    } else {
      showToast(data.message || "Could not delete comment", "error");
      if (document.body.contains(messageEl)) {
        messageEl.classList.remove('deleting');
        if (deleteBtn) { deleteBtn.disabled = false; deleteBtn.innerHTML = '<i class="far fa-trash-alt"></i>'; }
      }
    }
  } catch (err) {
    if (document.body.contains(messageEl)) {
      showToast("Connection issue — try again", "error");
      messageEl.classList.remove('deleting');
      if (deleteBtn) { deleteBtn.disabled = false; deleteBtn.innerHTML = '<i class="far fa-trash-alt"></i>'; }
    }
  }
}

   DELETE POST
   ════════════════════════════════════════════════════════════════════════ */
async function deleteMyChannelPost(postId, event) {
  event.stopPropagation();
  event.preventDefault();

  const postEl = event.target.closest('.post');
  if (!postEl) return;

  const confirmed = await showConfirmToast("Delete Post?", "This will permanently remove the post and all its comments.", "Delete", "Cancel");
  if (!confirmed) return;

  const btn = postEl.querySelector('.delete-post-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }
  postEl.classList.add('deleting');

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ operation: "deleteChannelPost", postId, username: currentUserName, channelId: currentChannelId })
    });
    const data = await res.json();

    if (data.status === "success") {
      showToast("Post deleted", "success");
      postEl.remove();

      if (!document.querySelector('.post')) {
        feed.innerHTML = `<div class="empty"><i class="far fa-comment-dots" style="font-size:5rem; opacity:0.4; margin-bottom:24px;"></i><br>No posts yet<br><small>Be the first to share something!</small></div>`;
      }

      const wrapper = document.querySelector('.feed-wrapper');
      if (wrapper) {
        let deletedIds = wrapper.dataset.deletedPostIds ? JSON.parse(wrapper.dataset.deletedPostIds) : [];
        if (!deletedIds.includes(postId)) {
          deletedIds.push(postId);
          if (deletedIds.length > 50) deletedIds = deletedIds.slice(-50);
          wrapper.dataset.deletedPostIds = JSON.stringify(deletedIds);
        }
      }

      // Also remove from view tracking
      viewedPostIds.delete(postId);
      postViewCounts.delete(postId);
    } else {
      showToast(data.message || "Failed to delete post", "error");
      postEl.classList.remove('deleting');
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="far fa-trash-alt"></i>'; }
    }
  } catch (err) {
    showToast("Network error – try again", "error");
    postEl.classList.remove('deleting');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="far fa-trash-alt"></i>'; }
  }
}
