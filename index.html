<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riverside Connect</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="manifest" href="./manifest.json">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Riverside Connect">
  <link rel="apple-touch-icon" sizes="180x180" href="maskable_icon_x192.png">

  <meta property="og:title" content="Riverside Connect">
  <meta property="og:description" content="Real-time Christian community">
  <meta property="og:image" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/maskable_icon_x192.png">
  <meta property="og:url" content="https://vibe-ultrafiles04.github.io/The-Riverside-Connect/">

  <style>
    :root {
      --brand: #3b82f6;
      --brand-soft: rgba(59,130,246,0.12);
      --brand-glow: rgba(59,130,246,0.25);
      --surface-0: #0a0f1e;
      --surface-1: #0f172a;
      --surface-2: #1a2540;
      --surface-3: #243055;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(59,130,246,0.35);
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 26px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body { display:flex; flex-direction:column; min-height:-webkit-fill-available; }

    /* ── HEADER ── */
    header {
      background: rgba(10,15,30,0.8);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    @supports (padding-top: env(safe-area-inset-top)) {
      header {
        padding-top: env(safe-area-inset-top);
        height: calc(64px + env(safe-area-inset-top));
      }
    }

    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-left { display:flex; align-items:center; gap:10px; }

    .split-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--brand-soft);
      border: 1px solid var(--border-hover);
      border-radius: 100px;
      color: var(--brand);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .split-pill:hover { background: rgba(59,130,246,0.2); transform: translateY(-1px); }
    .split-pill:active { transform: translateY(0); }

    .wordmark {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .wordmark span { color: var(--brand); }

    .header-actions { display:flex; align-items:center; gap: 6px; }

    .icon-btn {
      width: 38px; height: 38px;
      display: flex; align-items:center; justify-content:center;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      transition: var(--transition);
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--text-primary); }
    .icon-btn:active { transform: scale(0.92); }

    .avatar-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--brand);
      object-fit: cover;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .avatar-btn:hover { border-color: #93c5fd; transform: scale(1.06); }

    /* ── SCROLL CONTAINER ── */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    main::-webkit-scrollbar { width: 0; }

    .page-wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(59,130,246,0.03));
      border: 1px solid rgba(59,130,246,0.18);
      border-radius: var(--radius-lg);
    }
    .hero-icon {
      width: 52px; height: 52px;
      background: var(--brand-soft);
      border-radius: var(--radius-md);
      display: flex; align-items:center; justify-content:center;
      font-size: 1.5rem;
      color: var(--brand);
      flex-shrink: 0;
    }
    .hero-text h2 { font-size:1.2rem; font-weight:700; color:var(--text-primary); line-height:1.3; }
    .hero-text p { font-size:0.875rem; color:var(--text-secondary); margin-top:3px; line-height:1.5; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* ── NAV GRID ── */
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .nav-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 16px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      min-height: 100px;
    }
    .nav-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--card-accent, rgba(59,130,246,0.06)), transparent 60%);
      opacity: 0;
      transition: var(--transition);
    }
    .nav-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .nav-card:hover::before { opacity: 1; }
    .nav-card:active { transform: translateY(0) scale(0.98); }

    .nav-card.full-width { grid-column: 1 / -1; flex-direction: row; align-items: center; min-height: 64px; }

    .nav-card-icon {
      width: 38px; height: 38px;
      background: var(--card-icon-bg, var(--brand-soft));
      border-radius: var(--radius-sm);
      display: flex; align-items:center; justify-content:center;
      font-size: 1rem;
      color: var(--card-icon-color, var(--brand));
      flex-shrink: 0;
    }
    .nav-card-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }
    .nav-card-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Notification toggle specific */
    .notif-card { cursor: pointer; border: none; width:100%; text-align:left; }
    .notif-state {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 100px;
      background: rgba(16,185,129,0.15);
      color: #34d399;
      margin-left: auto;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .notif-state.off {
      background: rgba(100,116,139,0.2);
      color: var(--text-muted);
    }

    /* Badge */
    .badge {
      position: absolute;
      top: 12px; right: 12px;
      min-width: 20px; height: 20px;
      background: #ef4444;
      color: white;
      font-size: 0.65rem;
      font-weight: 800;
      border-radius: 100px;
      display: flex; align-items:center; justify-content:center;
      padding: 0 5px;
      border: 2px solid var(--surface-1);
    }

    /* ── CIRCLES (Channels) ── */
    .circles-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin: 0 -16px;
      padding: 0 16px 4px;
    }
    .circles-scroll::-webkit-scrollbar { display: none; }

    .circles-row {
      display: inline-flex;
      gap: 20px;
      padding-right: 16px;
      min-width: 100%;
    }

    .circle-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      flex-shrink: 0;
      transition: var(--transition);
    }
    .circle-item:hover { transform: translateY(-3px); }
    .circle-item:active { transform: scale(0.95); }

    .circle-avatar-wrap {
      position: relative;
      width: 68px; height: 68px;
    }
    .circle-avatar-wrap::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.3);
      transition: var(--transition);
    }
    .circle-item:hover .circle-avatar-wrap::after { border-color: rgba(59,130,246,0.7); }

    .circle-avatar {
      width: 68px; height: 68px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--surface-2);
      display: flex; align-items:center; justify-content:center;
      font-size: 1.6rem;
      font-weight: 700;
      color: white;
    }
    .circle-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-secondary);
      max-width: 72px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 16px;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .empty-state i { font-size: 2rem; opacity:0.4; }

    /* ── PENDING / ERROR STATE ── */
    .status-card {
      padding: 24px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .status-card h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; }
    .status-card p { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6; }
    .badge-pill {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(245,158,11,0.15);
      color: #fbbf24;
      margin-bottom: 12px;
    }

    /* ── INSTALL BAR ── */
    .install-bar {
      padding: 14px 20px;
      background: rgba(10,15,30,0.6);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .install-bar { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
    }

    .install-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 12px 20px;
      background: var(--brand-soft);
      color: var(--brand);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .install-btn:hover { background: rgba(59,130,246,0.18); }
    .install-btn.hidden { display: none; }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 999;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
    }
    .modal-backdrop.open { display: flex; }

    .modal-sheet {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      animation: slideUp 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .modal-sheet h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .modal-sheet p { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.55; margin-bottom: 24px; }
    .modal-actions { display:flex; gap:10px; }

    .btn-primary {
      flex: 1; padding: 13px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-primary:hover { background: #2563eb; }

    .btn-ghost {
      flex: 1; padding: 13px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text-primary); }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-1) 25%, var(--surface-2) 50%, var(--surface-1) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: var(--radius-md);
    }
    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .skeleton-hero { height: 92px; margin-bottom: 0; }
    .skeleton-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .skeleton-card { height: 100px; }
    .skeleton-card.wide { grid-column: 1/-1; height: 64px; }
    .skeleton-circles { display: flex; gap: 20px; overflow: hidden; padding: 4px 0; }
    .skeleton-circle { width: 68px; height: 90px; flex-shrink:0; }

    /* ── TOAST ── */
    #toast-container {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      align-items: center;
    }
    .toast {
      padding: 11px 20px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      animation: toastIn 0.25s ease forwards;
      pointer-events: auto;
    }
    .toast.success { background: rgba(16,185,129,0.9); }
    .toast.error   { background: rgba(239,68,68,0.9); }
    .toast.info    { background: rgba(59,130,246,0.9); }
    @keyframes toastIn {
      from { opacity:0; transform: translateY(10px) scale(0.95); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    @media (max-width:380px) {
      .wordmark { font-size: 0.95rem; }
      .nav-grid { grid-template-columns: 1fr; }
      .nav-card.full-width { grid-column: 1; }
    }
  </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <div class="header-inner">
    <div class="header-left">
      <button class="split-pill" onclick="openSplit()" title="Open CashSplit">
        <i class="fas fa-arrows-split-up-and-left" style="font-size:0.75rem;"></i> SPLIT
      </button>
      <span class="wordmark">Riverside <span>Connect</span></span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refresh-btn" onclick="refreshDashboard()" title="Refresh">
        <i class="fas fa-rotate-right" id="refresh-icon"></i>
      </button>
      <img id="user-avatar" class="avatar-btn" src="" alt="Profile"
           onclick="window.location.href='user.html'"
           onerror="this.src='https://ui-avatars.com/api/?background=3b82f6&color=fff&name=RC'">
    </div>
  </div>
</header>

<!-- ─── MAIN ─── -->
<main id="main-scroll">
  <div class="page-wrap" id="page-wrap">
    <!-- Skeleton shown on first load -->
    <div id="skeleton-view">
      <div class="skeleton skeleton-hero"></div>
      <div class="section-label" style="margin-top:4px;">Quick access</div>
      <div class="skeleton-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card wide"></div>
      </div>
      <div class="section-label">Channels</div>
      <div class="skeleton-circles">
        <div class="skeleton skeleton-circle"></div>
        <div class="skeleton skeleton-circle"></div>
        <div class="skeleton skeleton-circle"></div>
        <div class="skeleton skeleton-circle"></div>
      </div>
    </div>

    <!-- Real content injected here -->
    <div id="dashboard-view" style="display:none; display:none; flex-direction:column; gap:28px;"></div>
  </div>
</main>

<!-- ─── INSTALL BAR ─── -->
<div class="install-bar">
  <button class="install-btn hidden" id="installAppBtn">
    <i class="fas fa-download"></i> Add to Home Screen
  </button>
</div>

<!-- ─── INSTALL MODAL ─── -->
<div class="modal-backdrop" id="installModal">
  <div class="modal-sheet">
    <h3>Install Riverside Connect</h3>
    <p>Get faster access and a better experience by adding this app to your home screen.</p>
    <div class="modal-actions">
      <button class="btn-ghost" id="installNo">Later</button>
      <button class="btn-primary" id="installYes">Install</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div id="toast-container"></div>

<script>
/* =========================================================
   CONFIG & GLOBALS
   ========================================================= */
const scriptUrl   = 'https://script.google.com/macros/s/AKfycbygp2-CU0rgs4eOq9vTALV7fFTuPRgIOa6wl2xhbSmoxqXZpXPP7mBMg1hT_PfE8uTs/exec';
const userName    = localStorage.getItem('userName');
const CACHE_TTL   = 5 * 60 * 1000; // 5 minutes

if (!userName) window.location.href = 'login.html';

let isNotificationEnabled = localStorage.getItem('notificationsEnabled') !== 'false';

/* =========================================================
   AVATAR
   ========================================================= */
(function() {
  const avatar  = document.getElementById('user-avatar');
  const picLink = localStorage.getItem('userPicLink');
  if (picLink) {
    const id = picLink.match(/[-\w]{25,}/)?.[0];
    avatar.src = id ? `https://lh3.googleusercontent.com/d/${id}` : picLink;
  } else {
    avatar.src = `https://ui-avatars.com/api/?background=3b82f6&color=fff&name=${encodeURIComponent(userName?.charAt(0)||'R')}`;
  }
})();

/* =========================================================
   TOAST
   ========================================================= */
function showToast(msg, type = 'info') {
  const tc = document.getElementById('toast-container');
  const t  = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'scale(0.9)'; t.style.transition = '0.25s'; setTimeout(() => t.remove(), 280); }, 2800);
}

/* =========================================================
   CACHE HELPERS
   ========================================================= */
function cacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch {}
}
function cacheGet(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts > CACHE_TTL) return null;
    return parsed.data;
  } catch { return null; }
}

/* =========================================================
   INSTALL LOGIC
   ========================================================= */
let deferredPrompt;
const installBtn   = document.getElementById('installAppBtn');
const installModal = document.getElementById('installModal');

if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true) {
  installBtn.classList.add('hidden');
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.remove('hidden');
});

installBtn.addEventListener('click', () => installModal.classList.add('open'));

document.getElementById('installYes').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBtn.classList.add('hidden');
    deferredPrompt = null;
  }
  installModal.classList.remove('open');
});

document.getElementById('installNo').addEventListener('click', () => installModal.classList.remove('open'));
installModal.addEventListener('click', e => { if (e.target === installModal) installModal.classList.remove('open'); });
window.addEventListener('appinstalled', () => { installBtn.classList.add('hidden'); });

/* =========================================================
   HELPERS
   ========================================================= */
function getLh3Link(url) {
  if (!url) return '';
  const id = url.match(/[-\w]{25,}/)?.[0];
  return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
}

function openSplit() {
  window.location.href = 'split.html';
}

/* =========================================================
   ANNOUNCEMENT BADGE
   ========================================================= */
async function updateAnnBadge() {
  const badge = document.getElementById('ann-badge');
  if (!badge) return;
  try {
    const res = await fetch(`${scriptUrl}?operation=getUnseenAnnCount&name=${encodeURIComponent(userName)}`);
    const data = await res.json();
    if (data.status === 'error') throw new Error();
    const n = data.unseenCount || 0;
    badge.textContent = n > 99 ? '99+' : n;
    badge.style.display = n > 0 ? 'flex' : 'none';
    localStorage.setItem('lastSeenAnnCount', data.seenUpTo || '0');

/* =========================================================
   NOTIFICATION TOGGLE
   ========================================================= */
function updateNotifUI() {
  const btn  = document.getElementById('notif-toggle');
  const pill = document.getElementById('notif-state');
  if (!btn || !pill) return;
  if (isNotificationEnabled) {
    document.getElementById('notif-icon').className = 'fas fa-bell';
    pill.textContent = 'ON';
    pill.className = 'notif-state';
  } else {
    document.getElementById('notif-icon').className = 'fas fa-bell-slash';
    pill.textContent = 'OFF';
    pill.className = 'notif-state off';
  }
}

async function toggleNotifications() {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) {
    showToast('Notifications not supported in this browser', 'error'); return;
  }
  isNotificationEnabled = !isNotificationEnabled;
  localStorage.setItem('notificationsEnabled', isNotificationEnabled.toString());
  updateNotifUI();

  if (isNotificationEnabled) {
    try {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js');
      const { getMessaging, getToken } = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-messaging.js');
      const firebaseConfig = {
        apiKey: "AIzaSyCuB56TTi5COJnuDmVf6PiGsOjTwvQ0PNo",
        authDomain: "riverside-connect-a8458.firebaseapp.com",
        projectId: "riverside-connect-a8458",
        storageBucket: "riverside-connect-a8458.firebasestorage.app",
        messagingSenderId: "938830806378",
        appId: "1:938830806378:web:254ed56cba3dc02290f913"
      };
      const VAPID_KEY = "BLqQIS31O_tuw_UMdReBZHTmy_HNXEcwNaPsor8O8dCt-v0XFepSoGPJmw6P6dYBfh1PDtCaMCxLO4-j7KS4yO8";
      const app  = initializeApp(firebaseConfig);
      const msg  = getMessaging(app);
      const swReg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') {
        showToast('Permission denied', 'error');
        isNotificationEnabled = false;
        localStorage.setItem('notificationsEnabled', 'false');
        updateNotifUI(); return;
      }
      const token = await getToken(msg, { vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
      if (token) {
        await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ operation: 'saveFcmToken', username: userName, fcmToken: token }) });
        showToast('Notifications enabled', 'success');
      }
    } catch (err) {
      console.error(err);
      showToast('Failed to enable notifications', 'error');
      isNotificationEnabled = false;
      localStorage.setItem('notificationsEnabled', 'false');
      updateNotifUI();
    }
  } else {
    showToast('Notifications turned off', 'info');
  }
}

/* =========================================================

   ========================================================= */
function renderCircles(channels, baseUrl) {
  if (!channels.length) return `
    <div class="empty-state">
      <i class="fas fa-layer-group"></i>
      <span>No channels yet</span>
    </div>`;

  return `<div class="circles-scroll"><div class="circles-row">` +
    channels.map(ch => {
      const initial    = ch.name.charAt(0).toUpperCase();
      const avatarSrc  = ch.picLink ? getLh3Link(ch.picLink) : '';
      const bgColors   = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899'];
      const randomBg   = bgColors[ch.name.charCodeAt(0) % bgColors.length];
      const avatarHtml = avatarSrc
        ? `<img src="${avatarSrc}" class="circle-avatar" style="width:68px;height:68px;border-radius:50%;object-fit:cover;" onerror="this.outerHTML='<div class=\\'circle-avatar\\' style=\\'background:${randomBg};\\'>${initial}</div>'">`
        : `<div class="circle-avatar" style="background:${randomBg};">${initial}</div>`;
      return `
        <a href="${baseUrl}?channelId=${encodeURIComponent(ch.id)}" class="circle-item">
          <div class="circle-avatar-wrap">${avatarHtml}</div>
          <div class="circle-label">${ch.name}</div>
        </a>`;
    }).join('') + `</div></div>`;
}

/* =========================================================
   LOAD DASHBOARD (with caching)
   ========================================================= */
async function loadDashboard(forceRefresh = false) {
  const dashView  = document.getElementById('dashboard-view');
  const skelView  = document.getElementById('skeleton-view');

  /* 1. Try cache first (skip skeleton if we have cached data) */
  const cachedStatus   = cacheGet(`status_${userName}`);
  const cachedChannels = cacheGet('channels');
  const cachedQna      = cacheGet('qnaChannels');

  if (!forceRefresh && cachedStatus && cachedChannels && cachedQna) {
    skelView.style.display = 'none';
    dashView.style.display = 'flex';
    renderFromData(cachedStatus, cachedChannels, cachedQna, dashView);
    /* Silently refresh in background */
    fetchAndRender(dashView, skelView, true);
    return;
  }

  /* 2. No cache — show skeleton, then fetch */
  skelView.style.display = 'flex';
  skelView.style.flexDirection = 'column';
  skelView.style.gap = '28px';
  dashView.style.display = 'none';
  await fetchAndRender(dashView, skelView, false);
}

async function fetchAndRender(dashView, skelView, silent) {
  try {
    const [statusRes, chRes, qnaRes] = await Promise.all([
      fetch(`${scriptUrl}?operation=getUserStatus&name=${encodeURIComponent(userName)}`),
      fetch(`${scriptUrl}?operation=getAllChannels`),
      fetch(`${scriptUrl}?operation=getAllQnAChannels`)
    ]);

    const statusData = await statusRes.json();
    const chData     = await chRes.json();
    const qnaData    = await qnaRes.json();

    if (statusData.status !== 'success') throw new Error('Status fetch failed');

    /* Cache results */
    cacheSet(`status_${userName}`, statusData);
    cacheSet('channels', chData.channels || []);
    cacheSet('qnaChannels', qnaData.channels || []);

    if (!silent) {
      skelView.style.display = 'none';
      dashView.style.display = 'flex';
    }
    renderFromData(statusData, chData.channels || [], qnaData.channels || [], dashView);

  } catch (err) {
    console.error('Dashboard load failed:', err);
    if (!silent) {
      skelView.style.display = 'none';
      dashView.style.display = 'flex';
      dashView.innerHTML = `
        <div class="status-card">
          <div class="badge-pill" style="background:rgba(239,68,68,0.15);color:#f87171;">Connection Error</div>
          <h3>Couldn't load dashboard</h3>
          <p>Check your internet connection and try refreshing.</p>
        </div>`;
    }
  }
}

function renderFromData(statusData, channels, qnaChannels, dashView) {
  const isApproved = statusData.userStatus?.toLowerCase() === 'approved';

  if (isApproved) {
    dashView.innerHTML = renderApproved(channels, qnaChannels);
    updateNotifUI();
    updateAnnBadge();
    if (typeof annBadgeInterval !== 'undefined') clearInterval(annBadgeInterval);
    window.annBadgeInterval = setInterval(updateAnnBadge, 20000);
  } else {
    const st = statusData.userStatus?.toLowerCase() === 'pending' ? 'pending' : 'inactive';
    dashView.innerHTML = renderPending(st);
  }
}

/* =========================================================
   REFRESH
   ========================================================= */
async function refreshDashboard() {
  const btn  = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  btn.style.opacity = '0.5';
  icon.className = 'fas fa-rotate-right fa-spin';

  /* Clear cache so we always re-fetch on manual refresh */
  try { localStorage.removeItem(`status_${userName}`); } catch {}
  try { localStorage.removeItem('channels'); } catch {}
  try { localStorage.removeItem('qnaChannels'); } catch {}

  try {
    await loadDashboard(true);
    showToast('Dashboard refreshed', 'success');
  } catch { showToast('Refresh failed', 'error'); }
  finally {
    btn.disabled = false;
    btn.style.opacity = '1';
    icon.className = 'fas fa-rotate-right';
  }
}
