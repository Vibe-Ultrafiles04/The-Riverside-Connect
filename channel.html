<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Riverside · Channels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Riverside Connect">
<link rel="apple-touch-icon" href="maskable_icon_x192.png">

<style>
/* ═══════════════════════════════════════════════════════════════════════
   RIVERSIDE CHANNELS — FIXED VERSION
   Dark theme only (matching original channels.html aesthetic)
   Mobile swipe fixed, owner channel edit added
═══════════════════════════════════════════════════════════════════════ */

:root {
  --ink:        #e2e8f0;
  --paper:      #0f172a;
  --cream:      #1e293b;
  --wire:       rgba(96,165,250,0.18);
  --steel:      #94a3b8;
  --lead:       #cbd5e1;
  --accent:     #ef4444;
  --accent2:    #60a5fa;
  --gold:       #facc15;
  --white:      #f8fafc;

  --font-head:  'Bebas Neue', sans-serif;
  --font-body:  'DM Sans', sans-serif;
  --font-mono:  'DM Mono', monospace;

  --bar-h:      56px;
  --ticker-h:   36px;
  --total-top:  calc(var(--bar-h) + var(--ticker-h));
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════════════
   MASTHEAD
═══════════════════════════════════════════════════════════════════════ */
#masthead {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--bar-h);
  background: rgba(15,23,42,0.96);
  border-bottom: 1px solid rgba(96,165,250,0.22);
  z-index: 900;
  display: flex;
  align-items: center;
  gap: 0;
  overflow: hidden;
  backdrop-filter: blur(14px);
}

.mh-back {
  height: 100%;
  width: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--wire);
  color: var(--accent2);
  text-decoration: none;
  font-size: 1.1rem;
  flex-shrink: 0;
  transition: background 0.15s;
}
.mh-back:hover { background: var(--cream); }

.mh-channel-info {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  overflow: hidden;
}

.mh-channel-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(96,165,250,0.4);
  flex-shrink: 0;
  background: var(--cream);
}

.mh-channel-name {
  font-family: var(--font-head);
  font-size: 1.35rem;
  letter-spacing: 0.04em;
  color: var(--accent2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1;
}

.mh-channel-meta {
  font-size: 0.72rem;
  color: var(--steel);
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mh-tools {
  display: flex;
  align-items: center;
  gap: 0;
  height: 100%;
  flex-shrink: 0;
  border-left: 1px solid var(--wire);
}

.mh-btn {
  height: 100%;
  width: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  border-right: 1px solid var(--wire);
  color: var(--ink);
  cursor: pointer;
  font-size: 1rem;
  transition: background 0.15s, color 0.15s;
  position: relative;
}
.mh-btn:last-child { border-right: none; }
.mh-btn:hover { background: var(--cream); color: var(--accent2); }
.mh-btn.active { color: var(--accent2); background: var(--cream); }

/* ═══════════════════════════════════════════════════════════════════════
   CHANNEL TICKER
═══════════════════════════════════════════════════════════════════════ */
#channel-ticker {
  position: fixed;
  top: var(--bar-h);
  left: 0; right: 0;
  height: var(--ticker-h);
  background: rgba(15,23,42,0.98);
  border-bottom: 1px solid rgba(96,165,250,0.15);
  z-index: 899;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.ticker-label {
  height: 100%;
  padding: 0 14px;
  background: var(--accent2);
  color: var(--paper);
  font-family: var(--font-head);
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  white-space: nowrap;
}

.ticker-scroll {
  flex: 1;
  overflow-x: auto;
  display: flex;
  align-items: center;
  gap: 0;
  -ms-overflow-style: none;
  scrollbar-width: none;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.ticker-scroll::-webkit-scrollbar { display: none; }

.ticker-ch {
  height: var(--ticker-h);
  padding: 0 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.55);
  font-size: 0.8rem;
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  cursor: pointer;
  border-right: 1px solid rgba(255,255,255,0.08);
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.ticker-ch:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.07); }
.ticker-ch.active {
  color: #fff;
  background: rgba(96,165,250,0.15);
  border-bottom: 2px solid var(--gold);
}
.ticker-ch-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--steel);
  flex-shrink: 0;
}
.ticker-ch.active .ticker-ch-dot { background: var(--gold); }

.ticker-add {
  height: var(--ticker-h);
  width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  flex-shrink: 0;
  font-size: 0.95rem;
  transition: color 0.2s;
  border-left: 1px solid rgba(255,255,255,0.08);
}
.ticker-add:hover { color: var(--gold); }

/* ═══════════════════════════════════════════════════════════════════════
   MAIN STAGE — horizontal post rail
═══════════════════════════════════════════════════════════════════════ */
#stage {
  position: fixed;
  top: var(--total-top);
  left: 0; right: 0;
  bottom: 0;
  overflow: hidden;
}

#post-rail {
  display: flex;
  flex-direction: row;
  height: 100%;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-x: contain;
  touch-action: pan-x;
  -ms-overflow-style: none;
  scrollbar-width: none;
  scroll-behavior: smooth;
}
#post-rail::-webkit-scrollbar { display: none; }

.post-view {
  width: 100vw;
  height: 100%;
  flex: 0 0 100vw;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--wire);
  position: relative;
}

@media (min-width: 1200px) {
  .post-view { width: 50vw; flex: 0 0 50vw; }
}
@media (min-width: 1800px) {
  .post-view { width: 33.333vw; flex: 0 0 33.333vw; }
}

.post-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: rgba(96,165,250,0.4) transparent;
}
.post-body::-webkit-scrollbar { width: 3px; }
.post-body::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.4); }

.post-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--wire);
  background: rgba(15,23,42,0.94);
  position: sticky;
  top: 0;
  z-index: 10;
}

.post-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--cream);
  border: 2px solid rgba(96,165,250,0.35);
  flex-shrink: 0;
}

.post-author-block { flex: 1; min-width: 0; }
.post-author {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--accent2);
  letter-spacing: 0.01em;
}
.post-time {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--steel);
  letter-spacing: 0.06em;
  margin-top: 1px;
}

.post-index {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--steel);
  letter-spacing: 0.1em;
  flex-shrink: 0;
}

.post-delete-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--steel);
  cursor: pointer;
  font-size: 0.85rem;
  border-radius: 4px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.post-delete-btn:hover { color: var(--accent); background: rgba(239,68,68,0.12); }

.post-text {
  padding: 22px 20px 16px;
  font-size: 1.05rem;
  line-height: 1.72;
  color: var(--ink);
  font-weight: 400;
  letter-spacing: 0.01em;
  white-space: pre-wrap;
}

/* Video wrapper — preserves 16:9 + room for Drive controls */
.post-media-wrap {
  width: 100%;
  background: #000;
  overflow: hidden;
  position: relative;
}

.post-media-wrap img {
  width: 100%;
  max-height: 58vh;
  object-fit: contain;
  display: block;
}

/* Aspect-ratio shell — clips Drive's top scrubber + bottom controls */
.post-media-wrap .video-shell {
  position: relative;
  width: 100%;
  /* Visible window = pure 16:9 video area */
  padding-bottom: 56.25%;
  height: 0;
  background: #000;
  overflow: hidden; /* clips the scaled iframe */
}

.post-media-wrap .video-shell iframe {
  position: absolute;
  /* Extend beyond the container top and bottom to hide Drive chrome.
     Drive top bar ≈ 40px, bottom bar ≈ 60px at 100vw width.
     We push the iframe up by 40px and make it 100px taller total. */
  top: -40px;
  left: 0;
  width: 100%;
  height: calc(100% + 100px);
  border: none;
  display: block;
}

@media (max-width: 768px) {
  .post-media-wrap .video-shell iframe {
    /* Drive chrome is relatively larger on narrow screens */
    top: -44px;
    height: calc(100% + 110px);
  }
}
.post-calendar { border-top: 1px solid var(--wire); }

.cal-month-strip {
  display: flex;
  overflow-x: auto;
  gap: 0;
  -ms-overflow-style: none;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.cal-month-strip::-webkit-scrollbar { display: none; }

.cal-month {
  flex-shrink: 0;
  padding: 16px 20px;
  border-right: 1px solid var(--wire);
  min-width: 260px;
}

.cal-month-title {
  font-family: var(--font-head);
  font-size: 1rem;
  letter-spacing: 0.06em;
  color: var(--accent2);
  margin-bottom: 12px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}

.cal-day-label {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--steel);
  padding: 4px 2px;
}

.cal-day {
  text-align: center;
  font-size: 0.78rem;
  padding: 5px 2px;
  border-radius: 3px;
  color: var(--lead);
  min-height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cal-day.has-event {
  background: rgba(96,165,250,0.25);
  border: 1px solid var(--accent2);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.15s;
}
.cal-day.has-event:hover {
  background: rgba(96,165,250,0.45);
  transform: scale(1.12);
}

.post-foot {
  display: flex;
  align-items: center;
  border-top: 1px solid var(--wire);
  background: rgba(15,23,42,0.94);
  height: 46px;
  flex-shrink: 0;
}

.post-action {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: var(--steel);
  cursor: pointer;
  border-right: 1px solid var(--wire);
  transition: all 0.15s;
  background: none;
  border-bottom: none;
  border-top: none;
  border-left: none;
}
.post-action:last-child { border-right: none; }
.post-action:hover { color: var(--ink); background: var(--cream); }
.post-action.liked { color: var(--accent); }
.post-action.liked i { animation: heartbeat 0.4s ease; }
@keyframes heartbeat {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.5); }
  100% { transform: scale(1); }
}

.comment-panel {
  display: none;
  flex-direction: column;
  height: 0;
  border-top: 1px solid rgba(96,165,250,0.3);
  background: rgba(15,23,42,0.92);
  transition: height 0.3s ease;
  overflow: hidden;
  flex-shrink: 0;
}
.comment-panel.open {
  display: flex;
  height: 44%;
}

.comment-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: rgba(96,165,250,0.4) transparent;
}
.comment-list::-webkit-scrollbar { width: 3px; }
.comment-list::-webkit-scrollbar-thumb { background: rgba(96,165,250,0.4); }

.c-msg {
  display: flex;
  gap: 10px;
  animation: fadeUp 0.25s ease-out;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(6px); }
  to   { opacity:1; transform: translateY(0); }
}

.c-msg.own { flex-direction: row-reverse; }

.c-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--cream);
  border: 2px solid rgba(96,165,250,0.3);
  flex-shrink: 0;
  margin-top: 2px;
}

.c-bubble {
  max-width: 78%;
  background: rgba(30,41,59,0.88);
  border: 1px solid var(--wire);
  padding: 8px 12px;
  border-radius: 4px 14px 14px 14px;
  position: relative;
}
.c-msg.own .c-bubble {
  background: linear-gradient(135deg, #3b82f6, #60a5fa);
  color: white;
  border-color: transparent;
  border-radius: 14px 4px 14px 14px;
}

.c-name {
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  color: var(--accent2);
  font-family: var(--font-mono);
  margin-bottom: 3px;
}
.c-msg.own .c-name { color: rgba(255,255,255,0.85); }

.c-text {
  font-size: 0.88rem;
  line-height: 1.5;
  word-break: break-word;
}

.c-time {
  font-size: 0.62rem;
  color: var(--steel);
  margin-top: 4px;
  font-family: var(--font-mono);
  display: block;
}
.c-msg.own .c-time { color: rgba(255,255,255,0.55); }

.c-del {
  position: absolute;
  top: 6px; right: 6px;
  background: none;
  border: none;
  color: #f87171;
  font-size: 0.65rem;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
}
.c-bubble:hover .c-del { opacity: 1; }

.comment-input-bar {
  display: flex;
  align-items: center;
  border-top: 1px solid var(--wire);
  background: rgba(15,23,42,0.98);
  flex-shrink: 0;
}

.comment-input-bar input {
  flex: 1;
  height: 44px;
  padding: 0 16px;
  border: none;
  background: transparent;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.88rem;
  outline: none;
}
.comment-input-bar input::placeholder { color: var(--steel); }

.comment-send {
  width: 52px;
  height: 44px;
  background: linear-gradient(135deg, #3b82f6, #60a5fa);
  border: none;
  color: #fff;
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.comment-send:hover { opacity: 0.85; }

.post-view-badge { cursor: pointer; }

/* Desktop nav arrows */
#nav-prev, #nav-next {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 80px;
  background: rgba(15,23,42,0.85);
  border: 1px solid var(--wire);
  color: var(--ink);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 800;
  transition: all 0.2s;
  opacity: 0.45;
}
#nav-prev { left: 0; }
#nav-next { right: 0; }
#nav-prev:hover, #nav-next:hover { opacity: 1; background: rgba(59,130,246,0.5); }

@media (max-width: 768px) {
  #nav-prev, #nav-next { display: none; }
}

#post-progress {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(96,165,250,0.15);
  z-index: 900;
}
#post-progress-fill {
  height: 100%;
  background: var(--accent2);
  width: 0%;
  transition: width 0.3s ease;
}

#post-nav-info {
  position: fixed;
  bottom: 10px;
  right: 14px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--steel);
  z-index: 800;
  pointer-events: none;
  background: rgba(15,23,42,0.8);
  padding: 3px 8px;
  border: 1px solid var(--wire);
}

/* ═══════════════════════════════════════════════════════════════════════
   WRITE PANEL
═══════════════════════════════════════════════════════════════════════ */
#write-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(15,23,42,0.98);
  border-top: 1px solid rgba(96,165,250,0.3);
  z-index: 950;
  transform: translateY(105%);
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-height: 80vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  backdrop-filter: blur(14px);
}
#write-panel.open { transform: translateY(0); }

.write-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--wire);
  position: sticky;
  top: 0;
  background: rgba(15,23,42,0.98);
  z-index: 2;
}

.write-head-title {
  font-family: var(--font-head);
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  color: var(--accent2);
}

.write-close {
  width: 36px; height: 36px;
  background: var(--cream);
  border: 1px solid var(--wire);
  cursor: pointer;
  font-size: 1rem;
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  border-radius: 50%;
}
.write-close:hover { background: var(--accent2); color: var(--paper); }

.write-body { padding: 16px 20px; }

.write-textarea {
  width: 100%;
  min-height: 120px;
  padding: 14px 0;
  border: none;
  border-bottom: 1px solid rgba(96,165,250,0.4);
  background: transparent;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 1rem;
  line-height: 1.65;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
}
.write-textarea:focus { border-bottom-color: var(--accent2); }
.write-textarea::placeholder { color: var(--steel); font-style: italic; }

.write-media-preview {
  margin: 12px 0;
  display: none;
  position: relative;
}
.write-media-preview img,
.write-media-preview video {
  max-width: 100%;
  max-height: 220px;
  object-fit: contain;
  display: block;
  border-radius: 8px;
}
.write-media-remove {
  position: absolute;
  top: 8px; right: 8px;
  width: 28px; height: 28px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
}

.write-toolbar {
  display: flex;
  align-items: center;
  gap: 0;
  border-top: 1px solid var(--wire);
  border-bottom: 1px solid var(--wire);
  margin: 12px 0 16px;
}

.write-tool-btn {
  height: 40px;
  padding: 0 16px;
  background: none;
  border: none;
  border-right: 1px solid var(--wire);
  color: var(--steel);
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}
.write-tool-btn:hover { color: var(--accent2); background: var(--cream); }
.write-tool-btn:last-child { border-right: none; }
.write-tool-btn.active { color: var(--accent2); }

.write-schedule {
  display: none;
  padding: 12px 0;
  border-bottom: 1px solid var(--wire);
  margin-bottom: 12px;
}
.write-schedule label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: var(--steel);
  display: block;
  margin-bottom: 8px;
}
.write-schedule input[type="datetime-local"] {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--wire);
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  outline: none;
  border-radius: 8px;
}

.write-submit {
  width: 100%;
  height: 46px;
  background: linear-gradient(135deg, #3b82f6, #60a5fa);
  color: #fff;
  border: none;
  font-family: var(--font-head);
  font-size: 1rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: opacity 0.2s;
  border-radius: 8px;
}
.write-submit:hover { opacity: 0.88; }
.write-submit:disabled { opacity: 0.4; cursor: not-allowed; }

#media-file-input { display: none; }

/* ═══════════════════════════════════════════════════════════════════════
   CHANNEL DRAWER
═══════════════════════════════════════════════════════════════════════ */
#channel-drawer {
  position: fixed;
  top: var(--total-top);
  left: 0; right: 0;
  background: rgba(15,23,42,0.98);
  border-bottom: 1px solid rgba(96,165,250,0.3);
  z-index: 850;
  transform: translateY(-105%);
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-height: 65vh;
  overflow-y: auto;
  backdrop-filter: blur(14px);
}
#channel-drawer.open { transform: translateY(0); }

.drawer-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
  position: sticky;
  top: 0;
  background: rgba(15,23,42,0.98);
  z-index: 2;
}
.drawer-head-title {
  font-family: var(--font-head);
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  color: var(--accent2);
}
.drawer-close {
  background: none;
  border: none;
  color: var(--steel);
  cursor: pointer;
  font-size: 1.2rem;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s;
}
.drawer-close:hover { color: var(--accent2); }

.channel-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}
@media (min-width: 600px) {
  .channel-grid { grid-template-columns: 1fr 1fr; }
}
@media (min-width: 1000px) {
  .channel-grid { grid-template-columns: 1fr 1fr 1fr; }
}

.ch-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
  color: var(--ink);
  position: relative;
}
.ch-item:hover { background: var(--cream); }
.ch-item.active { background: rgba(96,165,250,0.1); border-left: 3px solid var(--accent2); }

.ch-item-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--cream);
  flex-shrink: 0;
  border: 2px solid rgba(96,165,250,0.4);
}

.ch-item-text { flex: 1; min-width: 0; }
.ch-item-name {
  font-weight: 700;
  font-size: 0.92rem;
  letter-spacing: 0.01em;
  color: var(--ink);
}
.ch-item-desc {
  font-size: 0.76rem;
  color: var(--steel);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ch-item-creator {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--steel);
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* Edit button on channel item (for creator) */
.ch-item-edit {
  width: 32px; height: 32px;
  background: none;
  border: 1px solid var(--wire);
  color: var(--steel);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem;
  flex-shrink: 0;
  transition: all 0.15s;
  z-index: 2;
}
.ch-item-edit:hover { background: rgba(96,165,250,0.2); color: var(--accent2); border-color: var(--accent2); }

.drawer-create-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  cursor: pointer;
  background: none;
  border: none;
  border-top: 1px solid rgba(96,165,250,0.3);
  width: 100%;
  text-align: left;
  color: var(--accent2);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  font-weight: 700;
  transition: background 0.15s;
}
.drawer-create-btn:hover { background: var(--cream); }

/* ═══════════════════════════════════════════════════════════════════════
   VIEWERS OVERLAY
═══════════════════════════════════════════════════════════════════════ */
#viewers-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 980;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#viewers-overlay.open { display: flex; }

.viewers-sheet {
  background: rgba(15,23,42,0.98);
  border-top: 1px solid rgba(96,165,250,0.3);
  width: 100%;
  max-width: 640px;
  max-height: 65vh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.3s ease;
  border-radius: 16px 16px 0 0;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.viewers-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
  flex-shrink: 0;
}
.viewers-head-title {
  font-family: var(--font-head);
  font-size: 1.05rem;
  letter-spacing: 0.06em;
  color: var(--accent2);
}
.viewers-close {
  background: none; border: none;
  font-size: 1.2rem; cursor: pointer;
  color: var(--steel); width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.viewers-close:hover { color: var(--accent2); }

.viewers-list {
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: rgba(96,165,250,0.4) transparent;
}

.viewer-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--wire);
}
.viewer-row-avatar {
  width: 38px; height: 38px;
  border-radius: 50%; object-fit: cover;
  background: var(--cream);
  border: 2px solid rgba(96,165,250,0.35);
}
.viewer-row-name { font-weight: 600; font-size: 0.88rem; color: var(--ink); }
.viewer-row-time {
  font-size: 0.7rem; color: var(--steel);
  font-family: var(--font-mono); letter-spacing: 0.04em; margin-top: 2px;
}

/* ═══════════════════════════════════════════════════════════════════════
   EVENT MODAL
═══════════════════════════════════════════════════════════════════════ */
#event-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 990;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#event-modal.open { display: flex; }

.event-sheet {
  background: rgba(15,23,42,0.98);
  border: 1px solid rgba(96,165,250,0.3);
  border-radius: 16px;
  width: 90%;
  max-width: 480px;
  max-height: 75vh;
  display: flex;
  flex-direction: column;
  animation: zoomIn 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
@keyframes zoomIn {
  from { opacity:0; transform: scale(0.95); }
  to   { opacity:1; transform: scale(1); }
}

.event-sheet-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
  flex-shrink: 0;
}
.event-sheet-head h4 {
  font-family: var(--font-head);
  font-size: 1.05rem;
  letter-spacing: 0.06em;
  color: var(--accent2);
}
.event-sheet-close {
  background: none; border: none;
  font-size: 1.3rem; cursor: pointer;
  color: var(--steel); border-radius: 50%; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
.event-sheet-close:hover { color: var(--accent2); }

.event-list-inner {
  overflow-y: auto;
  flex: 1;
  padding: 16px 20px;
}

.ev-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--wire);
}
.ev-item:last-child { border-bottom: none; }

.ev-title {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--accent2);
}
.ev-desc {
  font-size: 0.84rem;
  line-height: 1.5;
  color: var(--lead);
  margin-top: 4px;
  white-space: pre-wrap;
}
.ev-img {
  width: 100%;
  margin-top: 10px;
  border: 1px solid var(--wire);
  display: block;
  border-radius: 8px;
}

/* ═══════════════════════════════════════════════════════════════════════
   CREATE/EDIT CHANNEL MODAL
═══════════════════════════════════════════════════════════════════════ */
#ch-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 990;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#ch-modal.open { display: flex; }

.ch-form-sheet {
  background: rgba(15,23,42,0.98);
  border: 1px solid rgba(96,165,250,0.3);
  border-radius: 16px;
  width: 90%;
  max-width: 420px;
  animation: zoomIn 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

.ch-form-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
}
.ch-form-head h3 {
  font-family: var(--font-head);
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  color: var(--accent2);
}
.ch-form-close {
  background: none; border: none; font-size: 1.3rem;
  cursor: pointer; color: var(--steel); border-radius: 50%;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
}
.ch-form-close:hover { color: var(--accent2); }

.ch-form-body { padding: 20px; }

.ch-avatar-wrap {
  width: 80px; height: 80px;
  margin: 0 auto 20px;
  position: relative;
  cursor: pointer;
}
.ch-avatar-preview {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 2.5px solid rgba(96,165,250,0.45);
  background: var(--cream);
  display: block;
}
.ch-avatar-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
  color: #fff; font-size: 1.2rem;
}
.ch-avatar-wrap:hover .ch-avatar-overlay { opacity: 1; }

.ch-field {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1px solid rgba(96,165,250,0.4);
  background: transparent;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.ch-field:focus { border-bottom-color: var(--accent2); }
.ch-field::placeholder { color: var(--steel); }

.ch-form-actions {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  border-top: 1px solid var(--wire);
}

.ch-btn-cancel {
  flex: 1; height: 42px;
  background: transparent;
  border: 1px solid var(--wire);
  color: var(--steel);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  transition: all 0.15s;
  border-radius: 999px;
}
.ch-btn-cancel:hover { background: var(--cream); }

.ch-btn-submit {
  flex: 2; height: 42px;
  background: linear-gradient(135deg, #3b82f6, #60a5fa);
  border: none;
  color: white;
  cursor: pointer;
  font-family: var(--font-head);
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  transition: opacity 0.15s;
  border-radius: 999px;
}
.ch-btn-submit:hover { opacity: 0.88; }

/* Delete channel button (in modal for owner) */
.ch-btn-delete {
  flex: 1; height: 42px;
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.5);
  color: #f87171;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  transition: all 0.15s;
  border-radius: 999px;
}
.ch-btn-delete:hover { background: rgba(239,68,68,0.25); }

/* ═══════════════════════════════════════════════════════════════════════
   EVENT INPUT MODAL
═══════════════════════════════════════════════════════════════════════ */
#event-input-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 995;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#event-input-modal.open { display: flex; }

.ev-input-sheet {
  background: rgba(15,23,42,0.98);
  border: 1px solid rgba(96,165,250,0.3);
  border-radius: 16px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  animation: zoomIn 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.ev-input-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
  flex-shrink: 0;
}
.ev-input-head h3 {
  font-family: var(--font-head);
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  color: var(--accent2);
}
.ev-input-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}
.ev-count-label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--steel);
  margin-bottom: 16px;
  text-align: center;
}
.ev-count-label span { color: var(--accent2); font-weight: 700; }

.ev-input-field {
  width: 100%;
  padding: 10px 0;
  border: none;
  border-bottom: 1px solid rgba(96,165,250,0.4);
  background: transparent;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.9rem;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
.ev-input-field:focus { border-bottom-color: var(--accent2); }
.ev-input-field::placeholder { color: var(--steel); }

.ev-input-actions {
  display: flex; gap: 10px;
  padding: 14px 20px;
  border-top: 1px solid var(--wire);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.ev-btn {
  flex: 1; min-width: 100px;
  height: 42px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  border: 1px solid var(--wire);
  background: var(--cream);
  color: var(--lead);
  transition: all 0.15s;
  border-radius: 8px;
}
.ev-btn.primary {
  background: linear-gradient(135deg, #10b981, #34d399);
  color: white;
  border-color: transparent;
  font-family: var(--font-head);
  font-size: 0.85rem;
  letter-spacing: 0.1em;
}
.ev-btn.primary:hover { opacity: 0.88; }
.ev-btn.add { background: none; border-color: var(--accent2); color: var(--accent2); }
.ev-btn.add:hover { background: rgba(96,165,250,0.1); }
.ev-btn:hover { background: rgba(255,255,255,0.06); }

/* ═══════════════════════════════════════════════════════════════════════
   LOADING & EMPTY STATES
═══════════════════════════════════════════════════════════════════════ */
.state-view {
  width: 100vw;
  height: 100%;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--steel);
}

.loading-masthead {
  font-family: var(--font-head);
  font-size: 3rem;
  letter-spacing: 0.12em;
  color: var(--accent2);
  opacity: 0.45;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.2; }
  50%       { opacity: 0.6; }
}

.empty-label {
  font-family: var(--font-head);
  font-size: 1.5rem;
  letter-spacing: 0.1em;
  color: var(--steel);
  opacity: 0.6;
}
.empty-sub {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  color: var(--steel);
}

/* ═══════════════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════════════ */
#toast-area {
  position: fixed;
  top: calc(var(--total-top) + 10px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast-msg {
  pointer-events: auto;
  background: rgba(15,23,42,0.95);
  color: var(--ink);
  padding: 10px 18px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  white-space: nowrap;
  animation: toastIn 0.3s ease;
  max-width: 90vw;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.toast-msg.err { border-left: 3px solid var(--accent); }
.toast-msg.ok  { border-left: 3px solid var(--accent2); }
@keyframes toastIn {
  from { opacity:0; transform: translateY(-12px); }
  to   { opacity:1; transform: translateY(0); }
}

.confirm-toast {
  pointer-events: auto;
  background: rgba(15,23,42,0.98);
  color: var(--ink);
  padding: 14px 18px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  border-left: 3px solid var(--accent);
  min-width: min(340px, 88vw);
  border-radius: 8px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
}
.confirm-toast-title { font-weight: 700; margin-bottom: 4px; letter-spacing: 0.05em; }
.confirm-toast-sub { color: var(--steel); font-size: 0.7rem; margin-bottom: 12px; }
.confirm-toast-btns { display: flex; gap: 8px; justify-content: flex-end; }
.conf-btn {
  height: 30px;
  padding: 0 14px;
  border: 1px solid var(--wire);
  background: transparent;
  color: var(--steel);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  transition: all 0.15s;
  border-radius: 999px;
}
.conf-btn.danger {
  background: linear-gradient(135deg, #ef4444, #f87171);
  border-color: transparent;
  color: #fff;
  font-weight: 700;
}
.conf-btn:hover { opacity: 0.85; }

/* ═══════════════════════════════════════════════════════════════════════
   SWIPE HINT
═══════════════════════════════════════════════════════════════════════ */
#swipe-hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: var(--steel);
  z-index: 800;
  pointer-events: none;
  animation: swipeHint 3s ease 1s forwards;
  opacity: 0;
}
@keyframes swipeHint {
  0%   { opacity:0; }
  15%  { opacity:0.7; }
  80%  { opacity:0.7; transform: translateX(calc(-50% + 20px)); }
  100% { opacity:0; transform: translateX(calc(-50% + 40px)); }
}

/* ═══════════════════════════════════════════════════════════════════════
   REACTIONS
═══════════════════════════════════════════════════════════════════════ */
.c-reactions {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 5px;
  flex-wrap: wrap;
}

.c-react-menu {
  position: relative;
  display: inline-block;
}
.c-react-toggle {
  background: none;
  border: 1px solid var(--wire);
  color: var(--steel);
  cursor: pointer;
  font-size: 0.7rem;
  padding: 2px 6px;
  height: 22px;
  transition: all 0.15s;
  border-radius: 4px;
}
.c-react-toggle:hover { border-color: var(--accent2); color: var(--accent2); }

.c-react-picker {
  position: absolute;
  bottom: 28px;
  left: 0;
  background: rgba(15,23,42,0.98);
  border: 1px solid rgba(96,165,250,0.3);
  border-radius: 10px;
  display: none;
  gap: 0;
  z-index: 50;
  flex-direction: row;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  overflow: hidden;
}
.c-react-picker.open { display: flex; }
.c-react-picker button {
  background: none;
  border: none;
  border-right: 1px solid var(--wire);
  cursor: pointer;
  font-size: 1.2rem;
  width: 40px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.c-react-picker button:last-child { border-right: none; }
.c-react-picker button:hover { background: rgba(96,165,250,0.12); }
.c-react-picker button.active { background: rgba(96,165,250,0.2); }

.c-react-count {
  font-size: 0.72rem;
  color: var(--lead);
  font-family: var(--font-mono);
  display: none;
}
.c-react-count.visible { display: inline; }

/* Skeleton loader */
.skel {
  background: rgba(96,165,250,0.08);
  position: relative;
  overflow: hidden;
  border-radius: 8px;
}
.skel::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,0.08), transparent);
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  from { transform: translateX(-100%); }
  to   { transform: translateX(100%); }
}
</style>
</head>

<!-- ═══════════════════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiU_LeE6AnCQFzLmORd6kpkHVh3cllbpXhYOg4H1L8U2MAbjF0X0nR03n8_2yFc0KN/exec';

const currentUser = localStorage.getItem('userName') || '';
if (!currentUser) { location.href = 'index.html'; }

let allChannels    = [];
let currentChannel = null;
let currentPosts   = [];
let isAuthorised   = false;
let isAdmin        = false;
let channelPolling = null;
let editingChannel = null;
let stagedEvents   = [];
let evImageData    = null;
let stagedMedia    = null;

const postEventsMap = new Map();

const CH_CACHE_KEY = 'rv_channels_v2';
const CH_CACHE_TTL = 10 * 60 * 1000;

/* ── UTILITY ─────────────────────────────────────────────────────── */
function lh3(url) {
  if (!url) return '';
  const m = url.match(/[-\w]{25,}/);
  return m ? `https://lh3.googleusercontent.com/d/${m[0]}` : url;
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString([], {
    hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short'
  });
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

function fallbackAvatar(name) {
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1e293b&color=60a5fa&size=88`;
}

/* ── TOAST ──────────────────────────────────────────────────────── */
function toast(msg, type = 'ok', dur = 3400) {
  const area = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

function confirmToast(title, sub, okLabel = 'DELETE', cancelLabel = 'CANCEL') {
  return new Promise(resolve => {
    const area = document.getElementById('toast-area');
    const el = document.createElement('div');
    el.className = 'toast-msg confirm-toast';
    el.innerHTML = `
      <div class="confirm-toast-title">${title}</div>
      <div class="confirm-toast-sub">${sub}</div>
      <div class="confirm-toast-btns">
        <button class="conf-btn" id="ct-cancel">${cancelLabel}</button>
        <button class="conf-btn danger" id="ct-ok">${okLabel}</button>
      </div>
    `;
    area.appendChild(el);
    el.querySelector('#ct-ok').onclick = () => { el.remove(); resolve(true); };
    el.querySelector('#ct-cancel').onclick = () => { el.remove(); resolve(false); };
  });
}

/* ── CACHE ───────────────────────────────────────────────────────── */
function getCachedChannels() {
  try {
    const raw = localStorage.getItem(CH_CACHE_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (Date.now() - d.t > CH_CACHE_TTL) { localStorage.removeItem(CH_CACHE_KEY); return null; }
    return d.channels || [];
  } catch { return null; }
}

function cacheChannels(channels) {
  try { localStorage.setItem(CH_CACHE_KEY, JSON.stringify({ t: Date.now(), channels })); } catch {}
}

/* ── API HELPERS ─────────────────────────────────────────────────── */
async function api(params) {
  const res = await fetch(`${SCRIPT_URL}?${new URLSearchParams(params)}`);
  return res.json();
}

async function post(body) {
  const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
  return res.json();
}

/* ── LOAD CHANNELS ───────────────────────────────────────────────── */
async function loadChannels(force = false) {
  let channels = force ? null : getCachedChannels();
  if (channels) {
    allChannels = channels;
    renderChannelUI(channels);
    fetchChannelsFresh();
  } else {
    await fetchChannelsFresh();
  }

  const usp = new URLSearchParams(location.search);
  const urlChId   = usp.get('channelId');
  const urlPostId = usp.get('postId');

  let target = urlChId
    ? allChannels.find(c => c.id === urlChId)
    : allChannels.find(c => c.id === localStorage.getItem('rv_last_ch')) || allChannels[0];

  if (target) openChannel(target, urlPostId || null);
}

async function fetchChannelsFresh() {
  try {
    const data = await api({ operation: 'getAllChannels' });
    allChannels = data.channels || [];
    cacheChannels(allChannels);
    renderChannelUI(allChannels);
  } catch (e) { console.warn('channels fetch failed', e); }
}

function renderChannelUI(channels) {
  renderTicker(channels);
  renderDrawer(channels);
}

/* ── TICKER ──────────────────────────────────────────────────────── */
function renderTicker(channels) {
  const strip = document.getElementById('ticker-scroll');
  strip.innerHTML = '';
  channels.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'ticker-ch' + (currentChannel?.id === ch.id ? ' active' : '');
    el.dataset.id = ch.id;
    el.innerHTML = `<span class="ticker-ch-dot"></span>${ch.name.toUpperCase()}`;
    el.addEventListener('click', () => { openChannel(ch); closeDrawer(); });
    strip.appendChild(el);
  });
}

/* ── CHANNEL DRAWER ──────────────────────────────────────────────── */
function renderDrawer(channels) {
  const grid = document.getElementById('channel-grid');
  grid.innerHTML = '';
  channels.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'ch-item' + (currentChannel?.id === ch.id ? ' active' : '');
    const av = ch.picLink ? lh3(ch.picLink) : fallbackAvatar(ch.name);
    const isOwner = ch.creator === currentUser;

    el.innerHTML = `
      <img class="ch-item-avatar" src="${av}" onerror="this.src='https://picsum.photos/id/64/48/48'" alt="">
      <div class="ch-item-text">
        <div class="ch-item-name">${ch.name}</div>
        <div class="ch-item-desc">${ch.description || 'No description'}</div>
        <div class="ch-item-creator">BY ${(ch.creator || '').toUpperCase()} · ${fmtDate(ch.created)}</div>
      </div>
      ${isOwner ? `<button class="ch-item-edit" title="Edit channel" data-ch-id="${ch.id}"><i class="fas fa-pencil-alt"></i></button>` : ''}
    `;

    // Click on the item (not the edit button) opens the channel
    el.addEventListener('click', e => {
      if (e.target.closest('.ch-item-edit')) return;
      openChannel(ch);
      closeDrawer();
    });

    // Edit button for owner
    const editBtn = el.querySelector('.ch-item-edit');
    if (editBtn) {
      editBtn.addEventListener('click', e => {
        e.stopPropagation();
        closeDrawer();
        openChModal('edit', ch);
      });
    }

    grid.appendChild(el);
  });
}

function openDrawer() { document.getElementById('channel-drawer').classList.add('open'); }
function closeDrawer() { document.getElementById('channel-drawer').classList.remove('open'); }

document.getElementById('btn-channels').addEventListener('click', openDrawer);
document.getElementById('ticker-add').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('channel-drawer').addEventListener('click', e => {
  if (e.target === document.getElementById('channel-drawer')) closeDrawer();
});

/* ── OPEN CHANNEL ─────────────────────────────────────────────────── */
async function openChannel(ch, scrollToPostId = null) {
  if (channelPolling) { clearInterval(channelPolling); channelPolling = null; }

  currentChannel = ch;
  localStorage.setItem('rv_last_ch', ch.id);

  const av = ch.picLink ? lh3(ch.picLink) : fallbackAvatar(ch.name);
  document.getElementById('mh-avatar').src = av;
  document.getElementById('mh-ch-name').textContent = ch.name.toUpperCase();
  document.getElementById('mh-ch-meta').textContent = `BY ${(ch.creator || '').toUpperCase()} · ${fmtDate(ch.created)}`;

  document.querySelectorAll('.ticker-ch').forEach(el => {
    el.classList.toggle('active', el.dataset.id === ch.id);
  });
  const activeTick = document.querySelector(`.ticker-ch[data-id="${ch.id}"]`);
  if (activeTick) activeTick.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  await checkAuth(ch.id);
  await renderPosts(ch.id, scrollToPostId);
  startPolling();
}

/* ── CHECK AUTH ──────────────────────────────────────────────────── */
async function checkAuth(channelId) {
  try {
    const data = await api({ operation: 'isAuthorised', username: currentUser, channelId });
    isAuthorised = data.status === 'success' && data.isAuthorised;
  } catch { isAuthorised = false; }

  document.getElementById('btn-write').style.display = isAuthorised ? 'flex' : 'none';

  try {
    const d = await api({ operation: 'getUserStatus', name: currentUser });
    isAdmin = d.userStatus === 'approved' && d.isAdmin === true;
    document.getElementById('drawer-create-btn').style.display = isAdmin ? 'flex' : 'none';
  } catch { isAdmin = false; }
}

/* ── RENDER POSTS ─────────────────────────────────────────────────── */
async function renderPosts(channelId, scrollToPostId = null) {
  const rail = document.getElementById('post-rail');
  rail.innerHTML = `
    <div class="state-view">
      <div class="loading-masthead">LOADING</div>
      <div class="empty-sub">FETCHING POSTS...</div>
    </div>`;

  try {
    const data = await api({ operation: 'getChannelPosts', channelId, username: currentUser });
    currentPosts = data.posts || [];

    if (currentPosts.length === 0) {
      rail.innerHTML = `
        <div class="state-view">
          <div class="empty-label">NO POSTS YET</div>
          <div class="empty-sub">${isAuthorised ? 'PRESS THE EDIT BUTTON TO POST' : 'NOTHING HERE YET'}</div>
        </div>`;
      updateProgress(0, 0);
      return;
    }

    rail.innerHTML = '';
    currentPosts.forEach((p, i) => {
      if (p.events?.length) postEventsMap.set(p.postId, p.events);
      rail.appendChild(buildPostView(p, i, currentPosts.length));
    });

    updateProgress(0, currentPosts.length);
    updateNavInfo(1, currentPosts.length);
    setupScrollTracker();
    setupViewTracking();

    if (scrollToPostId) setTimeout(() => scrollToPost(scrollToPostId), 300);

  } catch (err) {
    console.error(err);
    rail.innerHTML = `
      <div class="state-view">
        <div class="empty-label">LOAD FAILED</div>
        <div class="empty-sub">CHECK CONNECTION AND REFRESH</div>
      </div>`;
  }
}

/* ── BUILD POST VIEW ─────────────────────────────────────────────── */
function buildPostView(p, idx, total) {
  const wrap = document.createElement('div');
  wrap.className = 'post-view';
  wrap.dataset.postId = p.postId;

  const avatarSrc = lh3(p.picLink) || fallbackAvatar(p.author);
  const isOwn = p.author === currentUser;

  let mediaHtml = '';
  if (p.media?.link) {
    const isImg = (p.media.type || '').startsWith('image');
    const src = isImg
      ? lh3(p.media.link)
      : `https://drive.google.com/file/d/${(p.media.link.match(/[-\w]{25,}/) || [p.media.link])[0]}/preview`;
    mediaHtml = isImg
      ? `<div class="post-media-wrap"><img src="${src}" loading="lazy" onerror="this.style.display='none'" alt=""></div>`
      : `<div class="post-media-wrap"><div class="video-shell"><iframe src="${src}" allowfullscreen></iframe></div></div>`;
  }

  let calHtml = '';
  if (p.events?.length) {
    const byMonth = {};
    p.events.forEach(ev => {
      const [y, m] = ev.date.split('-');
      const key = `${y}-${m}`;
      if (!byMonth[key]) byMonth[key] = [];
      byMonth[key].push(ev);
    });

    let monthsHtml = '';
    Object.keys(byMonth).sort().forEach(key => {
      const [y, m] = key.split('-');
      const monthName = new Date(y, m - 1).toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
      monthsHtml += `
        <div class="cal-month">
          <div class="cal-month-title">${monthName}</div>
          <div class="cal-grid">
            ${['S','M','T','W','T','F','S'].map(d => `<div class="cal-day-label">${d}</div>`).join('')}
            ${buildMonthGrid(y, m, byMonth[key], p.postId)}
          </div>
        </div>`;
    });
    calHtml = `<div class="post-calendar"><div class="cal-month-strip">${monthsHtml}</div></div>`;
  }

 const cleanText = (p.content || '')
  .replace(/https?:\/\/drive\.google\.com\/[^\s<>"']*/gi, '')
  .replace(/\/view\b\S*/gi, '')
  .replace(/usp=\S+/gi, '')
  .replace(/\s{2,}/g, ' ').trim();
  
  wrap.innerHTML = `
    <div class="post-header">
      <img class="post-avatar" src="${avatarSrc}" onerror="this.src='https://picsum.photos/id/64/48/48'" alt="">
      <div class="post-author-block">
        <div class="post-author">${p.author}</div>
        <div class="post-time">${fmtTime(p.created)}</div>
      </div>
      <div class="post-index">${String(idx + 1).padStart(2,'0')} / ${String(total).padStart(2,'0')}</div>
      ${isOwn ? `<button class="post-delete-btn" data-pid="${p.postId}" title="Delete post"><i class="far fa-trash-alt"></i></button>` : ''}
    </div>

    <div class="post-body">
      ${mediaHtml}
      ${cleanText ? `<div class="post-text">${cleanText.replace(/\n/g, '<br>')}</div>` : ''}
      ${calHtml}
    </div>

    <div class="post-foot">
      <button class="post-action post-like-btn ${p.likedByCurrentUser ? 'liked' : ''}" data-pid="${p.postId}" data-liked="${p.likedByCurrentUser ? '1' : '0'}">
        <i class="${p.likedByCurrentUser ? 'fas' : 'far'} fa-heart"></i>
        <span class="like-count">${p.likes || 0}</span>
      </button>
      <button class="post-action comment-toggle-btn" data-pid="${p.postId}">
        <i class="far fa-comment"></i>
        <span class="comment-count-label">—</span>
      </button>
      <button class="post-action post-view-badge" data-pid="${p.postId}">
        <i class="far fa-eye"></i>
        <span class="view-count-label">0</span>
      </button>
    </div>

    <div class="comment-panel" id="cp-${p.postId}">
      <div class="comment-list" id="cl-${p.postId}"></div>
      <div class="comment-input-bar">
        <input type="text" id="ci-${p.postId}" placeholder="Write a comment..." autocomplete="off">
        <button class="comment-send" data-pid="${p.postId}"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  `;

  wrap.querySelector('.post-delete-btn')?.addEventListener('click', () => deletePost(p.postId, wrap));
  wrap.querySelector('.post-like-btn').addEventListener('click', e => toggleLike(p.postId, wrap.querySelector('.post-like-btn')));
  wrap.querySelector('.comment-toggle-btn').addEventListener('click', () => toggleComments(p.postId));
  wrap.querySelector('.post-view-badge').addEventListener('click', () => openViewers(p.postId));
  wrap.querySelector('.comment-send').addEventListener('click', () => sendComment(p.postId));
  wrap.querySelector(`#ci-${p.postId}`).addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendComment(p.postId); }
  });

  loadCommentCount(p.postId, wrap.querySelector('.comment-count-label'));
  return wrap;
}

/* ── CALENDAR GRID ───────────────────────────────────────────────── */
function buildMonthGrid(year, month, events, postId) {
  const firstDay = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasEv = events.some(e => e.date === ds);
    html += `<div class="cal-day ${hasEv ? 'has-event' : ''}" ${hasEv ? `data-date="${ds}" data-pid="${postId}"` : ''}>${d}</div>`;
  }
  return html;
}

document.getElementById('post-rail').addEventListener('click', e => {

  const date = day.dataset.date;

  const evs  = postEventsMap.get(pid)?.filter(ev => ev.date === date) || [];
  showEventModal(date, evs);
});

/* ── SCROLL TRACKING ─────────────────────────────────────────────── */
function setupScrollTracker() {
  const rail = document.getElementById('post-rail');
  rail.addEventListener('scroll', onRailScroll, { passive: true });
}

function onRailScroll() {
  const rail = document.getElementById('post-rail');
  const vw = rail.clientWidth;
  if (!vw) return;
  const idx = Math.round(rail.scrollLeft / vw);
  updateProgress(idx, currentPosts.length);
  updateNavInfo(idx + 1, currentPosts.length);
}

function updateProgress(idx, total) {
  const fill = document.getElementById('post-progress-fill');
  fill.style.width = total > 1 ? `${(idx / (total - 1)) * 100}%` : '100%';
}

function updateNavInfo(cur, total) {
  document.getElementById('post-nav-info').textContent = total ? `${cur} / ${total}` : '';
}

/* ── VIEW TRACKING ───────────────────────────────────────────────── */
const viewedPosts = new Set();

function setupViewTracking() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const postId = entry.target.dataset.postId;
      if (!postId || viewedPosts.has(postId)) return;
      viewedPosts.add(postId);
      recordView(postId);
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('.post-view[data-post-id]').forEach(el => observer.observe(el));
}

async function recordView(postId) {
  try {
    await post({ operation: 'recordChannelPostView', postId, username: currentUser, channelId: currentChannel?.id });
    refreshViewCount(postId);
  } catch {}
}

async function refreshViewCount(postId) {
  try {
    const data = await api({ operation: 'getChannelPostViewCount', postId });
    if (data.status === 'success') {
      const el = document.querySelector(`.post-view[data-post-id="${postId}"] .view-count-label`);
      if (el) el.textContent = data.count || 0;
    }
  } catch {}
}

/* ── LIKES ───────────────────────────────────────────────────────── */
async function toggleLike(postId, btn) {
  const liked = btn.dataset.liked === '1';
  const countEl = btn.querySelector('.like-count');
  const icon    = btn.querySelector('i');
  let count = parseInt(countEl.textContent) || 0;

  if (liked) {
    count = Math.max(0, count - 1);
    btn.dataset.liked = '0';
    btn.classList.remove('liked');
    icon.className = 'far fa-heart';
  } else {
    count++;
    btn.dataset.liked = '1';
    btn.classList.add('liked');
    icon.className = 'fas fa-heart';
  }
  countEl.textContent = count;

  try {
    await post({ operation: 'toggleChannelPostLike', postId, username: currentUser });
  } catch {
    if (liked) {
      btn.dataset.liked = '1'; btn.classList.add('liked'); icon.className = 'fas fa-heart'; countEl.textContent = count + 1;
    } else {
      btn.dataset.liked = '0'; btn.classList.remove('liked'); icon.className = 'far fa-heart'; countEl.textContent = count - 1;
    }
    toast('Like failed', 'err');
  }
}

async function loadComments(postId) {
  const list = document.getElementById(`cl-${postId}`);
  if (!list) return;
  if (list.dataset.lastDeleteTime && (Date.now() - +list.dataset.lastDeleteTime < 35000)) return;

  try {
    const data = await api({ operation: 'getChannelComments', postId, username: currentUser });
    const comments = (data.comments || []).reverse();
    list.innerHTML = comments.length === 0
      ? `<div style="text-align:center;padding:20px;color:var(--steel);font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.08em;">NO COMMENTS YET</div>`
      : '';

    comments.forEach(c => {
      const isOwn = c.author === currentUser;
      const av = lh3(c.picLink) || fallbackAvatar(c.author);

      let mediaHtml = '';
      if (c.media?.link) {
        const src = lh3(c.media.link);
        mediaHtml = c.media.type?.startsWith('image')
          ? `<img src="${src}" style="max-width:100%;max-height:180px;object-fit:contain;display:block;margin-top:6px;border-radius:8px;" loading="lazy">`
          : `<video controls src="${src}" style="max-width:100%;max-height:160px;display:block;margin-top:6px;border-radius:8px;" loading="lazy"></video>`;
      }

      const msg = document.createElement('div');
      msg.className = `c-msg ${isOwn ? 'own' : ''}`;
      msg.dataset.commentId = c.id;

      msg.innerHTML = `
        <img class="c-avatar" src="${av}" onerror="this.src='https://picsum.photos/id/64/48/48'" alt="">
        <div class="c-bubble">
          <div class="c-name">${c.author.toUpperCase()}</div>
          ${mediaHtml}
          <div class="c-text">${c.content.replace(/\n/g,'<br>')}</div>
          <span class="c-time">${fmtTime(c.created)}</span>
          ${isOwn ? `<button class="c-del" title="Delete"><i class="far fa-trash-alt"></i></button>` : ''}
          <div class="c-reactions" data-comment-id="${c.id}">
            <div class="c-react-menu">
              <button class="c-react-toggle"><i class="fas fa-smile-beam"></i></button>
              <div class="c-react-picker" id="rp-${c.id}">
                <button data-emoji="fire" class="${c.reactions?.myReaction==='fire'?'active':''}">🔥</button>
                <button data-emoji="love" class="${c.reactions?.myReaction==='love'?'active':''}">❤️</button>
                <button data-emoji="thanks" class="${c.reactions?.myReaction==='thanks'?'active':''}">🙏</button>
              </div>
            </div>
            <span class="c-react-count ${(c.reactions?.fire||0)>0?'visible':''}" data-type="fire">${c.reactions?.fire||0} 🔥</span>
            <span class="c-react-count ${(c.reactions?.love||0)>0?'visible':''}" data-type="love">${c.reactions?.love||0} ❤️</span>
            <span class="c-react-count ${(c.reactions?.thanks||0)>0?'visible':''}" data-type="thanks">${c.reactions?.thanks||0} 🙏</span>
          </div>
        </div>
      `;

      msg.querySelector('.c-del')?.addEventListener('click', () => deleteComment(c.id, postId, msg, list));

      const toggle = msg.querySelector('.c-react-toggle');
      const picker = msg.querySelector(`#rp-${c.id}`);
      toggle?.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.c-react-picker').forEach(p => { if (p !== picker) p.classList.remove('open'); });
        picker.classList.toggle('open');
      });
      picker?.querySelectorAll('button[data-emoji]').forEach(btn => {
        btn.addEventListener('click', () => {
          toggleReaction(c.id, postId, btn.dataset.emoji, msg);
          picker.classList.remove('open');
        });
      });

      list.appendChild(msg);
    });
  } catch { list.innerHTML = '<div style="color:#f87171;padding:16px;font-size:0.8rem;">Failed to load</div>'; }
}

async function sendComment(postId) {
  const input = document.getElementById(`ci-${postId}`);
  const content = input.value.trim();
  if (!content || !currentChannel) return;
  input.value = '';
  try {
    await post({ operation: 'createChannelComment', postId, channelId: currentChannel.id, author: currentUser, content });
    loadComments(postId);
    loadCommentCount(postId, document.querySelector(`.post-view[data-post-id="${postId}"] .comment-count-label`));
  } catch { toast('Comment failed', 'err'); }
}

async function deleteComment(commentId, postId, msgEl, list) {
  const ok = await confirmToast('Delete this comment?', 'This cannot be undone.');
  if (!ok) return;
  msgEl.style.opacity = '0.4';
  msgEl.style.pointerEvents = 'none';
  try {
    const data = await post({ operation: 'deleteChannelComment', commentId, postId, username: currentUser });
    if (data.status === 'success') {
      msgEl.remove();
      list.dataset.lastDeleteTime = Date.now();
      toast('Comment deleted', 'ok');
      loadCommentCount(postId, document.querySelector(`.post-view[data-post-id="${postId}"] .comment-count-label`));
    } else {
      msgEl.style.opacity = ''; msgEl.style.pointerEvents = '';
      toast(data.message || 'Delete failed', 'err');
    }
  } catch {
    msgEl.style.opacity = ''; msgEl.style.pointerEvents = '';
    toast('Network error', 'err');
  }
}

/* ── DELETE POST ─────────────────────────────────────────────────── */
async function deletePost(postId, postEl) {
  const ok = await confirmToast('Delete this post?', 'All comments will also be removed permanently.');
  if (!ok) return;
  postEl.style.opacity = '0.4';
  postEl.style.pointerEvents = 'none';
  try {
    const data = await post({ operation: 'deleteChannelPost', postId, username: currentUser, channelId: currentChannel?.id });
    if (data.status === 'success') {
      postEl.remove();
      toast('Post deleted', 'ok');
      currentPosts = currentPosts.filter(p => p.postId !== postId);
      if (currentPosts.length === 0) {
        document.getElementById('post-rail').innerHTML = `
          <div class="state-view">
            <div class="empty-label">NO POSTS YET</div>
            <div class="empty-sub">PRESS THE EDIT BUTTON TO START</div>
          </div>`;
      }
      const rail = document.getElementById('post-rail');
      let ids = [];
      try { ids = JSON.parse(rail.dataset.deletedIds || '[]'); } catch {}
      ids.push(postId);
      rail.dataset.deletedIds = JSON.stringify(ids.slice(-50));
      updateProgress(0, currentPosts.length);
      updateNavInfo(1, currentPosts.length);
    } else {
      postEl.style.opacity = ''; postEl.style.pointerEvents = '';
      toast(data.message || 'Delete failed', 'err');
    }
  } catch {
    postEl.style.opacity = ''; postEl.style.pointerEvents = '';
    toast('Network error', 'err');
  }
}

/* ── REACTIONS ───────────────────────────────────────────────────── */
async function toggleReaction(commentId, postId, emoji, msgEl) {
  try {
    const data = await post({
      operation: 'toggleChannelCommentReaction',
      commentId, postId,
      channelId: currentChannel?.id,
      username: currentUser,
      reactionType: emoji
    });
    if (data.status === 'success') {
      const counts = data.reactions?.counts || {};
      const myReaction = data.reactions?.myReaction;
      ['fire','love','thanks'].forEach(type => {
        const span = msgEl.querySelector(`.c-react-count[data-type="${type}"]`);
        if (span) {
          const c = counts[type] || 0;
          span.textContent = `${c} ${type === 'fire' ? '🔥' : type === 'love' ? '❤️' : '🙏'}`;
          span.classList.toggle('visible', c > 0);
        }
        const btn = msgEl.querySelector(`#rp-${commentId} button[data-emoji="${type}"]`);
        if (btn) btn.classList.toggle('active', myReaction === type);
      });
    }
  } catch { toast('Reaction failed', 'err'); }
}

/* ── EVENT MODAL ──────────────────────────────────────────────────── */
function showEventModal(dateStr, events) {
  const modal  = document.getElementById('event-modal');
  const title  = document.getElementById('event-modal-date');
  const list   = document.getElementById('event-modal-list');
  const [y, m, d] = dateStr.split('-');
  title.textContent = new Date(y, m-1, d).toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  }).toUpperCase();
  list.innerHTML = '';
  if (!events.length) {
    list.innerHTML = '<div style="color:var(--steel);font-size:0.85rem;padding:8px 0;">No events on this day</div>';
  } else {
    events.forEach(ev => {
      const raw = (ev.title || 'Untitled').trim();
      const [tPart, dPart = ''] = raw.includes('/') ? raw.split('/', 2).map(s => s.trim()) : [raw, ''];
      const item = document.createElement('div');
      item.className = 'ev-item';
      let html = `<div class="ev-title">${tPart}</div>`;
      if (dPart) html += `<div class="ev-desc">${dPart.replace(/\n/g,'<br>')}</div>`;
      if (ev.imageUrl?.includes('uc?id=')) {
        const id = ev.imageUrl.match(/uc\?id=([a-zA-Z0-9_-]+)/i)?.[1];
        if (id) html += `<img class="ev-img" src="https://lh3.googleusercontent.com/d/${id}" loading="lazy" onerror="this.style.display='none'" alt="">`;
      }
      item.innerHTML = html;
      list.appendChild(item);
    });
  }
  modal.classList.add('open');
}

  document.getElementById('event-modal').classList.remove('open');
});

document.getElementById('media-file-input').addEventListener('change', e => {

  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    stagedMedia = { base64: ev.target.result.split(',')[1], name: file.name, type: file.type };
    const prev = document.getElementById('write-media-preview');
    prev.style.display = 'block';
    const tag = file.type.startsWith('image') ? 'img' : 'video';
    const el = document.createElement(tag);
    el.src = ev.target.result;
    if (tag === 'video') el.controls = true;
    el.style.cssText = 'max-width:100%;max-height:200px;object-fit:contain;display:block;border-radius:8px;';
    prev.innerHTML = '';
    prev.appendChild(el);
    const rmBtn = document.createElement('button');
    rmBtn.className = 'write-media-remove';
    rmBtn.innerHTML = '<i class="fas fa-times"></i>';
    rmBtn.addEventListener('click', () => {
      stagedMedia = null;
      prev.innerHTML = '';
      prev.style.display = 'none';
      document.getElementById('media-file-input').value = '';
    });
    prev.appendChild(rmBtn);

});

  area.style.display = showing ? 'none' : 'block';

    document.getElementById('scheduled-time').value = d.toISOString().slice(0,16);

/* ── SUBMIT POST ──────────────────────────────────────────────────── */
async function submitPost() {
  if (!currentChannel) { toast('Select a channel first', 'err'); return; }

  let content = document.getElementById('write-content').value.trim();

  const store = document.getElementById('write-events-store');
  const events = [];
  store.querySelectorAll('[data-ev-row]').forEach(row => {
    const date  = row.querySelector('[data-ev-date]')?.value?.trim();
    const title = row.querySelector('[data-ev-title]')?.value?.trim();
    if (date && title) {
      const ev = { date, title };
      if (row.dataset.imageBase64) {
        ev.image = { base64: row.dataset.imageBase64, name: row.dataset.imageName, type: row.dataset.imageType };
      }
      events.push(ev);
    }
  });

  const driveMatch = content.match(/https?:\/\/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/i);
  let fileData = null;
  if (driveMatch && !stagedMedia) {
    content = content.replace(driveMatch[0], '').trim();
    fileData = { link: driveMatch[1] };
  } else if (stagedMedia) {
    fileData = stagedMedia;
  }

  if (!content && !fileData && events.length === 0) {
    toast('Add text, media, or events first', 'err');
    return;
  }

  const scheduleToggle = document.getElementById('write-schedule-toggle');
  const schedTime = document.getElementById('scheduled-time').value;
  const payload = {
    operation: 'createChannelPost',
    channelId: currentChannel.id,
    author: currentUser,
    content: content || '',
    file: fileData || (events.length > 0 ? { events } : null),
    scheduledTime: (scheduleToggle.classList.contains('active') && schedTime)
      ? new Date(schedTime).toISOString()
      : null
  };

  const submitBtn = document.getElementById('write-submit');
  submitBtn.disabled = true;
  submitBtn.textContent = 'PUBLISHING...';

  try {
    const data = await post(payload);
    if (data.status === 'success') {
      toast('Posted!', 'ok');
      closeWritePanel();
      await renderPosts(currentChannel.id);
    } else {
      toast(data.message || 'Post failed', 'err');
    }
  } catch { toast('Network error', 'err'); }
  finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'PUBLISH';
  }
}

document.getElementById('write-submit').addEventListener('click', submitPost);
