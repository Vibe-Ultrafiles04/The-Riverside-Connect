<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Riverside · Q&A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Riverside Connect">
<link rel="apple-touch-icon" href="maskable_icon_x192.png">

<style>
/* ═══════════════════════════════════════════════════════════════════════
   RIVERSIDE Q&A — Matching channels.html design system
═══════════════════════════════════════════════════════════════════════ */

:root {
  --ink:        #e2e8f0;
  --paper:      #0f172a;
  --cream:      #1e293b;
  --wire:       rgba(96,165,250,0.18);
  --steel:      #94a3b8;
  --lead:       #cbd5e1;
  --accent:     #ef4444;
  --accent2:    #60a5fa;
  --gold:       #facc15;
  --white:      #f8fafc;
  --purple:     #a78bfa;

  --font-head:  'Bebas Neue', sans-serif;
  --font-body:  'DM Sans', sans-serif;
  --font-mono:  'DM Mono', monospace;

  --bar-h:      56px;
  --ticker-h:   36px;
  --total-top:  calc(var(--bar-h) + var(--ticker-h));
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════════════
   MASTHEAD
═══════════════════════════════════════════════════════════════════════ */
#masthead {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--bar-h);
  background: rgba(15,23,42,0.96);
  border-bottom: 1px solid rgba(96,165,250,0.22);
  z-index: 900;
  display: flex;
  align-items: center;
  overflow: hidden;
  backdrop-filter: blur(14px);
}

.mh-back {
  height: 100%;
  width: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--wire);
  color: var(--accent2);
  text-decoration: none;
  font-size: 1.1rem;
  flex-shrink: 0;
  transition: background 0.15s;
}
.mh-back:hover { background: var(--cream); }

.mh-channel-info {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  overflow: hidden;
}

.mh-channel-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(96,165,250,0.4);
  flex-shrink: 0;
  background: var(--cream);
}

.mh-channel-name {
  font-family: var(--font-head);
  font-size: 1.35rem;
  letter-spacing: 0.04em;
  color: var(--accent2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1;
}

.mh-channel-meta {
  font-size: 0.72rem;
  color: var(--steel);
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mh-tools {
  display: flex;
  align-items: center;
  height: 100%;
  flex-shrink: 0;
  border-left: 1px solid var(--wire);
}

.mh-btn {
  height: 100%;
  width: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  border-right: 1px solid var(--wire);
  color: var(--ink);
  cursor: pointer;
  font-size: 1rem;
  transition: background 0.15s, color 0.15s;
  position: relative;
}
.mh-btn:last-child { border-right: none; }
.mh-btn:hover { background: var(--cream); color: var(--accent2); }
.mh-btn.active { color: var(--accent2); background: var(--cream); }

/* ═══════════════════════════════════════════════════════════════════════
   CHANNEL TICKER
═══════════════════════════════════════════════════════════════════════ */
#channel-ticker {
  position: fixed;
  top: var(--bar-h);
  left: 0; right: 0;
  height: var(--ticker-h);
  background: rgba(15,23,42,0.98);
  border-bottom: 1px solid rgba(96,165,250,0.15);
  z-index: 899;
  display: flex;
  align-items: center;
  overflow: hidden;
}

.ticker-label {
  height: 100%;
  padding: 0 14px;
  background: var(--purple);
  color: var(--paper);
  font-family: var(--font-head);
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  white-space: nowrap;
}

.ticker-scroll {
  flex: 1;
  overflow-x: auto;
  display: flex;
  align-items: center;
  -ms-overflow-style: none;
  scrollbar-width: none;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.ticker-scroll::-webkit-scrollbar { display: none; }

.ticker-ch {
  height: var(--ticker-h);
  padding: 0 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.55);
  font-size: 0.8rem;
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  cursor: pointer;
  border-right: 1px solid rgba(255,255,255,0.08);
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.ticker-ch:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.07); }
.ticker-ch.active {
  color: #fff;
  background: rgba(167,139,250,0.15);
  border-bottom: 2px solid var(--gold);
}
.ticker-ch-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--steel);
  flex-shrink: 0;
}
.ticker-ch.active .ticker-ch-dot { background: var(--gold); }

.ticker-add {
  height: var(--ticker-h);
  width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  flex-shrink: 0;
  font-size: 0.95rem;
  transition: color 0.2s;
  border-left: 1px solid rgba(255,255,255,0.08);
}
.ticker-add:hover { color: var(--gold); }

/* ═══════════════════════════════════════════════════════════════════════
   MAIN STAGE — vertical game feed
═══════════════════════════════════════════════════════════════════════ */
#stage {
  position: fixed;
  top: var(--total-top);
  left: 0; right: 0;
  bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: rgba(167,139,250,0.4) transparent;
}
#stage::-webkit-scrollbar { width: 3px; }
#stage::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.4); }

#game-feed {
  max-width: 780px;
  margin: 0 auto;
  padding: 20px 0 120px;
}

/* ═══════════════════════════════════════════════════════════════════════
   GAME CARDS
═══════════════════════════════════════════════════════════════════════ */
.game-card {
  background: rgba(30,41,59,0.7);
  border: 1px solid var(--wire);
  margin: 0 0 1px;
  overflow: hidden;
  transition: border-color 0.2s;
  position: relative;
}
@media (min-width: 600px) {
  .game-card {
    margin: 0 16px 12px;
    border-radius: 0;
  }
}
.game-card:hover { border-color: rgba(167,139,250,0.35); }

.game-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--wire);
  background: rgba(15,23,42,0.7);
}

.game-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--cream);
  border: 2px solid rgba(167,139,250,0.35);
  flex-shrink: 0;
}

.game-author-block { flex: 1; min-width: 0; }
.game-author {
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--purple);
  letter-spacing: 0.01em;
}
.game-time {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--steel);
  letter-spacing: 0.06em;
  margin-top: 1px;
}

.game-badge {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid;
  flex-shrink: 0;
  text-transform: uppercase;
}
.game-badge.quiz { color: var(--accent2); border-color: rgba(96,165,250,0.4); }
.game-badge.survey { color: var(--purple); border-color: rgba(167,139,250,0.4); }

.game-delete-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--steel);
  cursor: pointer;
  font-size: 0.85rem;
  border-radius: 4px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.game-delete-btn:hover { color: var(--accent); background: rgba(239,68,68,0.12); }

.game-image-wrap {
  width: 100%;
  background: #000;
  overflow: hidden;
  position: relative;
  max-height: 260px;
}
.game-image-wrap img {
  width: 100%;
  max-height: 260px;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}
.game-card:hover .game-image-wrap img { transform: scale(1.03); }

.game-image-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 32px 20px 16px;
  background: linear-gradient(to top, rgba(15,23,42,0.95) 0%, transparent 100%);
}
.game-image-title {
  font-family: var(--font-head);
  font-size: 1.6rem;
  letter-spacing: 0.06em;
  color: #fff;
  line-height: 1.1;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.game-image-desc {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}

.game-text-block {
  padding: 18px 20px 14px;
}
.game-text-title {
  font-family: var(--font-head);
  font-size: 1.4rem;
  letter-spacing: 0.06em;
  color: var(--ink);
  line-height: 1.1;
}
.game-text-desc {
  font-size: 0.84rem;
  color: var(--steel);
  margin-top: 6px;
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}

.game-foot {
  display: flex;
  align-items: center;
  border-top: 1px solid var(--wire);
  background: rgba(15,23,42,0.7);
  height: 46px;
  flex-shrink: 0;
}

.game-action {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: var(--steel);
  cursor: pointer;
  border-right: 1px solid var(--wire);
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-bottom: none;
  border-left: none;
  text-decoration: none;
}
.game-action:last-child { border-right: none; }
.game-action:hover { color: var(--ink); background: var(--cream); }
.game-action.play-action { color: var(--accent2); }
.game-action.play-action:hover { color: #fff; background: rgba(96,165,250,0.2); }
.game-action.board-action { color: var(--purple); }
.game-action.board-action:hover { color: #fff; background: rgba(167,139,250,0.2); }

/* ═══════════════════════════════════════════════════════════════════════
   LOADING & EMPTY STATES
═══════════════════════════════════════════════════════════════════════ */
.state-view {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--steel);
  padding: 100px 32px;
  text-align: center;
}
.loading-masthead {
  font-family: var(--font-head);
  font-size: 3rem;
  letter-spacing: 0.12em;
  color: var(--purple);
  opacity: 0.45;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.2; }
  50%       { opacity: 0.6; }
}
.empty-label {
  font-family: var(--font-head);
  font-size: 1.5rem;
  letter-spacing: 0.1em;
  color: var(--steel);
  opacity: 0.6;
}
.empty-sub {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  color: var(--steel);
}

/* ═══════════════════════════════════════════════════════════════════════
   CHANNEL DRAWER
═══════════════════════════════════════════════════════════════════════ */
#channel-drawer {
  position: fixed;
  top: var(--total-top);
  left: 0; right: 0;
  background: rgba(15,23,42,0.98);
  border-bottom: 1px solid rgba(167,139,250,0.3);
  z-index: 850;
  transform: translateY(-105%);
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-height: 65vh;
  overflow-y: auto;
  backdrop-filter: blur(14px);
}
#channel-drawer.open { transform: translateY(0); }

.drawer-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
  position: sticky;
  top: 0;
  background: rgba(15,23,42,0.98);
  z-index: 2;
}
.drawer-head-title {
  font-family: var(--font-head);
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  color: var(--purple);
}
.drawer-close {
  background: none;
  border: none;
  color: var(--steel);
  cursor: pointer;
  font-size: 1.2rem;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s;
}
.drawer-close:hover { color: var(--purple); }

.channel-grid {
  display: grid;
  grid-template-columns: 1fr;
}
@media (min-width: 600px) { .channel-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 1000px) { .channel-grid { grid-template-columns: 1fr 1fr 1fr; } }

.ch-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
  cursor: pointer;
  transition: background 0.15s;
  color: var(--ink);
  position: relative;
}
.ch-item:hover { background: var(--cream); }
.ch-item.active { background: rgba(167,139,250,0.1); border-left: 3px solid var(--purple); }

.ch-item-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--cream);
  flex-shrink: 0;
  border: 2px solid rgba(167,139,250,0.4);
}
.ch-item-text { flex: 1; min-width: 0; }
.ch-item-name { font-weight: 700; font-size: 0.92rem; color: var(--ink); }
.ch-item-desc {
  font-size: 0.76rem;
  color: var(--steel);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ch-item-creator {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--steel);
  letter-spacing: 0.05em;
  margin-top: 2px;
}
.ch-item-delete {
  width: 32px; height: 32px;
  background: none;
  border: 1px solid var(--wire);
  color: var(--steel);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem;
  flex-shrink: 0;
  transition: all 0.15s;
}
.ch-item-delete:hover { background: rgba(239,68,68,0.12); color: var(--accent); border-color: var(--accent); }

.drawer-create-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  cursor: pointer;
  background: none;
  border: none;
  border-top: 1px solid rgba(167,139,250,0.3);
  width: 100%;
  text-align: left;
  color: var(--purple);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  font-weight: 700;
  transition: background 0.15s;
}
.drawer-create-btn:hover { background: var(--cream); }

/* ═══════════════════════════════════════════════════════════════════════
   CREATE CHANNEL MODAL
═══════════════════════════════════════════════════════════════════════ */
#ch-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 990;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#ch-modal.open { display: flex; }

.ch-form-sheet {
  background: rgba(15,23,42,0.98);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 16px;
  width: 90%;
  max-width: 420px;
  animation: zoomIn 0.25s ease;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
@keyframes zoomIn {
  from { opacity:0; transform: scale(0.95); }
  to   { opacity:1; transform: scale(1); }
}

.ch-form-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--wire);
}
.ch-form-head h3 {
  font-family: var(--font-head);
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  color: var(--purple);
}
.ch-form-close {
  background: none; border: none; font-size: 1.3rem;
  cursor: pointer; color: var(--steel); border-radius: 50%;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  transition: color 0.15s;
}
.ch-form-close:hover { color: var(--purple); }

.ch-form-body { padding: 20px; }

.ch-avatar-wrap {
  width: 80px; height: 80px;
  margin: 0 auto 20px;
  position: relative;
  cursor: pointer;
}
.ch-avatar-preview {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 2.5px solid rgba(167,139,250,0.45);
  background: var(--cream);
  display: block;
}
.ch-avatar-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
  color: #fff; font-size: 1.2rem;
}
.ch-avatar-wrap:hover .ch-avatar-overlay { opacity: 1; }

.ch-field {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1px solid rgba(167,139,250,0.4);
  background: transparent;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.2s;
  resize: none;
}
.ch-field:focus { border-bottom-color: var(--purple); }
.ch-field::placeholder { color: var(--steel); }

.ch-form-actions {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  border-top: 1px solid var(--wire);
}
.ch-btn-cancel {
  flex: 1; height: 42px;
  background: transparent;
  border: 1px solid var(--wire);
  color: var(--steel);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  border-radius: 999px;
  transition: all 0.15s;
}
.ch-btn-cancel:hover { background: var(--cream); }
.ch-btn-submit {
  flex: 2; height: 42px;
  background: linear-gradient(135deg, #8b5cf6, #a78bfa);
  border: none;
  color: white;
  cursor: pointer;
  font-family: var(--font-head);
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  border-radius: 999px;
  transition: opacity 0.15s;
}
.ch-btn-submit:hover { opacity: 0.88; }

/* ═══════════════════════════════════════════════════════════════════════
   CREATE GAME PANEL (like write panel)
═══════════════════════════════════════════════════════════════════════ */
#write-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(15,23,42,0.98);
  border-top: 1px solid rgba(167,139,250,0.3);
  z-index: 950;
  transform: translateY(105%);
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-height: 84vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  backdrop-filter: blur(14px);
}
#write-panel.open { transform: translateY(0); }

.write-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--wire);
  position: sticky;
  top: 0;
  background: rgba(15,23,42,0.98);
  z-index: 2;
}
.write-head-title {

}

function fallbackAvatar(name) {
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1e293b&color=a78bfa&size=88`;
}

function fmtDate(ts) {
  return new Date(ts).toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString([], { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' });
}

/* ── TOAST ──────────────────────────────────────────────────────── */
function toast(msg, type = 'ok', dur = 3400) {
  const area = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

/* ── CONFIRM ─────────────────────────────────────────────────────── */
function confirmDialog(title, sub, okLabel = 'DELETE') {
  return new Promise(resolve => {
    confirmResolve = resolve;
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-sub').textContent = sub;
    document.getElementById('confirm-ok').textContent = okLabel;
    document.getElementById('confirm-modal').classList.add('open');
  });
}

document.getElementById('confirm-ok').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('open');
  if (confirmResolve) { confirmResolve(true); confirmResolve = null; }
});
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('open');
  if (confirmResolve) { confirmResolve(false); confirmResolve = null; }
});

/* ── API HELPERS ─────────────────────────────────────────────────── */
async function api(params) {
  const res = await fetch(`${SCRIPT_URL}?${new URLSearchParams(params)}`);
  return res.json();
}

async function postData(body) {
  const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
  return res.json();
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.readAsDataURL(file);
    r.onload  = () => res(r.result);
    r.onerror = () => rej(new Error('read failed'));
  });
}

/* ── LOAD CHANNELS ───────────────────────────────────────────────── */
async function loadChannels() {
  try {
    const data = await api({ operation: 'getAllQnAChannels' });
    allChannels = data.channels || [];
    renderChannelUI();

    // Pick channel to open
    const usp = new URLSearchParams(location.search);
    const urlId = usp.get('channelId');
    let target = urlId
      ? allChannels.find(c => c.id === urlId)
      : allChannels.find(c => c.id === localStorage.getItem('rv_last_qna_ch')) || allChannels[0];

    if (target) openChannel(target);
    else {
      document.getElementById('game-feed').innerHTML = `
        <div class="state-view">
          <div class="empty-label">NO CHANNELS YET</div>
          <div class="empty-sub">AN ADMIN CAN CREATE ONE</div>
        </div>`;
    }
  } catch (e) {
    document.getElementById('game-feed').innerHTML = `
      <div class="state-view">
        <div class="empty-label">LOAD FAILED</div>
        <div class="empty-sub">CHECK CONNECTION AND REFRESH</div>
      </div>`;
  }
}

/* ── RENDER CHANNEL UI ───────────────────────────────────────────── */
function renderChannelUI() {
  renderTicker();
  renderDrawer();
}

function renderTicker() {
  const strip = document.getElementById('ticker-scroll');
  strip.innerHTML = '';
  allChannels.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'ticker-ch' + (currentChannel?.id === ch.id ? ' active' : '');
    el.dataset.id = ch.id;
    el.innerHTML = `<span class="ticker-ch-dot"></span>${ch.name.toUpperCase()}`;
    el.addEventListener('click', () => { openChannel(ch); closeDrawer(); });
    strip.appendChild(el);
  });
}

function renderDrawer() {
  const grid = document.getElementById('channel-grid');
  grid.innerHTML = '';
  allChannels.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'ch-item' + (currentChannel?.id === ch.id ? ' active' : '');
    const av = ch.picLink ? lh3(ch.picLink) : fallbackAvatar(ch.name);
    const isOwner = (ch.creator || '').trim().toLowerCase() === currentUser.trim().toLowerCase();

    el.innerHTML = `
      <img class="ch-item-avatar" src="${av}" onerror="this.src='${fallbackAvatar(ch.name)}'" alt="">
      <div class="ch-item-text">
        <div class="ch-item-name">${ch.name}</div>
        <div class="ch-item-desc">${ch.description || 'No description'}</div>
        <div class="ch-item-creator">BY ${(ch.creator || '').toUpperCase()} · ${fmtDate(ch.created)}</div>
      </div>
      ${isOwner ? `<button class="ch-item-delete" title="Delete channel" data-id="${ch.id}" data-name="${ch.name}"><i class="fas fa-trash-alt"></i></button>` : ''}
    `;

    el.addEventListener('click', e => {
      if (e.target.closest('.ch-item-delete')) return;
      openChannel(ch);
      closeDrawer();
    });

    el.querySelector('.ch-item-delete')?.addEventListener('click', async e => {
      e.stopPropagation();
      const ok = await confirmDialog(`Delete "${ch.name}"?`, 'All games, questions and scores will be permanently removed.');
      if (!ok) return;
      try {
        const data = await postData({ operation: 'deleteQnAChannel', channelId: ch.id, username: currentUser });
        if (data.status === 'success') {
          toast('Channel deleted', 'ok');
          allChannels = allChannels.filter(c => c.id !== ch.id);
          renderChannelUI();
          if (currentChannel?.id === ch.id) {
            currentChannel = null;
            document.getElementById('mh-ch-name').textContent = 'RIVERSIDE';
            document.getElementById('mh-ch-meta').textContent = 'SELECT A Q&A CHANNEL';
            document.getElementById('mh-avatar').src = '';
            document.getElementById('btn-write').style.display = 'none';
            document.getElementById('game-feed').innerHTML = `
              <div class="state-view">
                <div class="empty-label">SELECT A CHANNEL</div>
                <div class="empty-sub">CHOOSE FROM THE TICKER ABOVE</div>
              </div>`;
          }
        } else {
          toast(data.message || 'Delete failed', 'err');
        }
      } catch { toast('Network error', 'err'); }
    });

    grid.appendChild(el);
  });
}

/* ── OPEN CHANNEL ─────────────────────────────────────────────────── */
async function openChannel(ch) {
  currentChannel = ch;
  localStorage.setItem('rv_last_qna_ch', ch.id);

  const av = ch.picLink ? lh3(ch.picLink) : fallbackAvatar(ch.name);
  document.getElementById('mh-avatar').src = av;
  document.getElementById('mh-ch-name').textContent = ch.name.toUpperCase();
  document.getElementById('mh-ch-meta').textContent = `BY ${(ch.creator || '').toUpperCase()} · ${fmtDate(ch.created)}`;

  document.querySelectorAll('.ticker-ch').forEach(el => {
    el.classList.toggle('active', el.dataset.id === ch.id);
  });
  const activeTick = document.querySelector(`.ticker-ch[data-id="${ch.id}"]`);
  if (activeTick) activeTick.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  // Show write btn only to channel creator
  const isCreator = (ch.creator || '').trim().toLowerCase() === currentUser.trim().toLowerCase();
  document.getElementById('btn-write').style.display = isCreator ? 'flex' : 'none';

  // Check admin for drawer create btn
  try {
    const d = await api({ operation: 'getUserStatus', name: currentUser });
    isAdmin = d.userStatus === 'approved' && d.isAdmin === true;
    document.getElementById('drawer-create-btn').style.display = isAdmin ? 'flex' : 'none';
  } catch { isAdmin = false; }

  await loadGames(ch.id);
}

/* ── LOAD GAMES ───────────────────────────────────────────────────── */
async function loadGames(channelId) {
  const feed = document.getElementById('game-feed');
  feed.innerHTML = `
    <div class="state-view">
      <div class="loading-masthead">LOADING</div>
      <div class="empty-sub">FETCHING GAMES...</div>
    </div>`;

  try {
    const data = await api({ operation: 'getQnAGames', channelId });
    const games = data.games || [];

    if (games.length === 0) {
      feed.innerHTML = `
        <div class="state-view">
          <div class="empty-label">NO GAMES YET</div>
          <div class="empty-sub">${document.getElementById('btn-write').style.display !== 'none' ? 'PRESS THE EDIT BUTTON TO CREATE ONE' : 'NOTHING HERE YET'}</div>
        </div>`;
      return;
    }

    // Fetch first question image for each game
    for (const game of games) {
      try {
        const qData = await api({ operation: 'getQnAQuestionsAndChoices', gameId: game.id });
        if (qData.status === 'success' && qData.questions?.length > 0) {
          game.firstImage = qData.questions[0].imageLink || '';
        }
      } catch {}
    }

    feed.innerHTML = '';
    games.forEach(g => feed.appendChild(buildGameCard(g)));

  } catch (err) {
    feed.innerHTML = `
      <div class="state-view">
        <div class="empty-label">LOAD FAILED</div>
        <div class="empty-sub">CHECK CONNECTION AND REFRESH</div>
      </div>`;
  }
}

/* ── BUILD GAME CARD ──────────────────────────────────────────────── */
function buildGameCard(game) {
  const wrap = document.createElement('div');
  wrap.className = 'game-card';
  wrap.dataset.gameId = game.id;

  const av = game.creatorPicLink ? lh3(game.creatorPicLink) : fallbackAvatar(game.creator);
  const isSurvey = game.mode === 'survey';
  const isOwner = (game.creator || '').trim().toLowerCase() === currentUser.trim().toLowerCase();
  const imgSrc = game.firstImage ? lh3(game.firstImage) : '';

  let mediaHtml = '';
  if (imgSrc) {
    mediaHtml = `
      <div class="game-image-wrap">
        <img src="${imgSrc}" loading="lazy" onerror="this.parentElement.style.display='none'" alt="">
        <div class="game-image-overlay">
          <div class="game-image-title">${game.name}</div>
          ${game.description ? `<div class="game-image-desc">${game.description}</div>` : ''}
        </div>
      </div>`;
  } else {
    mediaHtml = `
      <div class="game-text-block">
        <div class="game-text-title">${game.name}</div>
        ${game.description ? `<div class="game-text-desc">${game.description}</div>` : ''}
      </div>`;
  }

  wrap.innerHTML = `
    <div class="game-header">
      <img class="game-avatar" src="${av}" onerror="this.src='${fallbackAvatar(game.creator)}'" alt="">
      <div class="game-author-block">
        <div class="game-author">${game.creator}</div>
        <div class="game-time">${fmtTime(game.created)}</div>
      </div>
      <span class="game-badge ${isSurvey ? 'survey' : 'quiz'}">${isSurvey ? 'SURVEY' : 'QUIZ'}</span>
      ${isOwner ? `<button class="game-delete-btn" title="Delete game"><i class="far fa-trash-alt"></i></button>` : ''}
    </div>
    ${mediaHtml}
    <div class="game-foot">
      <a class="game-action play-action" href="play.html?gameId=${game.id}">
        <i class="fas fa-play"></i> PLAY
      </a>
      <button class="game-action board-action">
        <i class="fas ${isSurvey ? 'fa-chart-bar' : 'fa-trophy'}"></i>
        ${isSurvey ? 'RESULTS' : 'LEADERBOARD'}
      </button>
    </div>
  `;

  wrap.querySelector('.game-delete-btn')?.addEventListener('click', () => deleteGame(game.id, game.name, wrap));
  wrap.querySelector('.board-action').addEventListener('click', () => {
    if (isSurvey) showSurveyReport(game.id, game.name);
    else showLeaderboard(game.id, game.name);
  });

  return wrap;
}

/* ── DELETE GAME ─────────────────────────────────────────────────── */
async function deleteGame(gameId, gameName, el) {
  const ok = await confirmDialog(`Delete "${gameName}"?`, 'All questions, choices and scores will be permanently removed.');
  if (!ok) return;
  el.style.opacity = '0.4';
  el.style.pointerEvents = 'none';
  try {
    const data = await postData({ operation: 'deleteQnAGame', gameId, username: currentUser });
    if (data.status === 'success') {
      el.remove();
      toast('Game deleted', 'ok');
      if (!document.querySelector('.game-card')) {
        document.getElementById('game-feed').innerHTML = `
          <div class="state-view">
            <div class="empty-label">NO GAMES YET</div>
            <div class="empty-sub">PRESS THE EDIT BUTTON TO CREATE ONE</div>
          </div>`;
      }
    } else {
      el.style.opacity = ''; el.style.pointerEvents = '';
      toast(data.message || 'Delete failed', 'err');
    }
  } catch {
    el.style.opacity = ''; el.style.pointerEvents = '';
    toast('Network error', 'err');
  }
}

/* ── ADD QUESTION ─────────────────────────────────────────────────── */
function addQuestion() {
  const idx = questions.length;
  questions.push({ choices: [] });
  const isSurvey = document.querySelector('input[name="gameMode"]:checked')?.value === 'survey';

  const card = document.createElement('div');
  card.className = 'question-card';
  card.innerHTML = `
    <div class="question-num">QUESTION ${idx + 1}</div>
    <input class="q-field" placeholder="Question text" data-q-text>
    <img class="q-img-preview" id="qprev-${idx}" alt="">
    <label class="q-img-label" for="qimg-${idx}"><i class="fas fa-image"></i> ADD IMAGE</label>
    <input type="file" id="qimg-${idx}" accept="image/*" style="display:none;">
    <div class="choice-container" data-qidx="${idx}"></div>
    <button class="add-choice-link" data-qidx="${idx}">
      <i class="fas fa-plus"></i> ADD CHOICE
    </button>
    <textarea class="q-reason" placeholder="Reason for correct answer" rows="2" style="display:${isSurvey ? 'none' : 'block'};"></textarea>
  `;

  // Image upload
  const fileInput = card.querySelector(`#qimg-${idx}`);
  const preview   = card.querySelector(`#qprev-${idx}`);
  fileInput.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const b64 = await fileToBase64(file);
    questions[idx].image = { base64: b64.split(',')[1], name: file.name, type: file.type };
    preview.src = b64;
    preview.style.display = 'block';
  });

  // Add choice button
  card.querySelector('.add-choice-link').addEventListener('click', () => addChoice(idx, card));

  document.getElementById('questions-strip').appendChild(card);

  // Default 2 choices
  addChoice(idx, card);
  addChoice(idx, card);

  card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'end' });
}

function addChoice(qIdx, card) {
  const choiceIdx = questions[qIdx].choices.length;
  questions[qIdx].choices.push({});
  const isSurvey = document.querySelector('input[name="gameMode"]:checked')?.value === 'survey';

  const row = document.createElement('div');
  row.className = 'choice-row';
  row.innerHTML = `
    <input type="text" placeholder="Choice ${choiceIdx + 1}">
    <label class="choice-img-label" for="cimg-${qIdx}-${choiceIdx}" title="Add image"><i class="fas fa-image"></i></label>
    <input type="file" id="cimg-${qIdx}-${choiceIdx}" accept="image/*" style="display:none;">
    <input type="checkbox" class="correct-cb" title="Correct answer" style="display:${isSurvey ? 'none' : 'inline-block'};">
  `;

  const cf = row.querySelector(`#cimg-${qIdx}-${choiceIdx}`);
  cf.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const b64 = await fileToBase64(file);
    questions[qIdx].choices[choiceIdx].image = { base64: b64.split(',')[1], name: file.name, type: file.type };
    toast('Choice image added', 'ok', 2000);
  });

  card.querySelector('.choice-container').appendChild(row);
}

/* ── SUBMIT GAME ──────────────────────────────────────────────────── */
document.getElementById('write-submit').addEventListener('click', async () => {
  if (!currentChannel) { toast('Select a channel first', 'err'); return; }

  const name  = document.getElementById('write-name').value.trim();
  const desc  = document.getElementById('write-desc').value.trim();
  const timer = document.getElementById('write-timer').value.trim();
  const mode  = document.querySelector('input[name="gameMode"]:checked')?.value || 'quiz';

  if (!name) { toast('Game name required', 'err'); return; }

  const builtQuestions = [];
  const cards = document.querySelectorAll('.question-card');
  let valid = true;

  cards.forEach((card, qIdx) => {
    const text = card.querySelector('[data-q-text]').value.trim();
    if (!text) return;

    const q = {
      text,
      image:        questions[qIdx]?.image || null,
      choices:      [],
      correctIndex: -1,
      reason:       card.querySelector('.q-reason')?.value.trim() || ''
    };

    card.querySelectorAll('.choice-row').forEach((row, cIdx) => {
      const choiceText = row.querySelector('input[type="text"]').value.trim();
      if (!choiceText) return;
      const isCorrect = row.querySelector('.correct-cb').checked;
      q.choices.push({
        text:  choiceText,
        image: questions[qIdx]?.choices?.[cIdx]?.image || null
      });
      if (isCorrect) q.correctIndex = q.choices.length - 1;
    });

    if (q.choices.length > 0) {
      if (mode === 'quiz' && q.correctIndex === -1) {
        toast(`Q${qIdx + 1}: mark at least one correct answer`, 'err');
        valid = false;
        return;
      }
      builtQuestions.push(q);
    }
  });

  if (!valid) return;
  if (builtQuestions.length === 0) { toast('Add at least one question with choices', 'err'); return; }

  const btn = document.getElementById('write-submit');
  btn.disabled = true;
  btn.textContent = 'CREATING...';

  try {
    const data = await postData({
      operation: 'createQnAGame',
      channelId: currentChannel.id,
      creator: currentUser,
      name, desc, timer, mode,
      questions: builtQuestions
    });
    if (data.status === 'success') {
      toast('Game created!', 'ok');
      closeWritePanel();
      await loadGames(currentChannel.id);
    } else {
      toast(data.message || 'Failed', 'err');
    }
  } catch { toast('Network error', 'err'); }
  finally { btn.disabled = false; btn.textContent = 'CREATE GAME'; }
});

/* ── LEADERBOARD ─────────────────────────────────────────────────── */
async function showLeaderboard(gameId, gameName) {
  const modal = document.getElementById('board-modal');
  const list  = document.getElementById('board-list');
  document.getElementById('board-title').textContent = `${gameName.toUpperCase()} — LEADERBOARD`;
  list.innerHTML = '<div class="state-view" style="padding:40px;"><div class="empty-sub">LOADING...</div></div>';
  modal.classList.add('open');

  try {
    const data = await api({ operation: 'getQnALeaderboard', gameId });
    const leaders = data.leaders || [];
    if (leaders.length === 0) {
      list.innerHTML = '<div class="state-view" style="padding:40px;"><div class="empty-sub">NO SCORES YET</div></div>';
      return;
    }
    list.innerHTML = '';
    const colors = ['#ffd700', '#c0c0c0', '#cd7f32'];
    leaders.forEach((l, i) => {

          <div class="leader-name">${l.username}</div>
          <div class="leader-score">SCORE · ${l.score}</div>

  }
}

/* ── SURVEY REPORT ───────────────────────────────────────────────── */
async function showSurveyReport(gameId, gameName) {
  const modal = document.getElementById('board-modal');
  const list  = document.getElementById('board-list');
  document.getElementById('board-title').textContent = `${gameName.toUpperCase()} — RESULTS`;
  list.innerHTML = '<div class="state-view" style="padding:40px;"><div class="empty-sub">LOADING...</div></div>';
  modal.classList.add('open');

  try {
    const [rRes, pRes] = await Promise.all([
      api({ operation: 'getSurveyResults', gameId }),
      api({ operation: 'getSurveyParticipants', gameId })
    ]);

    const results      = rRes.results || [];
    const participants = pRes.participants || [];

    if (results.length === 0) {
      list.innerHTML = '<div class="state-view" style="padding:40px;"><div class="empty-sub">NO RESPONSES YET</div></div>';
      return;
    }

    list.innerHTML = '';
    results.forEach((q, idx) => {
      const block = document.createElement('div');
      block.className = 'survey-q-block';
      let barsHtml = q.choices.map(c => `
        <div class="survey-bar-row">
          <div class="survey-bar-label">
            <span>${c.text}</span>
            <span>${Math.round(c.percent || 0)}% (${c.count})</span>
          </div>
          <div class="survey-bar-track">
            <div class="survey-bar-fill" style="width:${Math.round(c.percent || 0)}%"></div>
          </div>
        </div>`).join('');

      if (q.questionImage) {
        barsHtml = `<img src="${lh3(q.questionImage)}" style="max-width:100%;border-radius:8px;margin-bottom:12px;display:block;" loading="lazy" onerror="this.style.display='none'">` + barsHtml;
      }

      block.innerHTML = `
        <div class="survey-q-title">Q${idx + 1}: ${q.questionText}</div>
        <div class="survey-q-meta">${q.totalResponses} RESPONSE${q.totalResponses !== 1 ? 'S' : ''}</div>
        ${barsHtml}
      `;
      list.appendChild(block);
    });

    // Participants
    const pw = document.createElement('div');
    pw.className = 'participants-wrap';
    pw.innerHTML = `<div class="participants-title">PARTICIPANTS (${participants.length})</div>`;
    const grid = document.createElement('div');
    grid.className = 'participants-grid';
    if (participants.length === 0) {
      grid.innerHTML = '<span style="font-family:var(--font-mono);font-size:0.72rem;color:var(--steel);">NONE YET</span>';
    } else {
      participants.forEach(p => {
        const av = p.picLink ? lh3(p.picLink) : fallbackAvatar(p.username);
        const chip = document.createElement('div');
        chip.className = 'participant-chip';
        chip.innerHTML = `
          <img src="${av}" onerror="this.src='${fallbackAvatar(p.username)}'" alt="">
          <span>${p.username}</span>
        `;
        grid.appendChild(chip);
      });
    }
    pw.appendChild(grid);
    list.appendChild(pw);

  } catch {
    list.innerHTML = '<div class="state-view" style="padding:40px;"><div class="empty-sub">FAILED TO LOAD</div></div>';
  }
}

/* Board modal close */
document.getElementById('board-close').addEventListener('click', () => {
  document.getElementById('board-modal').classList.remove('open');
});
document.getElementById('board-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('board-modal'))
    document.getElementById('board-modal').classList.remove('open');
});

/* ── CREATE CHANNEL MODAL ─────────────────────────────────────────── */
document.getElementById('drawer-create-btn').addEventListener('click', () => {
  closeDrawer();
  chAvatarData = null;
  document.getElementById('ch-name-field').value = '';
  document.getElementById('ch-desc-field').value = '';
  document.getElementById('ch-avatar-preview').src = 'https://ui-avatars.com/api/?name=Q&background=1e293b&color=a78bfa&size=88';
  document.getElementById('ch-modal').classList.add('open');
});

document.getElementById('ch-modal-close').addEventListener('click', () => {
  document.getElementById('ch-modal').classList.remove('open');
});
document.getElementById('ch-cancel-btn').addEventListener('click', () => {
  document.getElementById('ch-modal').classList.remove('open');
});

document.getElementById('ch-avatar-wrap').addEventListener('click', () => {
  document.getElementById('ch-avatar-file').click();
});
document.getElementById('ch-avatar-file').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const b64 = await fileToBase64(file);
  chAvatarData = { base64: b64.split(',')[1], name: file.name, type: file.type };
  document.getElementById('ch-avatar-preview').src = b64;
});

document.getElementById('ch-submit-btn').addEventListener('click', async () => {
  const name = document.getElementById('ch-name-field').value.trim();
  const desc = document.getElementById('ch-desc-field').value.trim();
  if (!name) { toast('Channel name required', 'err'); return; }

  const btn = document.getElementById('ch-submit-btn');
  btn.disabled = true; btn.textContent = 'CREATING...';

  try {
    const payload = { operation: 'createQnAChannel', creator: currentUser, name, description: desc };
    if (chAvatarData) { payload.imageData = chAvatarData.base64; payload.imageName = chAvatarData.name; }
    const data = await postData(payload);
    if (data.status === 'success') {
      toast('Channel created!', 'ok');
      document.getElementById('ch-modal').classList.remove('open');
      await loadChannels();
    } else {
      toast(data.message || 'Failed', 'err');
    }
  } catch { toast('Network error', 'err'); }
  finally { btn.disabled = false; btn.textContent = 'CREATE'; }
});

/* ── REFRESH ──────────────────────────────────────────────────────── */
document.getElementById('btn-refresh').addEventListener('click', async () => {
  if (!currentChannel) return;
  const icon = document.querySelector('#btn-refresh i');
  icon.style.transition = 'transform 0.6s linear';
  icon.style.transform = 'rotate(360deg)';
  setTimeout(() => { icon.style.transition = ''; icon.style.transform = ''; }, 650);
  await loadGames(currentChannel.id);
});

/* ── INIT ─────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', loadChannels);

/* ── SERVICE WORKER ───────────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const swReg = await navigator.serviceWorker.register('./sw.js', { scope: './' });

      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js');
      const { getMessaging, getToken, onMessage } = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-messaging.js');

      const app = initializeApp({
        apiKey: "AIzaSyCuB56TTi5COJnuDmVf6PiGsOjTwvQ0PNo",
        authDomain: "riverside-connect-a8458.firebaseapp.com",
        projectId: "riverside-connect-a8458",
        storageBucket: "riverside-connect-a8458.firebasestorage.app",
        messagingSenderId: "938830806378",
        appId: "1:938830806378:web:254ed56cba3dc02290f913"
      });

      const messaging = getMessaging(app);
      const VAPID = "BLqQIS31O_tuw_UMdReBZHTmy_HNXEcwNaPsor8O8dCt-v0XFepSoGPJmw6P6dYBfh1PDtCaMCxLO4-j7KS4yO8";

      const perm = await Notification.requestPermission();
      if (perm !== 'granted') return;

      const token = await getToken(messaging, { vapidKey: VAPID, serviceWorkerRegistration: swReg });
      if (token) await postData({ operation: 'saveFcmToken', username: currentUser, fcmToken: token });

      onMessage(messaging, payload => {
        const title = payload.data?.title || 'New activity';
        const body  = payload.data?.body  || '';
        toast(`${title} — ${body}`, 'ok', 5000);
        if (currentChannel) loadGames(currentChannel.id);
      });
    } catch (err) { console.warn('FCM setup failed:', err); }
  });
}
</script>
