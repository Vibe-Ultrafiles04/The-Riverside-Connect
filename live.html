<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riverside Live – Channels</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    :root {
      --bg:       #0a0a0c;
      --bg1:      #111116;
      --bg2:      #18181f;
      --bg3:      #1e1e28;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --red:      #ff3b3b;
      --red-glow: rgba(255,59,59,0.25);
      --blue:     #4f8eff;
      --teal:     #00d2b8;
      --amber:    #ffb347;
      --text:     #f0f0f5;
      --text2:    #9999aa;
      --text3:    #555566;
      --radius:   12px;
      --radius-lg:18px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior:smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg1); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 99px; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(10,10,12,0.88);
      backdrop-filter: blur(24px) saturate(160%);
      border-bottom: 1px solid var(--border);
      height: 58px;
      display: flex; align-items: center;
    }

    .nav-inner {
      width: 100%; max-width: 1380px; margin: 0 auto;
      padding: 0 24px;
      display: flex; align-items: center; gap: 14px;
    }

    .logo {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none; flex-shrink: 0;
    }
    .logo-mark {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--red);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.85rem; color: white; letter-spacing: -0.5px;
    }
    .logo-name {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1.05rem; letter-spacing: 1.5px;
      color: var(--text); text-transform: uppercase;
    }

    .nav-search {
      flex: 1; max-width: 440px; margin: 0 auto;
      position: relative;
    }
    .nav-search input {
      width: 100%; background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 999px; padding: 8px 16px 8px 40px;
      color: var(--text); font-family: 'Manrope', sans-serif;
      font-size: 0.85rem; outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .nav-search input:focus {
      border-color: var(--border2);
      background: var(--bg3);
    }
    .nav-search input::placeholder { color: var(--text3); }
    .nav-search i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 0.8rem;
    }

    .nav-spacer { flex: 1; }

    .nav-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 16px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 600;
      text-decoration: none; cursor: pointer;
      border: none; font-family: 'Manrope', sans-serif;
      transition: all 0.18s; flex-shrink: 0;
    }
    .nav-pill.ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
    }
    .nav-pill.ghost:hover {
      border-color: var(--border2);
      color: var(--text);
      background: var(--bg2);
    }
    .nav-pill.primary {
      background: var(--red); color: white;
      box-shadow: 0 0 16px var(--red-glow);
    }
    .nav-pill.primary:hover {
      background: #e62e2e;
      box-shadow: 0 0 24px var(--red-glow);
      transform: translateY(-1px);
    }

    /* ── HERO ── */
    .hero {
      max-width: 1380px; margin: 0 auto;
      padding: 52px 24px 36px;
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: 20px;
      flex-wrap: wrap;
    }

    .hero-left h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800; line-height: 1.05;
      letter-spacing: -1px; color: var(--text);
    }
    .hero-left h1 span { color: var(--red); }
    .hero-sub {
      margin-top: 8px;
      color: var(--text2); font-size: 0.95rem;
    }

    .hero-live-indicator {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 18px;
    }
    .pulse-ring {
      position: relative; width: 10px; height: 10px; flex-shrink: 0;
    }
    .pulse-ring::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%; background: var(--red);
      animation: pulse-out 1.6s ease-out infinite;
    }
    .pulse-ring::after {
      content: '';
      position: absolute; inset: 1px;
      border-radius: 50%; background: var(--red);
    }
    @keyframes pulse-out {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(2.5); }
    }
    .hero-live-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; font-weight: 600;
      color: var(--text2); letter-spacing: 1px;
    }
    .hero-live-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem; font-weight: 600;
      color: var(--red);
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      max-width: 1380px; margin: 0 auto;
      padding: 0 24px 32px;
      display: flex; align-items: center; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      padding: 7px 18px; border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2); font-size: 0.82rem;
      font-weight: 600; cursor: pointer;
      white-space: nowrap;
      font-family: 'Manrope', sans-serif;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .filter-chip:hover {
      border-color: var(--border2);
      color: var(--text);
      background: var(--bg2);
    }
    .filter-chip.active {
      background: var(--text); color: var(--bg);
      border-color: var(--text);
    }
    .filter-chip.live-chip.active {
      background: var(--red); color: white;
      border-color: var(--red);
      box-shadow: 0 0 12px var(--red-glow);
    }

    .filter-divider {
      width: 1px; height: 20px;
      background: var(--border);
      flex-shrink: 0; margin: 0 4px;
    }

    /* ── MAIN CONTENT ── */
    .content {
      max-width: 1380px; margin: 0 auto;
      padding: 0 24px 60px;
    }

    .section-label {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .section-label-text {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--text3);
    }
    .section-label-line {
      flex: 1; height: 1px;
      background: var(--border);
    }
    .section-label-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--text3);
    }

    /* ── CHANNEL GRID ── */
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    .channel-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(.22,.68,0,1.2),
                  border-color 0.2s,
                  box-shadow 0.2s;
      position: relative;
    }
    .channel-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }
    .channel-card.has-live {
      border-color: rgba(255,59,59,0.25);
    }
    .channel-card.has-live:hover {
      border-color: rgba(255,59,59,0.45);
      box-shadow: 0 24px 48px rgba(255,59,59,0.12);
    }

    /* Thumbnail */
    .card-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: var(--bg2);
      position: relative; overflow: hidden;
    }
    .card-thumb-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .channel-card:hover .card-thumb-img { transform: scale(1.04); }

    .card-thumb-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top,
        rgba(10,10,12,0.95) 0%,
        rgba(10,10,12,0.3) 45%,
        transparent 100%);
    }

    /* Live badge on thumbnail */
    .card-live-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--red);
      padding: 3px 8px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; font-weight: 600;
      color: white; letter-spacing: 1px;
      display: flex; align-items: center; gap: 5px;
    }
    .card-live-badge .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: white;
      animation: blink-dot 1.1s ease-in-out infinite;
    }
    @keyframes blink-dot {
      0%,100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .card-waiting-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(255,179,71,0.15);
      border: 1px solid rgba(255,179,71,0.4);
      padding: 3px 8px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; font-weight: 600;
      color: var(--amber); letter-spacing: 1px;
    }

    /* Avatar over thumbnail */
    .card-avatar {
      position: absolute; bottom: -18px; left: 16px;
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid var(--bg1);
      background: var(--bg2);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.1rem; color: white;
      z-index: 2; flex-shrink: 0;
    }
    .card-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* Card body */
    .card-body {
      padding: 26px 16px 16px;
    }

    .card-top {
      display: flex; align-items: flex-start;
      gap: 10px; margin-bottom: 10px;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-channel-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-desc {
      font-size: 0.8rem; color: var(--text2);
      line-height: 1.5; margin-top: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Stream row */
    .card-stream-row {
      display: flex; align-items: center; gap: 9px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px; margin-top: 10px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
    }
    .card-stream-row:hover {
      border-color: var(--red);
      background: rgba(255,59,59,0.06);
    }
    .card-stream-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(255,59,59,0.12);
      display: flex; align-items: center; justify-content: center;
      color: var(--red); font-size: 0.7rem; flex-shrink: 0;
    }
    .card-stream-info { flex: 1; min-width: 0; }
    .card-stream-title {
      font-size: 0.8rem; font-weight: 600;
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-stream-label {
      font-size: 0.68rem; color: var(--red);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px; margin-top: 1px;
    }
    .card-play-icon {
      color: var(--text3); font-size: 0.75rem;
      flex-shrink: 0;
      transition: color 0.18s;
    }
    .card-stream-row:hover .card-play-icon { color: var(--red); }

    /* Waiting stream row */
    .card-stream-row.waiting:hover {
      border-color: var(--amber);
      background: rgba(255,179,71,0.05);
    }
    .card-stream-row.waiting .card-stream-icon {
      background: rgba(255,179,71,0.1);
      color: var(--amber);
    }
    .card-stream-row.waiting .card-stream-label { color: var(--amber); }

    .card-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }
    .card-past {
      font-size: 0.72rem; color: var(--text3);
      display: flex; align-items: center; gap: 5px;
    }

    /* No-thumb placeholder */
    .thumb-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-placeholder i { font-size: 2.5rem; opacity: 0.12; }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg,
        var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .skel-banner { height: 168px; border-radius: 0; }
    .skel-body { padding: 28px 16px 16px; }
    .skel-line { height: 13px; margin-bottom: 9px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 90px 20px; gap: 12px;
      color: var(--text2); text-align: center;
    }
    .empty-icon {
      width: 70px; height: 70px; border-radius: 50%;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: var(--text3);
      margin-bottom: 8px;
    }
    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      color: var(--text);
    }
    .empty-state p { font-size: 0.88rem; max-width: 300px; }

    /* ══════════════════════════════════════════════════
       PLAYER MODAL
    ══════════════════════════════════════════════════ */
    .player-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      animation: fade-in 0.22s ease;
    }
    .player-overlay.open { display: flex; flex-direction: column; }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Player top bar */
    .player-topbar {
      height: 56px; flex-shrink: 0;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      gap: 14px; padding: 0 20px;
    }

    .player-close-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2); font-size: 0.85rem;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.18s; flex-shrink: 0;
    }
    .player-close-btn:hover {
      background: var(--bg3);
      color: var(--text);
      border-color: var(--border2);
    }

    .player-channel-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg2);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.8rem; color: white; flex-shrink: 0;
    }
    .player-channel-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .player-meta { flex: 1; min-width: 0; }
    .player-channel-label {
      font-size: 0.72rem; color: var(--text2);
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .player-stream-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap;
    }

    .player-status {
      padding: 5px 12px; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 1px; flex-shrink: 0;
    }
    .player-status.live {
      background: rgba(255,59,59,0.15);
      border: 1px solid rgba(255,59,59,0.4);
      color: var(--red);
    }
    .player-status.waiting {
      background: rgba(255,179,71,0.1);
      border: 1px solid rgba(255,179,71,0.3);
      color: var(--amber);
    }
    .player-status.ended {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text3);
    }

    /* Player body */
    .player-body {
      flex: 1; display: flex; overflow: hidden;
    }

    /* Video area */
    .video-area {
      flex: 1; background: #000;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .video-area video {
      width: 100%; height: 100%;
      object-fit: contain;
      max-height: calc(100vh - 56px);
    }

    /* Conn status */
    .conn-status {
      position: absolute; top: 14px; left: 14px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border-radius: 8px; padding: 6px 12px;
      display: flex; align-items: center; gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; color: var(--text2);
      transition: opacity 0.5s; display: none;
    }
    .conn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--amber); flex-shrink: 0;
    }
    .conn-dot.connected { background: var(--teal); }
    .conn-dot.failed    { background: var(--red); }

    /* Placeholder */
    .video-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; text-align: center; padding: 24px;
    }
    .placeholder-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--text3);
      margin-bottom: 4px;
    }
    .video-placeholder h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1.05rem;
      color: var(--text);
    }
    .video-placeholder p { font-size: 0.85rem; color: var(--text2); max-width: 280px; }

    .retry-btn {
      margin-top: 8px;
      padding: 9px 22px; border-radius: 8px;
      background: var(--blue); border: none;
      color: white; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: 'Manrope', sans-serif;
      transition: background 0.18s;
      display: none;
    }
    .retry-btn:hover { background: #3a76e0; }

    /* ── CHAT PANEL ── */
    .chat-panel {
      width: 320px; flex-shrink: 0;
      background: var(--bg1);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
    }

    .chat-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 9px;
    }
    .chat-header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.85rem;
      flex: 1;
    }
    .viewer-badge {
      display: flex; align-items: center; gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; color: var(--text2);
      background: var(--bg2);
      padding: 3px 8px; border-radius: 999px;
    }
    .viewer-badge i { font-size: 0.6rem; }

    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 12px; display: flex;
      flex-direction: column; gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg3) transparent;
    }

    .chat-msg {
      display: flex; gap: 9px; align-items: flex-start;
    }
    .chat-msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700;
      color: var(--blue); overflow: hidden;
    }
    .chat-msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-msg-name {
      font-size: 0.72rem; font-weight: 700;
      color: var(--blue); margin-bottom: 2px;
    }
    .chat-msg-text {
      font-size: 0.82rem; line-height: 1.45;
      color: var(--text2);
    }

    /* Reactions */
    .reactions-row {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex; gap: 6px;
    }
    .reaction-btn {

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {

  </style>
</head>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG & STATE
═══════════════════════════════════════════════════════ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVg0Rb-NPCMk3eLynXCe3Z8kMv0ByX3RS5oQsvv_CHrfs9rDnOn7QHJM9km3j0swD0/exec';
const ME = localStorage.getItem('userName') || 'Guest';

let allChannels     = [];
let allBroadcasts   = {};   // channelId → [broadcast]
let activeFilter    = 'all';
let searchQuery     = '';
let activeBcastId   = null;
let chatPoll        = null;
let peerConn        = null;
let iceTimer        = null;
let answerPollTimer = null;
let retryCount      = 0;
const MAX_RETRIES   = 3;

/* ═══════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════ */
const lh3 = url => {
  if (!url) return '';
  const id = url.match(/[-\w]{25,}/)?.[0];
  return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
};

const hslFromStr = s => {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${Math.abs(h) % 360},50%,30%)`;
};

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ═══════════════════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════════════════ */
async function loadAll() {
  try {
    const r = await fetch(`${SCRIPT_URL}?operation=getLiveChannels`);
    const d = await r.json();
    if (d.status !== 'success') throw new Error();
    allChannels = d.channels || [];

    await Promise.all(allChannels.map(async ch => {
      try {
        const br = await fetch(`${SCRIPT_URL}?operation=getLiveBroadcasts&channelId=${encodeURIComponent(ch.id)}`);
        const bd = await br.json();
        allBroadcasts[ch.id] = bd.broadcasts || [];
      } catch { allBroadcasts[ch.id] = []; }
    }));

    render();
    updateLiveCount();
  } catch {
    document.getElementById('channels-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-satellite-dish"></i></div>
        <h3>No channels yet</h3>
        <p>Channels will appear here once created in Studio.</p>
      </div>`;
  }
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function render() {
  let list = [...allChannels];

  // search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(ch =>
      (ch.name||'').toLowerCase().includes(q) ||
      (ch.description||'').toLowerCase().includes(q)
    );
  }

  // status filter
  if (activeFilter === 'live') {
    list = list.filter(ch => (allBroadcasts[ch.id]||[]).some(b => b.status==='live'));
  } else if (activeFilter === 'waiting') {
    list = list.filter(ch => {
      const bs = allBroadcasts[ch.id]||[];
      return bs.some(b=>b.status==='waiting') && !bs.some(b=>b.status==='live');
    });
  } else if (activeFilter === 'ended') {
    list = list.filter(ch => {
      const bs = allBroadcasts[ch.id]||[];
      return bs.some(b=>b.status==='ended') && !bs.some(b=>b.status==='live') && !bs.some(b=>b.status==='waiting');
    });
  }

  document.getElementById('ch-count').textContent = list.length + ' channel' + (list.length!==1?'s':'');

  if (!list.length) {
    document.getElementById('channels-grid').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-tv"></i></div>
        <h3>No channels found</h3>
        <p>${activeFilter==='live'?'No one is live right now.':activeFilter==='waiting'?'No upcoming broadcasts.':'No channels match your search.'}</p>
      </div>`;
    return;
  }

  document.getElementById('channels-grid').innerHTML = list.map(ch => channelCard(ch)).join('');
}

function channelCard(ch) {
  const bs       = allBroadcasts[ch.id] || [];
  const live     = bs.find(b => b.status==='live');
  const waiting  = bs.find(b => b.status==='waiting');
  const pastCnt  = bs.filter(b => b.status==='ended').length;
  const banner   = lh3(ch.bannerLink);
  const pic      = lh3(ch.picLink);
  const init     = (ch.name||'?')[0].toUpperCase();
  const bg       = hslFromStr(ch.name||'x');

  const thumbHtml = banner
    ? `<img src="${banner}" class="card-thumb-img" onerror="this.style.display='none'">`
    : `<div class="thumb-placeholder"><i class="fas fa-photo-video"></i></div>`;

  const statusBadge = live
    ? `<div class="card-live-badge"><div class="dot"></div>LIVE</div>`
    : waiting
    ? `<div class="card-waiting-badge">⏳ SOON</div>`
    : '';

  const streamRow = live
    ? `<div class="card-stream-row" onclick="event.stopPropagation();openPlayer('${live.id}','${ch.id}')">
        <div class="card-stream-icon"><i class="fas fa-play"></i></div>
        <div class="card-stream-info">
          <div class="card-stream-title">${esc(live.title)}</div>
          <div class="card-stream-label">● LIVE NOW</div>
        </div>
        <i class="fas fa-chevron-right card-play-icon"></i>
       </div>`
    : waiting
    ? `<div class="card-stream-row waiting" onclick="event.stopPropagation()">
        <div class="card-stream-icon"><i class="fas fa-clock"></i></div>
        <div class="card-stream-info">
          <div class="card-stream-title">${esc(waiting.title)}</div>
          <div class="card-stream-label">STARTING SOON</div>
        </div>
       </div>`
    : '';

  return `
  <div class="channel-card ${live?'has-live':''}" onclick="clickChannel('${ch.id}')">
    <div class="card-thumb">
      ${thumbHtml}
      <div class="card-thumb-gradient"></div>
      ${statusBadge}
      <div class="card-avatar" style="${pic?'':'background:'+bg}">
        ${pic?`<img src="${pic}" onerror="this.style.display='none'">`:init}
      </div>
    </div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-info">
          <div class="card-channel-name">${esc(ch.name)}</div>
          <div class="card-desc">${esc(ch.description||'No description provided.')}</div>
        </div>
      </div>
      ${streamRow}
      ${pastCnt>0?`<div class="card-footer"><span class="card-past"><i class="fas fa-film"></i>&ensp;${pastCnt} past broadcast${pastCnt>1?'s':''}</span></div>`:''}
    </div>
  </div>`;
}

function updateLiveCount() {
  const n = allChannels.filter(ch=>(allBroadcasts[ch.id]||[]).some(b=>b.status==='live')).length;
  document.getElementById('live-count').textContent = n ? n + ' live' : 'None live';
}

/* ═══════════════════════════════════════════════════════
   FILTERS & SEARCH
═══════════════════════════════════════════════════════ */
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function onSearch() {
  searchQuery = document.getElementById('search-input').value.trim();
  render();
}

/* ═══════════════════════════════════════════════════════
   CHANNEL CLICK
═══════════════════════════════════════════════════════ */
function clickChannel(chId) {
  const bs = allBroadcasts[chId] || [];
  if (!bs.length) { alert('No broadcasts for this channel yet.'); return; }
  if (bs.length === 1) { openPlayer(bs[0].id, chId); return; }
  showBcastModal(chId, bs);
}

function showBcastModal(chId, broadcasts) {
  const ch = allChannels.find(c=>c.id===chId);
  document.getElementById('bcast-modal-channel').textContent = (ch?.name||'Channel') + ' — Broadcasts';
  const sorted = [...broadcasts].sort((a,b)=>new Date(b.created)-new Date(a.created));
  document.getElementById('bcast-modal-list').innerHTML = sorted.map(b=>`
    <div class="bcast-item ${b.status==='live'?'is-live':''}" onclick="pickBcast('${b.id}','${chId}')">
      <div class="bcast-status-dot ${b.status}"></div>
      <div class="bcast-item-info">
        <div class="bcast-item-title">${esc(b.title)}</div>
        <div class="bcast-item-date">${new Date(b.created).toLocaleDateString()} · ${b.status.toUpperCase()}</div>
      </div>
      <i class="fas fa-chevron-right" style="color:var(--text3);font-size:0.75rem"></i>
    </div>`).join('');
  document.getElementById('bcast-modal-overlay').classList.add('open');
}

function pickBcast(bId, chId) {
  closeBcastModal();
  openPlayer(bId, chId);
}

function closeBcastModal() {
  document.getElementById('bcast-modal-overlay').classList.remove('open');
}

/* ═══════════════════════════════════════════════════════
   PLAYER
═══════════════════════════════════════════════════════ */
async function openPlayer(bcastId, chId) {
  if (activeBcastId) { closePlayer(); await sleep(100); }
  activeBcastId = bcastId;
  retryCount    = 0;

  resetConnUI();

  try {
    const r  = await fetch(`${SCRIPT_URL}?operation=getLiveBroadcast&broadcastId=${encodeURIComponent(bcastId)}`);
    const d  = await r.json();
    const b  = d.broadcast;
    if (!b) return;

    const ch = allChannels.find(c=>c.id===chId);
    const pic = lh3(ch?.picLink);

    // Header
    document.getElementById('p-ch-name').textContent    = ch?.name || 'Channel';
    document.getElementById('p-stream-title').textContent = b.title;
    const av = document.getElementById('p-ch-avatar');
    av.innerHTML = pic
      ? `<img src="${pic}" onerror="this.parentElement.textContent='${(ch?.name||'?')[0]}'"/>`
      : (ch?.name||'?')[0].toUpperCase();
    if (!pic) av.style.background = hslFromStr(ch?.name||'x');

    // Status pill
    const pill = document.getElementById('p-status');
    if (b.status==='live')    { pill.className='player-status live';    pill.textContent='● LIVE'; }
    else if(b.status==='waiting'){pill.className='player-status waiting';pill.textContent='⏳ SOON';}
    else                         {pill.className='player-status ended';  pill.textContent='■ ENDED';}

    const vid = document.getElementById('player-video');
    const ph  = document.getElementById('video-placeholder');

    if (b.status === 'live') {
      vid.style.display = 'block';
      ph.style.display  = 'none';
      setConnUI('connecting','Connecting to stream…');
      await startViewerConn(bcastId);
    } else {
      vid.style.display = 'none';
      ph.style.display  = 'flex';
      document.getElementById('conn-status').style.display = 'none';
      document.getElementById('ph-title').textContent =
        b.status==='waiting' ? 'Stream hasn\'t started yet' : 'Stream has ended';
      document.getElementById('ph-sub').textContent =
        b.status==='waiting' ? 'The host will go live soon — stay tuned!' : 'This broadcast has finished.';
    }

    document.getElementById('player-overlay').classList.add('open');
    startChatPoll(bcastId);

    fetch(SCRIPT_URL, {
      method:'POST',
      body: JSON.stringify({ operation:'recordBroadcastView', broadcastId:bcastId, username:ME })
    });
  } catch(e) { console.error('openPlayer', e); }
}

/* ── WebRTC (viewer offers → studio answers) ── */
async function startViewerConn(bcastId) {
  cleanupPC();

  peerConn = new RTCPeerConnection({
    iceServers: [
      { urls:'stun:stun.l.google.com:19302' },
      { urls:'stun:stun1.l.google.com:19302' }
    ]
  });

  const vid = document.getElementById('player-video');

  peerConn.ontrack = e => {
    if (e.streams?.[0]) {
      vid.srcObject = e.streams[0];
      vid.play().catch(()=>{});
      setConnUI('connected','Connected');
    }
  };

  peerConn.onconnectionstatechange = () => {
    if (!activeBcastId) return;
    const s = peerConn?.connectionState;
    if (s==='connected') { setConnUI('connected','Connected'); return; }
    if (s==='failed'||s==='closed') {
      setConnUI('failed','Connection lost');
      if (retryCount < MAX_RETRIES) {
        retryCount++;
        setTimeout(()=>{ if (activeBcastId) startViewerConn(activeBcastId); }, 4000);
      } else {
        document.getElementById('retry-btn').style.display = 'inline-flex';
      }
    }
  };

 // First, clean up any old signals from previous session
await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
  operation:'cleanupViewerSignals', broadcastId:bcastId, viewerId:ME
})});

// Small delay to ensure cleanup completes before writing new offer
await sleep(500);

// Cleanup old signals in background — don't await it
  fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
    operation:'cleanupViewerSignals', broadcastId:bcastId, viewerId:ME
  })}).catch(()=>{});

  const offer = await peerConn.createOffer({ offerToReceiveAudio:true, offerToReceiveVideo:true });
  await peerConn.setLocalDescription(offer);
  await waitIce(peerConn, 5000);

  await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
    operation:'submitViewerAnswer', broadcastId:bcastId, viewerId:ME,
    sdpAnswer: peerConn.localDescription.sdp
  })});
  pollForAnswer(bcastId);
}

async function pollForAnswer(bcastId) {
  clearTimer();
  let tries = 0;
  const go = async () => {
    if (!peerConn || !activeBcastId) return;
    if (peerConn.currentRemoteDescription || peerConn.connectionState==='connected') return;
    if (peerConn.connectionState==='failed'||peerConn.connectionState==='closed') return;
    if (tries++ >= 40) { setConnUI('failed','Studio not responding'); document.getElementById('retry-btn').style.display='inline-flex'; return; }
    try {
      const r = await fetch(`${SCRIPT_URL}?operation=getStudioAnswerForViewer&broadcastId=${encodeURIComponent(bcastId)}&viewerId=${encodeURIComponent(ME)}`);
      const d = await r.json();
      if (d.sdpAnswer && peerConn && !peerConn.currentRemoteDescription) {
        await peerConn.setRemoteDescription({ type:'answer', sdp:d.sdpAnswer });
        for (const c of (d.iceCandidates||[])) {
          try { await peerConn.addIceCandidate(JSON.parse(c)); } catch {}
        }
        return;
      }
    } catch {}
    iceTimer = setTimeout(go, 3000);
  };
 iceTimer = setTimeout(go, 4000); // Give studio more time to process
}

function retryConn() {
  if (!activeBcastId) return;
  document.getElementById('retry-btn').style.display='none';
  setConnUI('connecting','Reconnecting…');
  startViewerConn(activeBcastId);
}

function waitIce(pc, ms) {
  return new Promise(res => {
    if (pc.iceGatheringState==='complete') return res();
    const fn = () => { if(pc.iceGatheringState==='complete'){pc.removeEventListener('icegatheringstatechange',fn);res();} };
    pc.addEventListener('icegatheringstatechange', fn);
    setTimeout(()=>{ pc.removeEventListener('icegatheringstatechange',fn); res(); }, ms);
  });
}

function cleanupPC() {
  clearTimer();
  if (peerConn) {
    peerConn.ontrack = peerConn.onicecandidate =
    peerConn.onconnectionstatechange = peerConn.onicegatheringstatechange = null;
    try { peerConn.close(); } catch {}
    peerConn = null;
  }
  const v = document.getElementById('player-video');
  if (v?.srcObject) { v.srcObject.getTracks().forEach(t=>t.stop()); v.srcObject = null; }
  if (v) v.load();
}

function clearTimer() {
  if (iceTimer) { clearTimeout(iceTimer); iceTimer = null; }
  if (answerPollTimer) { clearTimeout(answerPollTimer); answerPollTimer = null; }
}

function closePlayer() {
  const toClean = activeBcastId;
  activeBcastId = null;
  retryCount    = 0; // Reset so reconnection works properly

  document.getElementById('player-overlay').classList.remove('open');

  if (chatPoll)   { clearInterval(chatPoll); chatPoll = null; }
  clearTimer();
  cleanupPC();
  retryCount = 0;

  // Reset video
  const v = document.getElementById('player-video');
  v.style.display = 'none'; v.src = ''; v.load();
  document.getElementById('video-placeholder').style.display = 'none';
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('chat-messages').dataset.count = '0';
  document.getElementById('viewer-count').textContent = '0';
  resetConnUI();

  if (toClean) {
    fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
      operation:'cleanupViewerSignals', broadcastId:toClean, viewerId:ME
    })}).catch(()=>{});
  }
}

/* ── Conn UI helpers ── */
function setConnUI(state, text) {
  const el  = document.getElementById('conn-status');
  const dot = document.getElementById('conn-dot');
  el.style.display = 'flex'; el.style.opacity = '1';
  dot.className = 'conn-dot' + (state==='connected'?' connected':state==='failed'?' failed':'');
  document.getElementById('conn-text').textContent = text;
  if (state==='connected') setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.style.display='none',500); }, 3000);
}
function resetConnUI() {
  const el = document.getElementById('conn-status');
  el.style.display='none'; el.style.opacity='1';
  document.getElementById('conn-dot').className='conn-dot';
  document.getElementById('conn-text').textContent='Connecting…';
  document.getElementById('retry-btn').style.display='none';
}

/* ═══════════════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════════════ */
function startChatPoll(bId) {
  loadChat(bId);
  chatPoll = setInterval(() => loadChat(bId), 5000);

  // Separate fast viewer count poll — updates every 3 seconds
  if (window._vcPoll) clearInterval(window._vcPoll);
  window._vcPoll = setInterval(async () => {
    if (!activeBcastId) return;
    try {
      const r = await fetch(`${SCRIPT_URL}?operation=getBroadcastViewerCount&broadcastId=${encodeURIComponent(activeBcastId)}`);
      const d = await r.json();
      document.getElementById('viewer-count').textContent = d.count || 0;
    } catch {}
  }, 3000);
}

async function loadChat(bId) {
  try {
    const r = await fetch(`${SCRIPT_URL}?operation=getBroadcastChat&broadcastId=${encodeURIComponent(bId)}&since=0`);
    const d = await r.json();
    const msgs = d.messages || [];
    const box  = document.getElementById('chat-messages');
    const atBottom = box.scrollHeight - box.clientHeight <= box.scrollTop + 5;

    if (msgs.length !== +(box.dataset.count||0)) {
      box.dataset.count = msgs.length;
      box.innerHTML = msgs.map(m => {
        const pic = lh3(m.picLink);
        const init = (m.name||'?')[0].toUpperCase();
        return `<div class="chat-msg">
          <div class="chat-msg-avatar" style="${pic?'':'background:'+hslFromStr(m.name||'x')}">
            ${pic?`<img src="${pic}" onerror="this.style.display='none'">`:init}
          </div>
          <div>
            <div class="chat-msg-name">${esc(m.name)}</div>
            <div class="chat-msg-text">${esc(m.message)}</div>
          </div>
        </div>`;
      }).join('');
      if (atBottom) box.scrollTop = box.scrollHeight;
    }

    document.getElementById('viewer-count').textContent = d.viewerCount || 0;
  } catch {}
}

async function sendChat() {
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim();
  if (!msg || !activeBcastId) return;
  inp.value = '';
  const picLink = localStorage.getItem('userPicLink')||'';
  await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
    operation:'sendBroadcastChat', broadcastId:activeBcastId,
    name:ME, message:msg, picLink
  })});
  loadChat(activeBcastId);
}

async function react(emoji) {
  if (!activeBcastId) return;
  await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
    operation:'sendBroadcastChat', broadcastId:activeBcastId,
    name:ME, message:emoji, picLink:localStorage.getItem('userPicLink')||''
  })});
}

/* ═══════════════════════════════════════════════════════
   MISC
═══════════════════════════════════════════════════════ */
const sleep = ms => new Promise(r=>setTimeout(r,ms));

window.addEventListener('beforeunload', () => {
  if (activeBcastId) navigator.sendBeacon(SCRIPT_URL, JSON.stringify({
    operation:'cleanupViewerSignals', broadcastId:activeBcastId, viewerId:ME
  }));
  cleanupPC();
});

/* ── INIT ── */
loadAll();
setInterval(loadAll, 30000);
</script>
